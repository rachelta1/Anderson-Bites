/* ── Week date helpers ── */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_LETTERS = ['S','M','T','W','T','F','S'];
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const BASE_SUNDAY = new Date(2026, 3, 26); // Sun Apr 26, 2026 (week 0 anchor)
const TODAY = new Date(2026, 3, 28);        // Tue Apr 28, 2026

// Normalize a breakfast field to string[]: legacy data may be a single string,
// null, undefined, or already an array. Filter out empties so consumers can
// trust `.length` and `.map`.
function normBreakfast(b) {
  if (Array.isArray(b)) return b.filter(Boolean);
  if (typeof b === 'string' && b.trim()) {
    // Legacy joined string ("Pancakes + Muffins") splits back to an array.
    return b.split(' + ').map(s => s.trim()).filter(Boolean);
  }
  return [];
}

function mergeWeek(fresh, persisted) {
  if (!persisted) return fresh;
  return fresh.map((d, i) => {
    const p = persisted[i] || {};
    const meals = p.meals
      ? { b: normBreakfast(p.meals.b), d: p.meals.d ?? null, snacks: Array.isArray(p.meals.snacks) ? p.meals.snacks : [] }
      : d.meals;
    return {
      ...d,
      meals,
      tasks: Array.isArray(p.tasks) ? p.tasks : d.tasks,
      planned: !!p.planned,
    };
  });
}

function buildWeek(offset) {
  const start = new Date(BASE_SUNDAY);
  start.setDate(start.getDate() + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return {
      d: DAY_LETTERS[i],
      n: d.getDate(),
      label: DAY_NAMES[i],
      month: MONTHS[d.getMonth()],
      planned: false,
      today: d.getTime() === TODAY.getTime(),
      meals: { b: [], d: null, snacks: [] },
      tasks: [],
    };
  });
}

function weekRangeLabel(offset) {
  const start = new Date(BASE_SUNDAY);
  start.setDate(start.getDate() + offset * 7);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  return `${MONTHS[start.getMonth()]} ${start.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}`;
}

/* ── Task input bottom sheet ── */
const TASK_SUGGESTIONS = ['Laundry','Meal prep','Clean','Grocery run','Trash out'];

/* Map free-text task names to a leading emoji. Match longest keyword first.
   Laundry intentionally has no icon (per user preference). */
const TASK_ICON_RULES = [
  [/meal\s*prep|prep\s*meals/i, '🍱'],
  [/grocer|shopping/i, '🛒'],
  [/vacuum|sweep|mop|tidy|clean(ing)?/i, '🧹'],
  [/trash|garbage|recycl/i, '🗑️'],
  [/dishes|dishwasher/i, '🍽️'],
  [/bills?|finance|budget/i, '💵'],
  [/mail|post/i, '📬'],
  [/mow|lawn|yard|garden/i, '🌿'],
  [/walk\s*dog|dog\s*walk|pet|cat|dog/i, '🐕'],
  [/water\s*plants?|plant/i, '🪴'],
  [/gym|workout|exercise|run|jog/i, '🏃'],
  [/call|phone/i, '📞'],
  [/email|inbox/i, '📧'],
  [/car|oil change|gas/i, '🚗'],
];
// Detects whether the first character cluster is already an emoji/symbol so we
// don't double-stack icons when the user types "🛒 grocery run" or edits a task.
function hasLeadingIcon(text) {
  const s = (text || '').trim();
  if (!s) return false;
  // Anything outside the basic ASCII letter/number set in position 0 → assume icon
  return !/^[A-Za-z0-9]/.test(s);
}
// Split a task string like "🐕 Walk dog" into { icon: '🐕', name: 'Walk dog' }.
// If no leading icon (e.g. "Laundry"), returns { icon: '', name: 'Laundry' }.
function splitTaskIcon(text) {
  const s = (text || '').trim();
  if (!s || !hasLeadingIcon(s)) return { icon: '', name: s };
  const m = s.match(/^(\S+)\s+(.+)$/);
  if (m) return { icon: m[1], name: m[2] };
  return { icon: '', name: s };
}
function withTaskIcon(text) {
  const s = (text || '').trim();
  if (!s) return s;
  if (hasLeadingIcon(s)) return s;
  // Laundry: no icon (per user preference)
  if (/^laundry\b/i.test(s)) return s;
  for (const [re, icon] of TASK_ICON_RULES) {
    if (re.test(s)) return `${icon} ${s}`;
  }
  return `📝 ${s}`;
}

function TaskSheet({ initial, onSave, onClose }) {
  const [val, setVal] = useState(initial || '');
  const save = () => { if (val.trim()) onSave(val.trim()); };

          value={val}
          onChange={e => setVal(e.target.value)}

        />
        <div className="task-quick">

          ))}

}

/* ── Initial week 0 (seeded with mocked plan) ── */
function seedWeekZero() {
  const w = buildWeek(0);
  w[1].planned = true; w[1].meals.b = ['Yogurt Bowl'];        w[1].meals.d = 'Chicken Stir Fry';
  w[2].planned = true; w[2].meals.b = ['Oatmeal & Berries'];  w[2].meals.d = 'Tacos'; w[2].tasks = ['Laundry'];
  w[3].planned = true; w[3].meals.b = ['Avocado Toast'];      w[3].meals.d = 'Lemon Herb Salmon';
  w[4].planned = true; w[4].meals.b = ['Smoothie Bowl'];      w[4].meals.d = 'Pasta Primavera';
  return w;
}

function dayHasContent(d) {
  return !!(d && d.meals && ((d.meals.b && d.meals.b.length) || d.meals.d || (d.meals.snacks && d.meals.snacks.length) || (d.tasks && d.tasks.length)));
}

function WeekScreen({ onTab, weekData, setWeekData, weekOffset, setWeekOffset, recipeDB, onMealClick }) {
  const [selected, setSelected] = useState(() => {
    const idx = weekData.findIndex(d => d.today);
    return idx >= 0 ? idx : 0;
  });
  const [modal, setModal] = useState(null); // { type:'recipe'|'task', slot, snackIdx? }
  const day = weekData[selected];

  const updateDay = (mutate) => {
    const next = weekData.map((d, i) => {
      if (i !== selected) return d;
      const draft = mutate({ ...d, meals: { ...d.meals, snacks: [...(d.meals.snacks || [])] }, tasks: [...(d.tasks || [])] });
      // Auto-clear `planned` when day becomes empty so the auto-plan label disappears
      if (!dayHasContent(draft)) draft.planned = false;
      return draft;
    });
    setWeekData(next);
  };

  // Slot shapes:
  //   'd'                       → dinner
  //   'b'                       → add new breakfast (push to array)
  //   { kind:'b', idx:N }       → edit/replace breakfast at index N (per-row swap)
  //   'snack-new' / number      → snacks
  //   'auto'                    → picker decides slot by recipe tag
  const setMeal = (slot, recipe) => {
    updateDay(d => {
      const bArr = Array.isArray(d.meals.b) ? [...d.meals.b] : [];
      if (slot && typeof slot === 'object' && slot.kind === 'b') {
        if (slot.idx == null) bArr.push(recipe.name);
        else bArr[slot.idx] = recipe.name;
        d.meals.b = bArr;
      } else if (slot === 'b') {
        bArr.push(recipe.name);
        d.meals.b = bArr;
      } else if (slot === 'd') {
        d.meals.d = recipe.name;
      } else if (slot === 'snack-new') {
        d.meals.snacks.push(recipe.name);
      } else if (slot === 'auto') {
        const isBreakfast = (recipe.tags || []).includes('breakfast');
        if (isBreakfast) { bArr.push(recipe.name); d.meals.b = bArr; }
        else if (!d.meals.d) d.meals.d = recipe.name;
        else d.meals.snacks.push(recipe.name);
      } else if (typeof slot === 'number') {
        d.meals.snacks[slot] = recipe.name;
      }
      return d;
    });
    setModal(null);
  };

  const deleteMeal = (slot) => {
    updateDay(d => {
      const bArr = Array.isArray(d.meals.b) ? [...d.meals.b] : [];
      if (slot && typeof slot === 'object' && slot.kind === 'b') {
        bArr.splice(slot.idx, 1);
        d.meals.b = bArr;
      } else if (slot === 'b') {
        d.meals.b = [];
      } else if (slot === 'd') {
        d.meals.d = null;
      } else if (typeof slot === 'number') {
        d.meals.snacks.splice(slot, 1);
      }
      return d;
    });
  };

  const saveTask = (text) => {
    const idx = modal?.taskIdx;
    updateDay(d => {
      if (idx == null) d.tasks.push(text);
      else d.tasks[idx] = text;
      return d;
    });
    setModal(null);
  };

  const deleteTask = (idx) => {
    updateDay(d => { d.tasks.splice(idx, 1); return d; });
  };

  const openMeal = (slot) => setModal({ type:'recipe', slot });
  const openTaskNew = () => setModal({ type:'task', initial:'', taskIdx:null });
  const openTaskEdit = (idx) => setModal({ type:'task', initial: day.tasks[idx], taskIdx: idx });

  const goWeek = (delta) => {
    setWeekOffset(weekOffset + delta);
    setSelected(0);
  };

  return (
    <div className="screen-body" style={{ position:'relative' }}>
      {/* Header with week nav */}
      <div className="screen-header">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div className="screen-title">Week</div>
          <CloudRefreshButton />
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:28, color:'var(--purple)', cursor:'pointer', padding:'0 4px' }} onClick={() => goWeek(-1)}>‹</span>
          <span style={{ fontSize:18, color:'#888', minWidth:120, textAlign:'center' }}>{weekRangeLabel(weekOffset)}</span>
          <span style={{ fontSize:28, color:'var(--purple)', cursor:'pointer', padding:'0 4px' }} onClick={() => goWeek(1)}>›</span>
        </div>
      </div>

      {/* 7-day strip */}
      <div style={{ display:'flex', gap:3, padding:'0 12px 10px' }}>
        {weekData.map((d, i) => {
          const hasContent = dayHasContent(d);
          return (
            <div
              key={i}
              className="day-chip"
              onClick={() => setSelected(i)}
              style={{
                background: i === selected ? 'var(--purple-mid)' : d.today ? '#1a1228' : '#111118',
                border: `1.5px solid ${i === selected ? 'var(--purple)' : d.today ? '#3b1f70' : 'var(--border)'}`,
              }}
            >
              <span style={{ fontSize:14, color: i===selected ? 'var(--purple-light)' : d.today ? '#6d44b0' : 'var(--text-dim)' }}>{d.d}</span>
              <span style={{ fontSize:22, fontWeight:600, color: i===selected ? 'var(--text)' : d.today ? '#ccc' : '#888' }}>{d.n}</span>
              {hasContent && (
                <span style={{ width:4, height:4, borderRadius:'50%', background: i===selected ? 'var(--purple-light)' : 'var(--purple)', display:'block' }} />
              )}
            </div>
          );
        })}
      </div>

      <div className="divider" style={{ margin:'0 16px 8px' }} />

      {/* Selected day content */}
      <div className="pane">
        <div style={{ fontSize:12, color:'var(--purple)', marginBottom:10, paddingLeft:2 }}>
          {day.label} · {day.month} {day.n}{day.today ? ' · today' : ''}
          {day.planned && dayHasContent(day) && <span style={{ marginLeft:8, fontSize:11, color:'var(--purple-bg)' }}>✦ auto-planned</span>}
        </div>

        <div className="section-label">Meals</div>

        {(day.meals.b || []).map((bName, bi) => (
          <div key={`b-${bi}`} className="meal-slot" onClick={() => onMealClick && onMealClick(bName)} style={{ cursor:'pointer' }}>
            <span className="meal-slot-icon">☀️</span>
            <div style={{ flex:1 }}>
              <div className="meal-slot-name">{bName}</div>
              <div className="meal-slot-meta">Breakfast · tap for recipe</div>
            </div>
            <span className="meal-slot-edit" title="swap recipe" onClick={(e) => { e.stopPropagation(); openMeal({ kind:'b', idx: bi }); }}>✎</span>
            <span className="meal-slot-del" onClick={(e) => { e.stopPropagation(); deleteMeal({ kind:'b', idx: bi }); }}>×</span>
          </div>
        ))}

        {day.meals.d && (
          <div className="meal-slot" onClick={() => onMealClick && onMealClick(day.meals.d)} style={{ cursor:'pointer' }}>
            <span className="meal-slot-icon">🌙</span>
            <div style={{ flex:1 }}>
              <div className="meal-slot-name">{day.meals.d}</div>
              <div className="meal-slot-meta">Dinner · tap for recipe</div>
            </div>
            <span className="meal-slot-edit" title="swap recipe" onClick={(e) => { e.stopPropagation(); openMeal('d'); }}>✎</span>
            <span className="meal-slot-del" onClick={(e) => { e.stopPropagation(); deleteMeal('d'); }}>×</span>
          </div>
        )}

        {/* Snacks / extra meals */}
        {(day.meals.snacks || []).map((s, i) => (
          <div key={i} className="meal-slot" onClick={() => onMealClick && onMealClick(s)} style={{ cursor:'pointer' }}>
            <span className="meal-slot-icon">🍽️</span>
            <div style={{ flex:1 }}>
              <div className="meal-slot-name">{s}</div>
              <div className="meal-slot-meta">Extra meal · tap for recipe</div>
            </div>
            <span className="meal-slot-edit" title="swap recipe" onClick={(e) => { e.stopPropagation(); setModal({ type:'recipe', slot:i }); }}>✎</span>
            <span className="meal-slot-del" onClick={(e) => { e.stopPropagation(); deleteMeal(i); }}>×</span>
          </div>
        ))}

        <div
          className="meal-slot ghost"
          style={{ borderStyle:'dashed', marginBottom:14, cursor:'pointer' }}
          onClick={() => openMeal('auto')}
        >
          <span style={{ fontSize:20, color:'#2a2a3e' }}>+</span>
          <div style={{ fontSize:15, color:'#2a2a3e' }}>Add a meal</div>
        </div>

        <div className="section-label">Tasks</div>

        {(day.tasks || []).map((t, i) => {
          const parsed = splitTaskIcon(t);
          return (
            <div key={i} className="meal-slot" onClick={() => openTaskEdit(i)} style={{ cursor:'pointer' }}>
              <span className="meal-slot-icon">{parsed.icon || '✓'}</span>
              <div style={{ flex:1 }}>
                <div className="meal-slot-name">{parsed.name}</div>
                <div className="meal-slot-meta">Household task</div>
              </div>
              <span className="meal-slot-edit">✎</span>
              <span className="meal-slot-del" onClick={(e) => { e.stopPropagation(); deleteTask(i); }}>×</span>
            </div>
          );
        })}

        <div
          className="meal-slot ghost"
          style={{ borderStyle:'dashed', cursor:'pointer' }}
          onClick={openTaskNew}
        >
          <span style={{ fontSize:20, color:'#2a2a3e' }}>+</span>
          <div style={{ fontSize:15, color:'#2a2a3e' }}>
            {(day.tasks && day.tasks.length) ? 'Add another task' : 'Add task (laundry, etc.)'}
          </div>
        </div>

        <div style={{ height:12 }} />
      </div>

      <TabBar active={0} onTab={onTab} />

      {modal?.type === 'recipe' && (
        <RecipeSheet
          slot={modal.slot}
          onPick={(r) => setMeal(modal.slot, r)}
          onClose={() => setModal(null)}
          recipeDB={recipeDB}
        />
      )}
      {modal?.type === 'task' && (
        <TaskSheet
          initial={modal.initial}
          onSave={saveTask}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   SCREEN: GROCERY LIST
═══════════════════════════════════════════ */
/* Try to extract a leading quantity from text like "2 lbs salmon" → { q:'2 lbs', n:'salmon' } */
function parseItem(text) {
  const m = text.trim().match(/^(\d+(?:\.\d+)?(?:\s*(?:lb|lbs|oz|kg|g|cup|cups|tbsp|tsp|jar|jars|box|boxes|bag|bags|can|cans|bottle|bottles|bunch|head|cloves?|pkg))?)\s+(.+)$/i);
  if (m) return { q: m[1], n: m[2] };
  return { q: '', n: text.trim() };
}

/* Order matters: more specific categories (multi-word keywords) come first
   so things like "chicken broth" → Pantry (via "broth"), not Meat (via "chicken") */
const CAT_RULES = [
  // 'herb' / 'pepper' / 'sage' / 'thyme' / 'rosemary' / 'basil' etc. removed —
  // they collide with dried-spice phrases like "italian herb seasoning blend".
  // Real fresh produce in recipes uses words like "fresh basil", "spinach", etc.
  // Anything ambiguous (e.g. "italian seasoning") gets resolved by the LLM pass below.

  ['🥫 Pantry', ['pasta','noodle','rice','flour','sugar','salt','olive oil','vegetable oil','canola','sesame oil','vinegar','sauce','can','jar','beans','black beans','chickpeas','garbanzo','lentil','quinoa','couscous','oats','oatmeal','cereal','granola','tahini','peanut butter','almond butter','nut butter','jam','jelly','honey','maple syrup','syrup','ketchup','mustard','mayo','mayonnaise','soy sauce','hot sauce','sriracha','salsa','spice','seasoning','broth','stock','crackers','chips','pretzels','nuts','almond','walnut','pecan','cashew','seed','raisin','coconut milk','tomato sauce','marinara','pesto','tortilla chip','baking soda','baking powder','yeast','vanilla','cocoa','chocolate chip']],

// Match whole words only — substring matching mis-classifies "sausage" as Produce
// because it contains "sage". Tokenize the item name and require a full token hit.
function categorize(name) {
  const tokens = name.toLowerCase().split(/[^a-z]+/).filter(Boolean);
  if (!tokens.length) return '🛒 Other';
  const phrase = tokens.join(' ');
  for (const [cat, words] of CAT_RULES) {
    for (const w of words) {
      if (w.includes(' ')) {
        if (phrase.includes(w)) return cat;
      } else if (tokens.includes(w)) {
        return cat;
      }
    }
  }
  return '🛒 Other';
}

function PantrySheet({ staples, setStaples, onClose }) {
  const [val, setVal] = useState('');
  const add = () => {
    const t = val.trim().toLowerCase();
    if (!t) return;
    if (staples.some(s => s.toLowerCase() === t)) { setVal(''); return; }
    setStaples([...staples, t]);
    setVal('');
  };
  const remove = (item) => setStaples(staples.filter(s => s !== item));
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-grabber" />
        <div className="modal-header">
          <div className="modal-title">Pantry I have on hand</div>
          <span className="modal-close" onClick={onClose}>×</span>
        </div>
        <div style={{ fontSize:13, color:'var(--text-dimmer)', marginBottom:10 }}>
          These items are assumed to be in your kitchen and won't be added to the grocery list.
        </div>
        <div style={{ display:'flex', gap:8, marginBottom:10 }}>
          <input
            className="task-input"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') add(); }}
            placeholder="add staple (e.g. paprika)"
            style={{ flex:1 }}

/* ── Plan preview modal: shows what the picker chose + which staples it
   plans to skip from the grocery list. User can uncheck any staple to send
   it to the list anyway (e.g. "I'm out of milk, add it"). Confirm advances
   to the existing-meals overwrite/append flow (or directly applies the
   plan if no day conflicts). Recipe rows are tappable → opens RecipePeekSheet
   layered on top so the user can inspect a dish before confirming/rerolling. ── */
function PreviewPlanModal({ perDay, weekMap, weekTitle, pantryStaples, onConfirm, onCancel, onReroll, rerolling, rerollSeed }) {
  // Lookup table from weekOffset+slotIdx → friendly day chip ({ label, n, month, d })
  const dayInfoFor = (weekOffset, slotIdx) => {
    const wk = weekMap && weekMap[weekOffset];
    return wk && wk[slotIdx] ? wk[slotIdx] : null;
  };

  // Each item the picker chose, in calendar order. perDay is already in day
  // order from pickPlan, but sort defensively in case the LLM picker scrambles it.
  const ordered = [...(perDay || [])].sort((a, b) => {
    if (a.weekOffset !== b.weekOffset) return a.weekOffset - b.weekOffset;
    return a.slotIdx - b.slotIdx;
  });

  const classify = classifyPantry(pantryStaples);
  const pantryUsage = collectPantryUsage(perDay, classify);
  // Staples user has UNCHECKED → these will be added to the grocery list
  // instead of being filtered out as pantry items.
  const [excluded, setExcluded] = useState(() => new Set());
  // Pantry section is collapsed by default — recipes routinely use 20+ pantry
  // items and a wall of pills made the modal feel heavy. Header shows the
  // count + count of overrides; user expands to review.
  const [pantryOpen, setPantryOpen] = useState(false);
  // Recipe peek: user tapped a dinner/breakfast row to inspect it. Layered on
  // top via RecipePeekSheet; closing returns to the preview with all state
  // (excluded staples, pantryOpen, ...) intact.
  const [peeked, setPeeked] = useState(null);
  // A recipe is "peekable" if we have actual content for it. Stub recipes
  // (when byName lookup failed in the picker — only `{name}` survived) can't
  // be peeked usefully, so we render them un-clickable.
  const isPeekable = (r) => !!(r && (
    (Array.isArray(r.ingredients) && r.ingredients.length) ||
    (Array.isArray(r.steps) && r.steps.length) ||
    r.url
  ));

  const toggle = (key) => {
    setExcluded(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const confirm = () => onConfirm(excluded);

  return (
    <>
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()} style={{ maxHeight:'85%' }}>
        <div className="modal-grabber" />
        <div className="modal-header">
          <div className="modal-title">{weekTitle ? `${weekTitle}'s plan` : 'Proposed plan'}</div>
          <span className="modal-close" onClick={onCancel}>×</span>
        </div>
        <div style={{ overflowY:'auto', overflowX:'hidden', flex:1, paddingRight:2 }}>

            Here's what I picked. Review before I write it to your week.
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:14 }}>
            {ordered.map(({ weekOffset, slotIdx, dt, dinner, breakfast, breakfasts, tasks: dayTasks }) => {
              const info = dayInfoFor(weekOffset, slotIdx);
              const dayLabel = info ? `${info.label} ${info.month} ${info.n}` : dt;
              const bfList = (Array.isArray(breakfasts) && breakfasts.length)
                ? breakfasts
                : (breakfast ? [breakfast] : []);
              return (
                <div key={`${weekOffset}-${slotIdx}`} style={{ background:'var(--card)', border:'1px solid var(--border-dim)', borderRadius:10, padding:'8px 10px' }}>
                  <div style={{ fontSize:13, color:'var(--purple-light)', fontWeight:600, marginBottom:4 }}>{dayLabel}</div>
                  {bfList.map((b, i) => {
                    const peekable = isPeekable(b);
                    return (
                      <div
                        key={`b-${i}`}
                        onClick={peekable ? () => setPeeked(b) : undefined}
                        style={{ fontSize:14, color:'#ddd', display:'flex', gap:6, alignItems:'center', cursor: peekable ? 'pointer' : 'default', padding: peekable ? '2px 0' : 0 }}
                        title={peekable ? 'Tap to view recipe' : undefined}
                      >
                        <span style={{ width:14 }}>☀️</span>
                        <span style={{ flex:1, textDecoration: peekable ? 'underline dotted var(--purple-bg)' : 'none', textUnderlineOffset:'3px' }}>{b.name}</span>
                        {peekable && <span style={{ color:'var(--text-dimmer)', fontSize:13 }}>›</span>}
                      </div>
                    );
                  })}
                  {dinner && (() => {
                    const peekable = isPeekable(dinner);
                    return (
                      <div
                        onClick={peekable ? () => setPeeked(dinner) : undefined}
                        style={{ fontSize:14, color:'#ddd', display:'flex', gap:6, alignItems:'center', cursor: peekable ? 'pointer' : 'default', padding: peekable ? '2px 0' : 0 }}
                        title={peekable ? 'Tap to view recipe' : undefined}
                      >
                        <span style={{ width:14 }}>🌙</span>
                        <span style={{ flex:1, textDecoration: peekable ? 'underline dotted var(--purple-bg)' : 'none', textUnderlineOffset:'3px' }}>{dinner.name}</span>
                        {peekable && <span style={{ color:'var(--text-dimmer)', fontSize:13 }}>›</span>}
                      </div>

                  {(dayTasks || []).map((t, i) => (
                    <div key={`t-${i}`} style={{ fontSize:13, color:'var(--text-dim)', display:'flex', gap:6 }}>
                      <span style={{ width:14 }}>✓</span><span>{t}</span>

                    <div style={{ fontSize:13, color:'var(--text-dimmer)', fontStyle:'italic' }}>(nothing chosen for this day)</div>
                  )}
                </div>

            })}

          <div style={{ borderTop:'1px solid #222', paddingTop:10, marginBottom:6 }}>
            {pantryUsage.length === 0 ? (
              <>
                <div style={{ fontSize:14, color:'#ddd', fontWeight:600, marginBottom:4 }}>Pantry assumptions</div>
                <div style={{ fontSize:13, color:'var(--text-dimmer)' }}>
                  Nothing assumed — every ingredient will go on the grocery list.
                </div>
              </>
            ) : (
              <>
                <div
                  onClick={() => setPantryOpen(o => !o)}
                  style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', padding:'2px 0' }}
                >
                  <span style={{ fontSize:12, color:'var(--text-dimmer)', width:14 }}>{pantryOpen ? '▾' : '▸'}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, color:'#ddd', fontWeight:600 }}>Pantry assumptions</div>
                    <div style={{ fontSize:12, color:'var(--text-dimmer)', marginTop:1 }}>
                      {pantryUsage.length} staple{pantryUsage.length === 1 ? '' : 's'} skipped from grocery list
                      {excluded.size > 0 && (
                        <span style={{ color:'var(--purple-light)' }}> · {excluded.size} sent to list</span>
                      )}
                    </div>
                  </div>
                </div>
                {pantryOpen && (
                  <div style={{ marginTop:8 }}>
                    <div style={{ fontSize:12, color:'var(--text-dimmer)', marginBottom:8 }}>
                      Tap any you're actually out of — I'll add it to your grocery list instead.
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                      {pantryUsage.map(p => {
                        const off = excluded.has(p.key);
                        // Show ingredient variants on hover so the user knows
                        // what each pill actually covers. e.g. "salt" pill →
                        // tooltip "covers: kosher salt, salt".
                        const variants = (p.ingredients || []).filter(v => v.toLowerCase() !== p.name.toLowerCase());
                        const tip = off
                          ? 'will be added to grocery list'
                          : (variants.length
                              ? `assumed pantry — covers: ${[p.name, ...variants].join(', ')}`
                              : 'assumed pantry — skipped');
                        return (
                          <div
                            key={p.key}
                            onClick={() => toggle(p.key)}
                            className={off ? 'pill pill-off' : 'pill pill-on'}
                            style={{ cursor:'pointer', textDecoration: off ? 'line-through' : 'none', color: off ? 'var(--purple-light)' : undefined, background: off ? 'var(--card)' : undefined, borderStyle: off ? 'dashed' : 'solid' }}
                            title={tip}
                          >
                            {p.name}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>

        <div style={{ display:'flex', gap:8, padding:'12px 0 4px' }}>
          <div
            className="gen-btn"
            onClick={(rerolling || !onReroll) ? undefined : onReroll}
            style={
              rerolling
                ? { flex:1, background:'#202030', color:'#aaa', border:'1.5px solid var(--border)', opacity:0.6, cursor:'wait' }

          <div

            onClick={rerolling ? undefined : confirm}
            style={rerolling ? { flex:1, opacity:0.6, cursor:'wait' } : { flex:1 }}
          >
            Confirm
          </div>
        </div>
      </div>
    </div>
    {peeked && (
      <RecipePeekSheet recipe={peeked} onClose={() => setPeeked(null)} />
    )}
    </>
  );
}

function GroceryScreen({ onTab, items, setItems, pantryStaples, setPantryStaples, apiKey, catCache, setCatCache }) {
  const [showDone, setShowDone] = useState(false);
  const [newItemText, setNewItemText] = useState('');
  const [showPantry, setShowPantry] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);

  // LLM is the source of truth for category AND for the "should this even be on
  // the grocery list?" decision (isStaple). The cache (catCache) holds Claude's
  // answer for every item we've ever seen — once cached, forever. The rule-based
  // categorize() is a *placeholder only* for the brief window between "item shows
  // up" and "LLM has responded", and for offline use when no API key is set.
  //
  // Cache entry shape (current): { category: '<label>', isStaple: <bool> }
  // Backwards-compat: a bare string '<label>' from older sessions still resolves.
  const cacheCat = (entry) => (typeof entry === 'string' ? entry : entry && entry.category) || null;
  const cacheStaple = (entry) => (typeof entry === 'object' && entry && entry.isStaple) || false;
  const resolveCat = useCallback((name) => {
    if (!name) return '🛒 Other';
    const k = name.toLowerCase();
    const cat = cacheCat(catCache[k]);
    if (cat) return cat;
    return categorize(name);
  }, [catCache]);

  // LLM categorizes EVERY uncached item in one batch. Rules never override LLM —
  // once Claude answers, the cached answer wins forever.
  //
  // Side-effect: when Claude classifies an item as a staple, we also
  // auto-prune it from the grocery list. This is the backstop for items the
  // rule-based scrub above doesn't recognize (e.g. "panko breadcrumbs").
  useEffect(() => {
    if (!apiKey) return;
    const uncached = [];
    const seen = new Set();
    items.forEach(it => {
      const k = (it.n || '').toLowerCase();
      if (!k || seen.has(k) || catCache[k]) return;
      uncached.push(it.n);
      seen.add(k);
    });
    if (!uncached.length) return;
    classifyGroceriesWithLLM({ apiKey, names: uncached.slice(0, 50) })
      .then(map => {
        const updates = {};
        const stapleKeys = new Set();
        Object.entries(map).forEach(([k, v]) => {
          const lo = k.toLowerCase();
          updates[lo] = v;
          if (v && v.isStaple) stapleKeys.add(lo);
        });
        if (Object.keys(updates).length) setCatCache(prev => ({ ...prev, ...updates }));
        if (stapleKeys.size) {
          // Prune staples from the grocery list, but never touch manually-added
          // items — the user explicitly wanted those even if Claude thinks
          // they're staples.
          setItems(prev => prev.filter(it => {
            const lo = (it.n || '').toLowerCase();
            if (!stapleKeys.has(lo)) return true;
            if (/manual/i.test(it.src || '')) return true;
            return false;
          }));
        }
      })
      .catch(() => {});
  }, [items, apiKey]);

  const toggle = (name) => setItems(prev => prev.map(i => i.n === name ? { ...i, done: !i.done } : i));

  const addItem = () => {
    const t = newItemText.trim();
    if (!t) return;
    const { q, n } = parseItem(t);
    setItems(prev => [
      { q, n, done:false, src:'Added manually' },
      ...prev,
    ]);
    setNewItemText('');
  };

  const visible = showDone ? items : items.filter(i => !i.done);
  // Stable category order for display (Produce on top, Other at bottom)
  const cats = CAT_LABELS.filter(c => items.some(i => resolveCat(i.n) === c));
  const doneCount = items.filter(i => i.done).length;
  const totalCount = items.length;

  return (
    <div className="screen-body">
      <div className="screen-header">
        <div className="screen-title">Grocery List</div>
        <span style={{ fontSize:13, color:'var(--text-dimmer)' }}>{doneCount} of {totalCount}</span>
      </div>

      <div className="progress-bar">
        <div className="progress-fill" style={{ width:`${(doneCount/totalCount)*100}%` }} />
      </div>

      {/* Toolbar */}
      <div style={{ display:'flex', gap:8, padding:'0 16px 10px', alignItems:'center' }}>
        <div style={{
          flex:1, height:48, display:'flex', alignItems:'center',
          background:'#0f0f18',
          border:`1.5px ${newItemText ? 'solid' : 'dashed'} ${newItemText ? 'var(--purple)' : 'var(--border)'}`,
          borderRadius:10, padding:'0 10px 0 14px', gap:8,
        }}>
          <span style={{ fontSize:22, color:'var(--text-dimmer)' }}>+</span>
          <input
            value={newItemText}
            onChange={e => setNewItemText(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') addItem(); }}
            placeholder="add item (e.g. 2 lbs ground beef)"
            style={{
              flex:1, background:'transparent', border:'none', outline:'none',
              color:'var(--text)', fontFamily:'var(--font)', fontSize:18,
            }}
          />
          {newItemText && (
            <span
              onClick={addItem}
              style={{ fontSize:16, fontWeight:700, color:'var(--purple-light)', cursor:'pointer', padding:'0 6px' }}
            >add</span>
          )}
        </div>
        <div
          onClick={() => setShowDone(!showDone)}
          style={{
            height:48, padding:'0 12px', borderRadius:10,
            display:'flex', alignItems:'center', gap:6,
            fontSize:15, cursor:'pointer',
            background: showDone ? 'var(--purple-mid)' : '#131320',
            border: `1.5px ${showDone ? 'solid' : 'dashed'} ${showDone ? 'var(--purple)' : 'var(--border)'}`,
            color: showDone ? 'var(--purple-light)' : '#444',
          }}
        >
          ✓ done ({doneCount})
        </div>
        {totalCount > 0 && (
          <div
            onClick={() => setConfirmClear(true)}
            title="Clear entire list"
            style={{
              height:48, width:48, borderRadius:10,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:18, cursor:'pointer',
              background:'#131320', border:'1.5px dashed var(--border)',
              color:'#666',
            }}
          >🗑</div>
        )}
      </div>

      {/* Items */}
      <div className="pane">
        {cats.map(cat => {
          const catItems = visible.filter(i => resolveCat(i.n) === cat);
          if (!catItems.length) return null;
          return (
            <div key={cat}>
              <div className="cat-header">{cat}</div>
              {catItems.map(({ q, n, done, src }) => (
                <div key={n} className={`check-row${done ? ' crossed' : ''}`} style={{ paddingTop:10, paddingBottom:10 }}>
                  <div className={`check-box${done ? ' done' : ''}`} onClick={() => toggle(n)} style={{ cursor:'pointer' }} />
                  <div style={{ flex:1 }}>
                    <div>{q && <span className="qty">{q}</span>} {n}</div>
                    <div style={{ fontSize:12, color:'#444', marginTop:2 }}>{src}</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
        <div style={{ height:12 }} />
      </div>

      <div style={{ padding:'4px 16px 0' }}>
        <div
          onClick={() => setShowPantry(true)}
          style={{
            padding:'8px 12px', borderRadius:8,
            border:'1.5px dashed var(--border)', background:'#0f0f18',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            cursor:'pointer',
          }}
        >
          <div style={{ display:'flex', flexDirection:'column' }}>
            <span style={{ fontSize:14, color:'#bbb' }}>🥫 Pantry I have on hand</span>
            <span style={{ fontSize:12, color:'var(--text-dimmer)' }}>{pantryStaples.length} items skipped from list</span>
          </div>
          <span style={{ fontSize:18, color:'var(--purple)' }}>›</span>
        </div>
      </div>

      <div className="btn-wrap">
        <div className="gen-btn">🛒 Send to Instacart</div>
      </div>

      <TabBar active={1} onTab={onTab} />

      {showPantry && (
        <PantrySheet
          staples={pantryStaples}
          setStaples={setPantryStaples}
          onClose={() => setShowPantry(false)}
        />
      )}

      {confirmClear && (
        <ConfirmSheet
          title="Clear grocery list?"
          body={`This removes all ${totalCount} item${totalCount === 1 ? '' : 's'} — including manually added ones. This can't be undone.`}
          confirmLabel="Clear all"
          onConfirm={() => { setItems([]); setConfirmClear(false); }}
          onClose={() => setConfirmClear(false)}
        />
      )}
    </div>
  );
}

   Hidden when not signed in. Spins briefly while pulling;

function CloudRefreshButton() {
  const [user, setUser] = useState(() => (window.AB_FB ? window.AB_FB.getUser() : null));
  const [busy, setBusy] = useState(false);
  useEffect(() => {
    if (!window.AB_FB) return;
    return window.AB_FB.onAuth(setUser);
  }, []);
  if (!user) return null;
  const click = async () => {
    setBusy(true);
    try { await window.AB_FB.pullNow(); }
    finally { setBusy(false); }
  };
  return (
    <span
      onClick={busy ? null : click}
      title="Sync from cloud"
      style={{
        fontSize:30,
        lineHeight:1,
        color:'var(--purple-light)',
        cursor:'pointer',
        padding:'2px 8px',
        display:'inline-flex',
        alignItems:'center',

        transition:'transform 0.4s',
      }}

  );
}

function SettingsSheet({ apiKey, setApiKey, onClose }) {
  const [val, setVal] = useState(apiKey || '');
  const [reveal, setReveal] = useState(false);
  const [user, setUser] = useState(() => (window.AB_FB ? window.AB_FB.getUser() : null));
  const [emailIn, setEmailIn] = useState('');
  const [pwIn, setPwIn] = useState('');
  const [busy, setBusy] = useState(false);
  const [authMsg, setAuthMsg] = useState('');

  useEffect(() => {
    if (!window.AB_FB) return;
    return window.AB_FB.onAuth(setUser);
  }, []);

  const doAuth = async (mode) => {
    const e = emailIn.trim();
    const p = pwIn;
    if (!e || !p) { setAuthMsg('Email and password required'); return; }
    if (p.length < 6) { setAuthMsg('Password must be at least 6 characters'); return; }
    setBusy(true);
    setAuthMsg('');
    try {
      if (mode === 'create') {
        await window.AB_FB.createAccount(e, p);
      } else {
        await window.AB_FB.signIn(e, p);
      }
      setEmailIn(''); setPwIn('');
    } catch (err) {
      const code = err.code || '';
      if (code === 'auth/user-not-found') setAuthMsg('No account yet — tap Create account');
      else if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') setAuthMsg('Wrong email or password');
      else if (code === 'auth/email-already-in-use') setAuthMsg('Already exists — tap Sign in');
      else if (code === 'auth/weak-password') setAuthMsg('Password too weak (6+ chars)');
      else if (code === 'auth/invalid-email') setAuthMsg('Invalid email');
      else setAuthMsg(err.message || 'Sign-in failed');
    } finally {
      setBusy(false);
    }
  };

  const doSignOut = async () => {
    setBusy(true);
    try { await window.AB_FB.signOut(); } finally { setBusy(false); }
  };

  const save = () => { setApiKey(val.trim()); onClose(); };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-grabber" />
        <div className="modal-header">
          <div className="modal-title">Settings</div>
          <span className="modal-close" onClick={onClose}>×</span>
        </div>

        {/* Cloud sync / account */}
        <div style={{ fontSize:13, color:'var(--text-dimmer)', marginBottom:6 }}>Cloud sync</div>
        {!window.AB_FB ? (
          <div style={{ fontSize:12, color:'var(--text-dimmer)', marginBottom:14 }}>Loading…</div>
        ) : user ? (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:14, color:'var(--text)', marginBottom:4 }}>Signed in as {user.email}</div>
            <div style={{ fontSize:12, color:'var(--text-dimmer)', marginBottom:8, lineHeight:1.5 }}>Recipes, plans, and lists sync across devices automatically.</div>
            <div className="danger-btn" style={{ display:'inline-block', padding:'6px 14px' }} onClick={busy ? null : doSignOut}>
              {busy ? '…' : 'Sign out'}
            </div>
          </div>
        ) : (
          <div style={{ marginBottom:14 }}>
            <input
              className="text-input"
              type="email"
              value={emailIn}
              onChange={e => setEmailIn(e.target.value)}
              placeholder="email"
              spellCheck={false}
              autoCapitalize="none"
              autoCorrect="off"
              style={{ marginBottom:6 }}
            />
            <input
              className="text-input"
              type="password"
              value={pwIn}
              onChange={e => setPwIn(e.target.value)}
              placeholder="password"
              spellCheck={false}
              autoCapitalize="none"
              autoCorrect="off"
            />
            {authMsg && <div style={{ fontSize:12, color:'#f88', marginTop:6 }}>{authMsg}</div>}
            <div style={{ display:'flex', gap:8, marginTop:8 }}>
              <div className="gen-btn" style={{ flex:1, background:'#202030', color:'#aaa', border:'1.5px solid var(--border)' }} onClick={busy ? null : () => doAuth('create')}>
                {busy ? '…' : 'Create account'}
              </div>
              <div className="gen-btn" style={{ flex:1 }} onClick={busy ? null : () => doAuth('signin')}>
                {busy ? '…' : 'Sign in'}
              </div>
            </div>
            <div style={{ fontSize:11, color:'var(--text-dimmer)', marginTop:6, lineHeight:1.4 }}>
              Use the same email & password on each device to sync recipes and plans.
            </div>
          </div>
        )}

        <div style={{ fontSize:13, color:'var(--text-dimmer)', marginBottom:6 }}>Claude API key</div>
        <div style={{ position:'relative' }}>
          <input
            className="text-input"
            type={reveal ? 'text' : 'password'}
            value={val}
            onChange={e => setVal(e.target.value)}
            placeholder="sk-ant-…"
            spellCheck={false}
            autoCapitalize="none"
            autoCorrect="off"
            style={{ paddingRight:60 }}
          />
          <span
            onClick={() => setReveal(!reveal)}
            style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', fontSize:12, color:'var(--purple)', cursor:'pointer', userSelect:'none' }}
          >{reveal ? 'hide' : 'show'}</span>
        </div>
        <div style={{ fontSize:12, color:'var(--text-dimmer)', marginTop:6, lineHeight:1.5 }}>
          Used for Describe-a-recipe and URL imports. Stored locally on this device only.
        </div>
        <div className="btn-wrap" style={{ padding:'14px 0 4px', display:'flex', gap:8 }}>
          {apiKey && (
            <div className="danger-btn" style={{ flex:1 }} onClick={() => { setApiKey(''); onClose(); }}>Clear</div>
          )}
          <div className="gen-btn" style={{ flex:2 }} onClick={save}>Save</div>
        </div>
      </div>
    </div>
  );
}

function RecipePreviewCard({ data, onChange }) {
  if (!data) return null;
  const tags = data.tags || [];
  const isSide = tags.includes('sides');
  const toggleSide = () => {
    if (!onChange) return;
    if (isSide) {
      // Remove sides; restore dinner if no other meal-kind tag is present
      const next = tags.filter(t => t !== 'sides');
      const hasMealKind = ['breakfast','lunch','dinner','snack','dessert'].some(k => next.includes(k));
      onChange({ ...data, tags: hasMealKind ? next : ['dinner', ...next] });
    } else {
      // Add sides, drop dinner (sides excluded from auto-plan)
      onChange({ ...data, tags: ['sides', ...tags.filter(t => t !== 'dinner')] });
    }
  };
  return (
    <div style={{ background:'#17172a', border:'1.5px solid #2e2e50', borderRadius:14, padding:14, marginBottom:10 }}>
      <div style={{ fontSize:12, color:'var(--purple-bg)', marginBottom:6 }}>✦ Generated preview</div>

        <RecipeThumb recipe={data} size={56} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:18, fontWeight:700, color:'var(--text)', lineHeight:1.2 }}>{data.name}</div>
          <div style={{ display:'flex', gap:10, marginTop:4, flexWrap:'wrap' }}>
            <span style={{ fontSize:12, color:'var(--text-dimmer)' }}>⏱ {data.estMinutes} min</span>
            <span style={{ fontSize:12, color:'var(--text-dimmer)' }}>👥 {data.servings}</span>
            <span className="effort-badge" style={{ color: effortColor(data) }}>{effortLabel(data)}</span>
          </div>
        </div>
      </div>
      <div style={{ display:'flex', gap:5, flexWrap:'wrap', marginBottom:8 }}>
        {tags.filter(t => t !== 'fast').map(t => <div key={t} className="recipe-tag">{t}</div>)}
      </div>
      {onChange && (
        <div
          onClick={toggleSide}
          title={isSide ? 'Side dishes are skipped by auto-plan. Click to undo.' : 'Mark as side dish — will be skipped by auto-plan.'}

            display:'inline-flex', alignItems:'center', gap:6, marginBottom:10,
            padding:'5px 10px', borderRadius:999, fontSize:12, cursor:'pointer',
            background: isSide ? 'rgba(126,211,160,0.15)' : '#202030',
            border: `1px solid ${isSide ? '#7ed3a0' : 'var(--border)'}`,
            color: isSide ? '#7ed3a0' : 'var(--text-dimmer)',
          }}
        >
          <span>{isSide ? '✓' : '+'}</span>
          <span>Side dish (skip from auto-plan)</span>
        </div>
      )}
      <div className="section-label">Ingredients ({data.ingredients.length})</div>
      <div style={{ fontSize:13, color:'#aaa', lineHeight:1.5, marginBottom:8 }}>
        {data.ingredients.join(', ')}

      <div className="section-label">Steps ({data.steps.length})</div>
      {data.steps.map((s, i) => (
        <div key={i} style={{ fontSize:13, color:'#aaa', padding:'3px 0', lineHeight:1.5, display:'flex', gap:6 }}>
          <span style={{ color:'var(--purple-bg)', minWidth:18 }}>{i+1}.</span>
          <span style={{ flex:1 }}>{s}</span>
        </div>
      ))}
    </div>
  );

function AddRecipeURLScreen({ onBack, apiKey, onSave, onTab }) {
  const [url, setUrl] = useState('');
  const [stage, setStage] = useState('input'); // input | loading | preview | error
  const [data, setData] = useState(null);
  const [errMsg, setErrMsg] = useState('');

  const importIt = async () => {
    const trimmed = url.trim();
    if (!trimmed) { setErrMsg('Paste a recipe URL first.'); setStage('error'); return; }
    setStage('loading');
    setErrMsg('');
    try {
      const html = await fetchPageHtml(trimmed);
      const ogImage = extractOgImage(html);
      const cleaned = trimHtmlForLlm(html, 60000);
      const text = await callClaude({
        apiKey,
        system: RECIPE_SCHEMA_PROMPT,
        user: `Source URL: ${trimmed}\n\nExtract the recipe from this HTML. Set "url" to the source URL.\n\n--- HTML START ---\n${cleaned}\n--- HTML END ---`,
      });
      const parsed = extractJson(text);

function AddRecipeDescribeScreen({ onBack, apiKey, onSave, onTab }) {

    const text = desc.trim();

    setStage('loading');

    try {
      const out = await callClaude({
        apiKey,
        system: RECIPE_SCHEMA_PROMPT,
        user: `Build a recipe from this description. Leave "url" as an empty string. Description:\n\n${text}`,
      });
      const parsed = extractJson(out);
      const recipe = normalizeRecipeFromLlm(parsed, { url: '' });
      setData(recipe);
      setStage('preview');

      setStage('error');

          </div>

            ✗ {errMsg}
          </div>
        )}

        {stage === 'preview' && <RecipePreviewCard data={data} onChange={setData} />}

        <div style={{ height:12 }} />

      <div className="btn-wrap">

          <div style={{ display:'flex', gap:8 }}>
            <div className="gen-btn" style={{ flex:1, background:'#202030', color:'#aaa', border:'1.5px solid var(--border)' }} onClick={() => setStage('input')}>Regenerate</div>
            <div className="gen-btn" style={{ flex:2 }} onClick={save}>Save Recipe</div>
          </div>
        ) : (
          <div className="gen-btn" style={{ opacity: stage === 'loading' ? 0.6 : 1 }} onClick={stage === 'loading' ? null : generate}>
            {stage === 'loading' ? '⏳ Generating…' : '✦ Generate Recipe'}

        )}
      </div>

      <TabBar active={2} onTab={onTab} />
    </div>
  );
}

/* ── Add to Calendar bottom sheet — pick a day to drop the recipe on ── */
function AddToCalendarSheet({ recipe, weekMap, setWeekMap, onClose, onDone }) {
  const today = new Date();
  const baseToday = new Date(BASE_SUNDAY); baseToday.setHours(0,0,0,0);
  const todayIdx = Math.round((today.setHours(0,0,0,0) - baseToday.getTime()) / 86400000);
  const isBreakfast = (recipe.tags || []).includes('breakfast');

  const days = Array.from({ length: 7 }, (_, i) => {
    const dayIdx = todayIdx + i;
    const date = new Date(BASE_SUNDAY); date.setDate(date.getDate() + dayIdx);
    const weekOffset = Math.floor(dayIdx / 7);
    const slotIdx = ((dayIdx % 7) + 7) % 7;
    const slot = (weekMap[weekOffset] || buildWeek(weekOffset))[slotIdx];
    return { weekOffset, slotIdx, date, slot, isToday: i === 0 };
  });

  const addToDay = ({ weekOffset, slotIdx }) => {
    const updated = { ...weekMap };
    const week = updated[weekOffset]
      ? updated[weekOffset].map(s => ({ ...s, meals: { ...s.meals, snacks: [...(s.meals.snacks || [])] }, tasks: [...(s.tasks || [])] }))
      : buildWeek(weekOffset);
    const slot = week[slotIdx];
    // meals.b is now string[] — push the new breakfast onto the array (multiple
    // breakfasts can coexist on a day, see multi-breakfast support).
    if (isBreakfast) {
      slot.meals.b = [...(slot.meals.b || []), recipe.name];
    } else if (!slot.meals.d) {
      slot.meals.d = recipe.name;
    } else {
      slot.meals.snacks.push(recipe.name);
    }
    slot.planned = true;
    week[slotIdx] = slot;
    updated[weekOffset] = week;
    setWeekMap(updated);
    onDone(`Added to ${DAY_NAMES[slotIdx]} ${MONTHS[days.find(d => d.weekOffset === weekOffset && d.slotIdx === slotIdx).date.getMonth()]} ${days.find(d => d.weekOffset === weekOffset && d.slotIdx === slotIdx).date.getDate()}`);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-grabber" />
        <div className="modal-header">
          <div className="modal-title">Add to which day?</div>
          <span className="modal-close" onClick={onClose}>×</span>
        </div>
        <div style={{ fontSize:13, color:'var(--text-dimmer)', marginBottom:8 }}>
          Drops <span style={{ color:'#ddd' }}>{recipe.name}</span> into the {isBreakfast ? 'breakfast slot' : 'dinner slot'} (or as an extra if filled).
        </div>
        <div style={{ overflowY:'auto', flex:1 }}>
          {days.map((d, i) => {
            const filled = (d.slot.meals.b && d.slot.meals.b.length) || d.slot.meals.d;
            return (
              <div key={i} onClick={() => addToDay(d)} className="recipe-pick-row" style={{ cursor:'pointer' }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:18, color:'#ddd' }}>
                    {DAY_NAMES[d.slotIdx]} · {MONTHS[d.date.getMonth()]} {d.date.getDate()}
                    {d.isToday && <span style={{ marginLeft:8, fontSize:13, color:'var(--purple-light)' }}>today</span>}
                  </div>
                  {filled && <div style={{ fontSize:14, color:'var(--text-dimmer)', marginTop:2 }}>currently: {[...(d.slot.meals.b || []), d.slot.meals.d].filter(Boolean).join(' · ')}</div>}
                </div>
                <span style={{ fontSize:22, color:'var(--purple)' }}>+</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   SCREEN: RECIPE DETAIL

function RecipeDetailScreen({ recipe, onBack, onTab, weekMap, setWeekMap, recipeDB, setRecipeDB, groceryList, setGroceryList }) {
  const r = recipe || (recipeDB && recipeDB[0]) || {};
  const [showCal, setShowCal] = useState(false);
  const [toast, setToast] = useState('');
  const [confirmDel, setConfirmDel] = useState(false);
  const [notes, setNotes] = useState(r.notes || '');
  const [notesDirty, setNotesDirty] = useState(false);
  const [heroIdx, setHeroIdx] = useState(0);
  // Toggle between the full Ingredients view (hero + meta + tags + ingredients)
  // and a minimal Steps view (notes + steps only) for cooking.
  const [activeTab, setActiveTab] = useState('ingredients');
  // Indices of ingredients the user has tapped to send to the grocery list.
  // Cleared after a successful add so the user can start a new selection.
  const [pickedIngs, setPickedIngs] = useState(() => new Set());
  const heroSources = recipePhotoSources(r, 800, 400);
  const heroUrl = heroIdx < heroSources.length ? heroSources[heroIdx] : null;

  const ingredients = Array.isArray(r.ingredients) ? r.ingredients : [];
  const steps = Array.isArray(r.steps) ? r.steps : [];

  const toggleIng = (i) => {
    setPickedIngs(prev => {
      const next = new Set(prev);
      if (next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
  };

  // Push selected ingredients into the grocery list. Merges into existing
  // items by case-insensitive name (combines qty strings + sources). Marks
  // src as the recipe name so future overwrite-strippers can attribute it.
  const addPickedToGrocery = () => {
    if (!setGroceryList || pickedIngs.size === 0) return;
    const picks = [...pickedIngs].sort((a, b) => a - b).map(i => {
      const raw = Array.isArray(r.ingredientsWithQty) ? r.ingredientsWithQty[i] : null;
      const parsed = raw ? parseItem(raw) : { q: '', n: ingredients[i] };
      return { q: parsed.q || '', n: parsed.n || ingredients[i] };
    }).filter(p => p.n && p.n.trim());
    setGroceryList(prev => {
      const next = [...prev];
      const indexByName = {};
      next.forEach((it, idx) => { indexByName[(it.n || '').toLowerCase()] = idx; });
      picks.forEach(p => {
        const key = p.n.toLowerCase();
        if (indexByName[key] != null) {
          const idx = indexByName[key];
          const it = next[idx];
          const qSet = new Set((it.q || '').split(' + ').map(s => s.trim()).filter(Boolean));
          if (p.q) qSet.add(p.q);
          const sSet = new Set((it.src || '').split(' + ').map(s => s.trim()).filter(Boolean));
          sSet.add(r.name || 'Recipe');
          next[idx] = { ...it, q: [...qSet].join(' + '), src: [...sSet].join(' + '), done: false };
        } else {
          next.push({ q: p.q, n: p.n, done: false, src: r.name || 'Recipe' });
          indexByName[key] = next.length - 1;
        }
      });
      return next;
    });
    const n = pickedIngs.size;
    setPickedIngs(new Set());
    setToast(`Added ${n} to grocery list`);
    setTimeout(() => setToast(''), 2500);
  };
  const mealKind = (r.tags || []).includes('breakfast') ? 'breakfast'
                 : (r.tags || []).includes('dessert') ? 'dessert'
                 : (r.tags || []).includes('soup') ? 'soup'
                 : 'dinner';

  const handleDelete = () => {
    if (setRecipeDB) setRecipeDB(prev => prev.filter(x => x.id !== r.id));
    setConfirmDel(false);
    onBack();
  };

  const saveNotes = () => {
    if (!notesDirty || !setRecipeDB || !r.id) return;
    setRecipeDB(prev => prev.map(x => x.id === r.id ? { ...x, notes } : x));
    setNotesDirty(false);
    setToast('Notes saved');
    setTimeout(() => setToast(''), 2000);
  };

  // Segmented Ingredients/Steps toggle. Inlined as a variable so both
  // branches of the layout can render the same component without duplication.
  const tabToggle = (
    <div style={{
      display:'flex',
      background:'#0e0e18',
      border:'1.5px solid var(--border)',
      borderRadius:10,
      padding:3,
      marginBottom:12,
    }}>
      {[
        { k:'ingredients', label:'Ingredients' },
        { k:'steps', label:'Steps' },
      ].map(({ k, label }) => {
        const on = activeTab === k;
        return (
          <div
            key={k}
            onClick={() => setActiveTab(k)}
            style={{
              flex:1, textAlign:'center',
              padding:'10px 14px',
              fontSize:16, fontWeight:600,
              color: on ? 'var(--text)' : 'var(--text-dimmer)',
              background: on ? 'var(--purple-mid)' : 'transparent',
              borderRadius:7, cursor:'pointer',
            }}
          >{label}</div>
        );
      })}
    </div>
  );

  // Notes block — shown on both tabs since notes apply to both contexts
  // (e.g. swap notes are useful while shopping AND while cooking).
  const notesBlock = (
    <>
      <div className="section-label" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Notes</span>
        {notesDirty && (
          <span
            onClick={saveNotes}
            style={{ fontSize:12, color:'var(--purple-light)', cursor:'pointer', textTransform:'none', letterSpacing:0, padding:'2px 10px', border:'1px solid var(--purple-bg)', borderRadius:4 }}
          >Save</span>
        )}
      </div>
      <textarea
        className="text-input"
        value={notes}
        onChange={e => { setNotes(e.target.value); setNotesDirty(true); }}
        onBlur={saveNotes}
        placeholder="Tweaks, swaps, who liked it…"
        style={{ minHeight:60, lineHeight:1.5, fontSize:14, fontFamily:'var(--font)', marginBottom:14 }}
      />
    </>
  );

  return (
    <div className="screen-body">
      {activeTab === 'ingredients' ? (
        <>
          {/* Hero */}
          <div className="hero-img" style={heroUrl ? { backgroundImage:`url(${heroUrl})`, backgroundSize:'cover', backgroundPosition:'center', backgroundColor:'#000' } : null}>
            {heroUrl && (
              <img src={heroUrl} alt="" onError={() => setHeroIdx(heroIdx + 1)} style={{ display:'none' }} />
            )}
            {!heroUrl && <span style={{ fontSize:64 }}>{fallbackEmoji(r)}</span>}
            <div style={{ position:'absolute', top:8, left:8, display:'flex', gap:6 }}>
              <span
                onClick={onBack}
                style={{ fontSize:13, color:'#ddd', padding:'4px 10px', background:'rgba(0,0,0,0.5)', border:'1px solid #444', borderRadius:6, cursor:'pointer' }}
              >‹ back</span>
            </div>
            <div style={{ position:'absolute', top:8, right:8 }}>
              <span
                onClick={() => setConfirmDel(true)}
                style={{ fontSize:13, color:'#e29090', padding:'4px 10px', background:'rgba(0,0,0,0.5)', border:'1px solid #5a2030', borderRadius:6, cursor:'pointer' }}
                title="Delete recipe"
              >🗑 delete</span>
            </div>
          </div>

          <div style={{ flex:1, overflow:'hidden', padding:'10px 16px 0', display:'flex', flexDirection:'column' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6, gap:10 }}>
              <div className="screen-title" style={{ fontSize:24, lineHeight:1.2 }}>{r.name}</div>
              <span className="effort-badge" style={{ color: effortColor(r), flexShrink:0, marginTop:4 }}>{effortLabel(r)}</span>
            </div>

            <div style={{ display:'flex', gap:12, marginBottom:8, flexWrap:'wrap' }}>
              <span style={{ fontSize:15, color:'var(--text-dimmer)' }}>⏱ {r.time || `${r.estMinutes || ''} min`}</span>
              <span style={{ fontSize:15, color:'var(--text-dimmer)' }}>🍽️ {mealKind}</span>
              {typeof r.servings === 'number' && (
                <span style={{ fontSize:15, color:'var(--text-dimmer)' }}>👥 {r.servings} servings</span>
              )}
              <span style={{ fontSize:15, color:'var(--text-dimmer)' }}>used {r.used || 0}×</span>
              {r.url && (
                <a href={r.url} target="_blank" rel="noreferrer" style={{ fontSize:13, color:'var(--purple)', borderBottom:'1px dashed var(--purple-bg)', textDecoration:'none' }}>🔗 source</a>
              )}
            </div>

            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:6 }}>
              {(r.tags || []).filter(t => t !== 'fast').map(t => <div key={t} className="recipe-tag">{t}</div>)}
            </div>

            <div className="divider" />

            <div className="pane" style={{ padding:0, paddingTop:8 }}>
              {tabToggle}
              {notesBlock}

              <div className="section-label" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span>Ingredients</span>
                {ingredients.length > 0 && setGroceryList && (
                  <span
                    onClick={() => {
                      if (pickedIngs.size === ingredients.length) setPickedIngs(new Set());
                      else setPickedIngs(new Set(ingredients.map((_, i) => i)));
                    }}
                    style={{ fontSize:12, color:'var(--purple-light)', cursor:'pointer', textTransform:'none', letterSpacing:0, padding:'2px 10px', border:'1px solid var(--purple-bg)', borderRadius:4 }}
                  >{pickedIngs.size === ingredients.length ? 'Clear all' : 'Select all'}</span>
                )}
              </div>
              {ingredients.length === 0 && (
                <div style={{ fontSize:13, color:'var(--text-dimmer)', padding:'6px 0' }}>No ingredients recorded.</div>

              {ingredients.map((ing, i) => {
                const raw = Array.isArray(r.ingredientsWithQty) ? r.ingredientsWithQty[i] : null;
                const parsed = raw ? parseItem(raw) : null;
                const picked = pickedIngs.has(i);
                const tappable = !!setGroceryList;
