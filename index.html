<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Anderson Bites — Meal Planner</title>

<!-- PWA: web app manifest (Android Chrome reads this for icon, name, theme) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0a2e">

<!-- iOS: Safari ignores most of manifest.json — needs its own tags to make
     "Add to Home Screen" launch full-screen with the right icon and title -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bites">
<link rel="apple-touch-icon" href="icon-180.png">

<!-- Favicon (browser tab icon, PC + Android) -->
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d18;
  --phone-bg: #111118;
  --card: #131320;
  --card2: #1a1a2a;
  --border: #2a2a3e;
  --border-dim: #1e1e2e;
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --purple-dark: #4c1d95;
  --purple-mid: #2d1f5e;
  --purple-bg: #5b3faf;
  --text: #e8e8f0;
  --text-sec: #aaa;
  --text-dim: #666;
  --text-dimmer: #555;
  --text-ghost: #333;
  --font: 'Caveat', cursive;
  --font-input: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

html, body {
  background: var(--bg);
  font-family: var(--font);
  min-height: 100vh;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ── Mobile / PWA: drop the desktop phone-frame chrome and fill the screen.
   Triggers on narrow viewports OR when launched as an installed PWA.
   Locks scrolling on html/body so iOS rubber-band overscroll can't drag
   the whole layout around — the .pane inside each screen is the only
   real scroller. Honors notch + home-indicator via safe-area-inset.   ── */
@media (max-width: 480px), (display-mode: standalone) {
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--phone-bg);
  }
  body { display: block; }
  /* Anchor the phone container directly to the viewport via fixed-inset
     instead of relying on a height chain through html > body > phone.
     This sidesteps iOS Safari's flaky vh / dvh / -webkit-fill-available
     behavior and the body's desktop flex-centering, which were combining
     to keep .phone at its desktop 780px height. */
  .phone {
    position: fixed !important;
    top: 0 !important; right: 0 !important; bottom: 0 !important; left: 0 !important;
    width: auto !important;
    height: auto !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    margin: 0 !important;
    padding: 0 !important;
    padding-left: env(safe-area-inset-left) !important;
    padding-right: env(safe-area-inset-right) !important;
  }
  .notch { display: none !important; }
  /* Repurpose the (otherwise-empty) status-bar div as a top safe-area
     spacer so headers sit under the notch, not over it. */
  .status-bar {
    display: block !important;
    height: env(safe-area-inset-top) !important;
    min-height: env(safe-area-inset-top);
    padding: 0 !important;
    background: transparent;
  }
  /* Extend the tab bar's background to the very bottom of the screen
     so there's no empty strip in the home-indicator zone, but keep its
     touchable icons above the home indicator via padding-bottom. */
  .tab-bar {
    height: calc(60px + env(safe-area-inset-bottom));
    padding-bottom: calc(4px + env(safe-area-inset-bottom));
  }
  /* Without min-height:0 a flex child won't shrink below its content,
     so tall screens (Grocery, Recipes) push the tab bar off-screen and
     never let .pane become the actual scroller. This restores both. */
  .screen-body, .pane, .screen-scroll { min-height: 0; }
}

/* ── Phone Shell ── */
.phone {
  width: 375px;
  height: 780px;
  background: var(--phone-bg);
  border-radius: 36px;
  border: 2.5px solid #4a4a6a;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 0 1px #2a2a3e, 0 24px 72px rgba(0,0,0,0.7);
}
.notch {
  width: 120px; height: 28px;
  background: var(--phone-bg);
  border-radius: 0 0 16px 16px;
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  z-index: 10;
  border: 2.5px solid #4a4a6a; border-top: none;
}
.status-bar {
  height: 44px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 0 20px 8px;
  gap: 6px;
}
.status-bar span { font-size: 13px; color: var(--text-dim); }
.screen-body {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Tab Bar ── */
.tab-bar {
  height: 60px; flex-shrink: 0;
  background: #0f0f1a;
  border-top: 1.5px solid #222;
  display: flex; align-items: center;
  padding-bottom: 4px;
}
.tab-item {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 4px 0;
}
.tab-icon { font-size: 24px; line-height: 1; filter: grayscale(1) brightness(1.2) contrast(1.4); }
.tab-icon svg { width: 24px; height: 24px; }
.tab-label { font-size: 13px; color: var(--text-dim); font-family: var(--font); }
.tab-item.active .tab-label { color: var(--purple-light); font-weight: 700; }

/* ── Shared ── */
.screen-header {
  padding: 8px 20px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.screen-title { font-size: 27px; font-weight: 700; color: var(--text); font-family: var(--font); }
.screen-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.screen-scroll::-webkit-scrollbar { width: 0; }

.card {
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
}
.card-label {
  font-size: 16px; color: var(--purple-light);
  margin-bottom: 8px;
}
.divider { height: 1px; background: #222; margin: 6px 0; }
.section-label {
  font-size: 13px; color: var(--text-dimmer);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 6px;
}

/* ── Meal Slot ── */
.meal-slot {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px;
  background: #16161f;
  border-radius: 12px;
  border: 1px solid #222;
  margin-bottom: 8px;
}
.meal-slot.dashed { border-style: dashed; border-color: #222; }
.meal-slot.ghost { border-color: var(--border-dim); }
.meal-slot-icon { font-size: 26px; opacity: 0.6; }
.meal-slot-name { font-size: 21px; color: #ddd; }
.meal-slot-meta { font-size: 16px; color: var(--text-dimmer); }
.meal-slot-edit { font-size: 15px; color: #444; margin-left: auto; }
.meal-slot-del {
  font-size: 22px; line-height: 1;
  color: #555;
  padding: 2px 6px; margin-left: 4px;
  border-radius: 6px; cursor: pointer;
}
.meal-slot-del:active { background: #2a1420; color: #d97777; }
.meal-slot-add { font-size: 24px; color: var(--text-ghost); }
.meal-slot-add-text { font-size: 18px; color: var(--text-ghost); }

/* ── Generate Button ── */
.btn-wrap { padding: 8px 16px; flex-shrink: 0; }
.gen-btn {
  background: linear-gradient(135deg, #4c1d95, #7c3aed);
  color: #ede9fe;
  border: 1.5px solid var(--purple);
  border-radius: 12px;
  padding: 13px;
  text-align: center;
  font-size: 22px; font-weight: 700;
  font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; width: 100%;
}
.gen-btn:active { opacity: 0.85; }

/* ── Pill ── */
.pill {
  display: inline-flex; align-items: center;
  padding: 4px 12px; border-radius: 100px;
  font-size: 17px; font-family: var(--font);
  cursor: pointer; white-space: nowrap;
}
.pill-on { background: var(--purple-mid); color: var(--purple-light); border: 1.5px solid var(--purple); }
.pill-off { background: var(--card); color: #444; border: 1.5px dashed #252535; }

/* ── Toggle switch ── */
.toggle {
  width: 36px; height: 20px; border-radius: 10px;
  position: relative; flex-shrink: 0; cursor: pointer;
}
.toggle.on { background: var(--purple); border: 1.5px solid var(--purple); }
.toggle.off { background: var(--border-dim); border: 1.5px solid var(--border); }
.toggle-knob {
  position: absolute; top: 2px;
  width: 14px; height: 14px; border-radius: 50%; background: #fff;
}
.toggle.on .toggle-knob { left: 18px; }
.toggle.off .toggle-knob { left: 2px; opacity: 0.3; }

/* ── Param row ── */
.param-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px dashed #222;
}
.param-row:last-child { border-bottom: none; }
.param-label { font-size: 20px; color: #bbb; }
.param-val { font-size: 20px; color: var(--purple-light); }

/* ── Check row ── */
.check-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px dashed #222;
  font-size: 19px; color: #ccc;
}
.check-box {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1.5px solid #444; flex-shrink: 0; margin-top: 2px;
}
.check-box.done { background: var(--purple-mid); border-color: var(--purple); }
.check-row.crossed { color: #444; text-decoration: line-through; }

/* ── Day chip (week strip) ── */
.day-chip {
  flex: 1; height: 76px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; font-family: var(--font);
}

/* ── Hatch placeholder ── */
.hatch {
  background-image: repeating-linear-gradient(45deg,#222 0,#222 1px,transparent 1px,transparent 8px);
  background-color: #181820;
  border: 1.5px dashed #333; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #444; font-size: 14px; text-align: center;
  font-family: var(--font);
}

/* ── Qty ── */
.qty { color: var(--purple); font-size: 18px; min-width: 32px; }
.cat-header { font-size: 14px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 0 4px; }

/* ── Recipe card ── */
.recipe-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--card); border: 1px solid var(--border-dim);
  border-radius: 12px; margin-bottom: 6px; cursor: pointer;
}
.recipe-tag {
  padding: 2px 7px; background: #1a1a2e;
  border: 1px solid #252540; border-radius: 6px;
  font-size: 13px; color: var(--text-dimmer);
}

/* ── Input ── */
.fake-input {
  background: #0f0f18; border: 1.5px dashed var(--border);
  border-radius: 10px; padding: 10px 14px;
  font-size: 18px; color: var(--text-dimmer);
  font-family: var(--font);
}
.fake-input.solid { border-style: solid; border-color: var(--border); }
.select-wrap {
  position: relative; margin-bottom: 7px;
}
.fancy-select {
  width: 100%; background: #0f0f18; border: 1.5px solid #252535;
  border-radius: 8px; padding: 8px 10px; color: #ddd;
  font-size: 16px; font-family: var(--font-input);
  outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;
}
.select-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-dimmer); font-size: 14px; pointer-events: none;
}

/* ── Back button ── */
.back-btn { font-size: 24px; color: var(--purple); cursor: pointer; }

/* ── Progress bar ── */
.progress-bar {
  height: 4px; background: var(--border-dim); border-radius: 2px; overflow: hidden;
  margin: 0 20px 8px;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg,#4c1d95,var(--purple)); border-radius: 2px;
}

/* ── Search bar ── */
.search-bar {
  margin: 0 16px 10px;
  height: 48px; background: var(--card); border: 1.5px solid var(--border-dim);
  border-radius: 10px; display: flex; align-items: center; padding: 0 14px; gap: 10px;
}

/* ── Add option card ── */
.add-option-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 18px 16px; margin-bottom: 12px;
}

/* ── Hero image ── */
.hero-img {
  height: 160px; flex-shrink: 0;
  background-image: repeating-linear-gradient(45deg,#1e1e2e 0,#1e1e2e 1px,transparent 1px,transparent 10px);
  background-color: #141420; border-bottom: 1px solid #222;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 4px;
  position: relative;
}

/* ── Ingredient edit row ── */
.ing-row {
  display: flex; gap: 10px; padding: 6px 8px;
  border-bottom: 1px dashed var(--border-dim); font-size: 18px; align-items: center;
}
.qty-badge {
  background: #0f0f18; border: 1px solid var(--border-dim);
  border-radius: 6px; padding: 2px 8px; min-width: 64px;
  color: var(--purple); font-size: 16px;
}

/* ── Step row ── */
.step-row {
  display: flex; gap: 8px; padding: 7px 8px;
  border-bottom: 1px dashed var(--border-dim); font-size: 16px; align-items: flex-start;
}

/* ── Week navigation ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  background: #0f0f18; border: 1.5px solid #252535;
  border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
  cursor: pointer;
}

/* ── AI badge ── */
.ai-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg,#3b1fa8,#6d28d9);
  color: #ddd6fe; border-radius: 100px; padding: 2px 10px; font-size: 15px;
}

/* ── Scrollable pane ── */
.pane { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 16px; }
.pane::-webkit-scrollbar { width: 0; }

/* ── Modal sheet ── */
.modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  display: flex; align-items: flex-end;
  border-radius: 34px;
  overflow: hidden;
}
.modal-sheet {
  background: #16161f;
  border-top-left-radius: 20px; border-top-right-radius: 20px;
  border: 1.5px solid var(--border);
  border-bottom: none;
  width: 100%;
  max-height: 80%;
  display: flex; flex-direction: column;
  padding: 14px 14px 10px;
}
.modal-grabber {
  width: 40px; height: 4px;
  background: #333;
  border-radius: 2px;
  margin: 0 auto 10px;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px 10px;
  border-bottom: 1px solid #222;
  margin-bottom: 10px;
}
.modal-title { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--font); }
.modal-close { font-size: 24px; color: var(--text-dimmer); cursor: pointer; padding: 0 4px; }
.recipe-pick-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  background: var(--card); border: 1px solid var(--border-dim);
  border-radius: 10px; margin-bottom: 6px; cursor: pointer;
}
.recipe-pick-row:active { background: var(--purple-mid); border-color: var(--purple); }
.task-input {
  background: #0f0f18; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-size: 16px; color: var(--text); font-family: var(--font-input);
  width: 100%; outline: none;
}
.task-input:focus { border-color: var(--purple); }
.task-quick {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}

/* ── Recipe thumb ── */
.recipe-thumb {
  flex-shrink: 0; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: #181820; border: 1px solid #2a2a3e;
  overflow: hidden; font-family: var(--font);
}
.recipe-thumb img { width:100%; height:100%; object-fit: cover; display:block; }

/* ── Effort badge ── */
.effort-badge {
  font-size: 13px; padding: 1px 7px;
  border-radius: 6px;
  border: 1px solid currentColor;
  background: #1a1a2e;
  font-family: var(--font); white-space: nowrap;
  letter-spacing: 0.02em;
}

/* ── Icon button ── */
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px;
  cursor: pointer; color: var(--text-dimmer);
  font-size: 22px;
}
.icon-btn:active { background: var(--card2); }

/* ── Text input ── */
.text-input {
  width: 100%; background: #0f0f18; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
  color: var(--text); font-family: var(--font); font-size: 19px;
  outline: none; resize: vertical;
}
.text-input:focus { border-color: var(--purple); }

/* ── Danger button ── */
.danger-btn {
  background: #2a1420; border: 1.5px solid #5a2030; color: #e29090;
  border-radius: 10px; padding: 10px 14px; text-align: center;
  font-family: var(--font); font-size: 19px; cursor: pointer;
}
.danger-btn:active { opacity: 0.8; }

/* ── Hide scrollbars; touch swipe still works ── */
* {
  scrollbar-width: none;          /* Firefox */
  -ms-overflow-style: none;       /* old Edge / IE */
}
*::-webkit-scrollbar {
  width: 0;
  height: 0;
  display: none;                  /* Chrome / Safari */
}

/* ── Floating scroll nudge arrows ── */
.scroll-nudge {
  position: absolute;
  right: 6px;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(45, 31, 94, 0.55);   /* purple-mid @ 55% */
  color: var(--purple-light);
  border: 1px solid rgba(124, 58, 237, 0.4);
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 50;
  transition: opacity 0.15s, background 0.15s;
  backdrop-filter: blur(2px);
}
.scroll-nudge:hover { background: rgba(124, 58, 237, 0.7); }
.scroll-nudge:active { transform: scale(0.92); }
/* Pair the up + down arrows as a stacked widget at the bottom-right so the up
   arrow doesn't visually clash with the screen title at the top of the viewport. */
.scroll-nudge.up   { bottom: 116px; }
.scroll-nudge.down { bottom: 80px; }
.scroll-nudge.disabled { opacity: 0.18; pointer-events: none; }

/* ── Horizontal filter-row side arrows (Recipes tab) ── */
.h-scroll-wrap { position: relative; }
.h-scroll-wrap .h-scroll-row {
  overflow-x: auto; white-space: nowrap; display: flex; gap: 6px;
  padding-left: 22px; padding-right: 22px;            /* leave room for arrows */
  scrollbar-width: none;
}
.h-scroll-wrap .h-scroll-row::-webkit-scrollbar { display: none; }
.h-scroll-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(45, 31, 94, 0.55);
  color: var(--purple-light);
  border: 1px solid rgba(124, 58, 237, 0.4);
  font-size: 10px; line-height: 1;
  cursor: pointer; user-select: none; z-index: 5;
  transition: opacity 0.15s;
}
.h-scroll-arrow:active { transform: translateY(-50%) scale(0.9); }
.h-scroll-arrow.left  { left: 14px; }
.h-scroll-arrow.right { right: 14px; }
.h-scroll-arrow.disabled { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="root" style="color:#888;font-family:sans-serif;padding:20px">Loading…</div>
<script>
window.addEventListener('error', e => {
  document.getElementById('root').innerHTML = '<pre style="color:#f55;padding:20px;font-family:monospace;font-size:12px;white-space:pre-wrap">' + (e.message || e.error?.message || 'unknown error') + '\n\n' + (e.error?.stack || e.filename + ':' + e.lineno) + '</pre>';
});
</script>

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// Keys we don't sync — purely local bookkeeping.
const SKIP_PREFIXES = ['ab.migration.', 'ab.lastSync'];
const shouldSync = k =>
  typeof k === 'string' && k.startsWith('ab.') &&
  !SKIP_PREFIXES.some(p => k.startsWith(p));

const origSetItem = localStorage.setItem.bind(localStorage);
const origRemoveItem = localStorage.removeItem.bind(localStorage);

let currentUser = null;
let pulling = false;     // suppress push during pull
let pushTimer = null;

function snapshotLocal() {
  const out = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (shouldSync(k)) out[k] = localStorage.getItem(k);
  }
  return out;
}

async function pushNow() {
  if (!currentUser || pulling) return;
  try {
    const ts = Date.now();
    const data = snapshotLocal();
    await setDoc(doc(db, 'households', currentUser.uid), {
      data,
      updatedAt: serverTimestamp(),
      clientUpdatedAt: ts,
    });
    origSetItem('ab.lastSync', String(ts));
    console.log('[AB sync] pushed', Object.keys(data).length, 'keys');
  } catch (e) {
    console.warn('[AB sync] push failed', e);
  }
}

function schedulePush() {
  if (!currentUser || pulling) return;
  if (pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(() => { pushTimer = null; pushNow(); }, 2000);
}

localStorage.setItem = function(k, v) {
  origSetItem(k, v);
  if (shouldSync(k)) schedulePush();
};
localStorage.removeItem = function(k) {
  origRemoveItem(k);
  if (shouldSync(k)) schedulePush();
};

async function pullFromCloud(user, opts = {}) {
  const { force = false } = opts;
  try {
    const snap = await getDoc(doc(db, 'households', user.uid));
    if (!snap.exists()) {
      // First time on this account — push local state up to seed the cloud doc.
      console.log('[AB sync] no cloud doc yet, seeding from local');
      await pushNow();
      return;
    }
    const cloud = snap.data();
    const cloudUpdated = cloud.clientUpdatedAt || 0;
    const lastSync = parseInt(localStorage.getItem('ab.lastSync') || '0', 10);
    if (!force && cloudUpdated <= lastSync) {
      console.log('[AB sync] cloud not newer than last sync, skip pull');
      return;
    }
    pulling = true;
    // Wipe local ab.* keys then write cloud values, then reload so React
    // re-reads its initial state from the freshly-populated localStorage.
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (shouldSync(k)) keysToRemove.push(k);
    }
    keysToRemove.forEach(k => origRemoveItem(k));
    const data = cloud.data || {};
    Object.keys(data).forEach(k => origSetItem(k, data[k]));
    origSetItem('ab.lastSync', String(cloudUpdated));
    pulling = false;
    console.log('[AB sync] pulled', Object.keys(data).length, 'keys, reloading');
    window.location.reload();
  } catch (e) {
    console.warn('[AB sync] pull failed', e);
    pulling = false;
  }
}

const authListeners = new Set();
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) await pullFromCloud(user);
  authListeners.forEach(cb => { try { cb(user); } catch {} });

// common "I edited on the other device, switch back here" case without any
// manual refresh — and only fires when switching INTO the app, so we never

let lastAutoPull = 0;
function maybeAutoPull() {
  if (!currentUser) return;

  // skipping rapid focus events (alt-tab, multitask switcher peek)
  // saves Firestore reads. Manual ↻ refresh always works regardless.
  const now = Date.now();
  if (now - lastAutoPull < 60000) return;
  lastAutoPull = now;
  pullFromCloud(currentUser);
}
window.addEventListener('focus', maybeAutoPull);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') maybeAutoPull();
});

window.AB_FB = {
  ready: true,
  getUser: () => currentUser,
  onAuth: (cb) => {
    authListeners.add(cb);
    cb(currentUser);
    return () => authListeners.delete(cb);

  signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
  createAccount: (email, password) => createUserWithEmailAndPassword(auth, email, password),
  signOut: async () => {
    if (pushTimer) { clearTimeout(pushTimer); pushTimer = null; }
    await fbSignOut(auth);
    currentUser = null;
  },
  syncNow: () => pushNow(),
  pullNow: () => currentUser ? pullFromCloud(currentUser, { force: true }) : Promise.resolve(),
};
</script>

<script type="text/babel" data-presets="react">

  'garlic powder','onion powder','paprika','smoked paprika','cumin','oregano','basil','thyme','rosemary','sage','dill',
  'chili powder','cinnamon','nutmeg','ginger powder','turmeric','curry powder','allspice','cloves','bay leaves',

  // Oils & vinegars
  'olive oil','extra-virgin olive oil','vegetable oil','canola oil','sesame oil','avocado oil','coconut oil','cooking spray',
  'vinegar','apple cider vinegar','balsamic vinegar','red wine vinegar','rice vinegar','white vinegar',

  // Baking

// Each pattern carries a `label` — the deduped concept shown to the user.
// "vegetable oil", "olive oil", "sesame oil" all collapse to one "oil" pill in
// the preview modal. Without labels every ingredient variant got its own row,
// which made the list noisy.
const PANTRY_PATTERNS = [
  { re: /\b\w+\s+oil\b/i, label: 'oil' },
  { re: /\bseasoning\b/i, label: 'seasoning' },
  { re: /\bspices?\b/i, label: 'spice' },
  { re: /\bdried\s+\w+\s+(herbs|herb)\b/i, label: 'dried herbs' },
  { re: /\b(rub|blend)\b/i, label: 'rub/blend' },
  { re: /\b\w+\s+vinegar\b/i, label: 'vinegar' },
  { re: /\b\w+\s+powder\b/i, label: 'powder' },
  { re: /\b\w+\s+flakes?\b/i, label: 'flakes' },
  { re: /\bsalt\b/i, label: 'salt' },
  { re: /\bpepper\b/i, label: 'pepper' },
  { re: /\bsugar\b/i, label: 'sugar' },
];

// Map every recipe ingredient to a single deduped pantry "concept" — or null
// if it's not pantry. The concept key is what the preview modal shows the user
// and what excludedStaples uses to opt items back onto the grocery list. Using
// a concept (e.g. "salt", "oil") instead of the raw ingredient string ("kosher
// salt", "vegetable oil") collapses near-duplicates so the user sees a short,
// readable list.
//
// Resolution order: most-specific staple first (longer staples win over
// shorter ones, so "garlic powder" beats "garlic"), then PANTRY_PATTERNS,
// then null. Without preferring longer staples, "garlic powder" would
// substring-match "garlic" and lose its specificity.
// Word-boundary phrase match. Allows optional trailing 's' for simple plurals
// ("italian seasonings" matches "italian seasoning"). Avoids the silent
// substring bug where "italian sausage links" was misclassified as "sage"
// because plain String.includes treated "sa[sage]" as a match.
function pantryPhraseMatch(haystack, needle) {
  if (!haystack || !needle) return false;
  if (haystack === needle) return true;
  const escape = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`\\b${escape(needle)}s?\\b`, 'i');
  return re.test(haystack);
}

function classifyPantry(pantryStaples) {
  const stapleList = [...new Set((pantryStaples || []).map(s => s.toLowerCase()).filter(Boolean))]
    .sort((a, b) => b.length - a.length);
  return (ing) => {
    if (!ing) return null;
    const lo = ing.toLowerCase();
    for (const p of stapleList) {
      // Bidirectional phrase match: "kosher salt" matches staple "salt"
      // (staple is a phrase inside ingredient), and ingredient "ginger" matches
      // staple "ginger powder" (ingredient is a phrase inside staple).
      if (pantryPhraseMatch(lo, p) || pantryPhraseMatch(p, lo)) return p;
    }
    for (const { re, label } of PANTRY_PATTERNS) {
      if (re.test(lo)) return label;
    }
    return null;
  };

function makeIsPantry(pantryStaples) {
  const classify = classifyPantry(pantryStaples);

}

// Walk a perDay plan and return the pantry concepts the picker's recipes
// would skip from the grocery list. Each entry covers one or more ingredient
// variants that all map to the same concept, so the user sees a short list of
// the *kinds* of pantry items being assumed (one "oil" pill, not three).
// Returns [{ key, name, ingredients: string[], sources: string[] }] sorted by name.
function collectPantryUsage(perDay, classify) {
  const out = {}; // key → { key, name, ingredients: Set, sources: Set }
  (perDay || []).forEach(({ dt, dinner, breakfast, breakfasts }) => {
    const recipes = [];
    if (dinner) recipes.push(dinner);
    if (Array.isArray(breakfasts) && breakfasts.length) recipes.push(...breakfasts);
    else if (breakfast) recipes.push(breakfast);
    recipes.forEach(r => {
      (r.ingredients || []).forEach(ing => {
        if (!ing) return;
        const key = classify(ing);
        if (!key) return;
        if (!out[key]) out[key] = { key, name: key, ingredients: new Set(), sources: new Set() };
        out[key].ingredients.add(ing);
        out[key].sources.add(`${dt} · ${r.name}`);
      });
    });
  });
  return Object.values(out)
    .map(x => ({ key: x.key, name: x.name, ingredients: [...x.ingredients], sources: [...x.sources] }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function recipeMinutes(r) {
  if (typeof r.estMinutes === 'number') return r.estMinutes;
  if (typeof r.time === 'string') {
    const m = r.time.match(/\d+/);
    if (m) return parseInt(m[0], 10);
  }
  return 60;
}
function isBreakfastRecipe(r) { return (r.tags || []).includes('breakfast'); }
function isFastRecipe(r) { return (r.tags || []).includes('fast'); }
function isDinnerRecipe(r) {
  const t = r.tags || [];
  // 'sides' wins over 'dinner' — side dishes (fries, salads, slaws) accompany
  // a main, never act as one. Excluded from auto-plan candidate pool entirely
  // (still findable manually & addable to a day via "Add to calendar").
  if (t.includes('sides')) return false;
  if (t.includes('dinner')) return true;
  return !t.includes('breakfast') && !t.includes('snack') && !t.includes('dessert');
}
function isAutoplanEligible(r) {
  // Exclude crockpot/slow-cooker recipes from auto-plan candidates (still findable manually)
  return isDinnerRecipe(r) && !(r.tags || []).includes('slow-cooker');
}

/* ═══════════════════════════════════════════
   EFFORT / IMAGE HELPERS
═══════════════════════════════════════════ */
function effortLevel(r) {
  const c = (r.complexity || '').toLowerCase();
  if (c === 'light') return 'low';
  if (c === 'heavy') return 'high';
  return 'med';
}
function effortLabel(r) {
  const lv = effortLevel(r);
  return lv === 'low' ? 'Low' : lv === 'high' ? 'High' : 'Med';
}

  return lv === 'low' ? '#7ed3a0' : lv === 'high' ? '#e8a070' : '#a78bfa';
}
// Stable hash → seed so the same recipe always gets the same image.
function recipeSeed(r) {
  const s = (r && (r.name || r.url) || '').toLowerCase();
  let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h) || 1;
}

// Strip stop words and non-food words from a recipe name to get search keywords.
const RECIPE_STOP = new Set([
  'easy','quick','best','simple','homemade','recipe','recipes','the','a','an',
  'of','in','on','with','and','for','to','your','my','our','sheet','pan','pot',
  'one','two','three','four','five','minute','minutes','min','style','classic',
  'creamy','crispy','crunchy','tasty','delicious','perfect','ultimate','favorite',
]);
function recipeKeywords(name) {
  return (name || 'food').toLowerCase()
    .split(/[^a-z]+/)
    .filter(w => w.length > 2 && !RECIPE_STOP.has(w))
    .slice(0, 3);
}

// Ordered list of image sources to try. Real photos first, AI as a fallback,
// emoji as the very last resort. RecipeThumb cycles through them on <img> error.
function recipePhotoSources(r, w, h) {
  const W = w || 600, H = h || 400;
  const seed = recipeSeed(r);
  const name = (r && r.name) || 'home cooked meal';
  const kws = recipeKeywords(name);
  const tags = ['food', ...kws].join(',');
  const out = [];
  // og:image captured during URL import — always preferred when present
  if (r && r.image) out.push(r.image);
  // Loremflickr: real Flickr photos tagged "food" + recipe keywords. Free, no key.
  out.push(`https://loremflickr.com/${W}/${H}/${encodeURIComponent(tags)}?lock=${seed}`);
  // Pollinations: AI-generated food photo. Last-resort image before the emoji.
  const prompt = encodeURIComponent(`professional food photography, overhead shot, ${name}, on a plate`);
  out.push(`https://image.pollinations.ai/prompt/${prompt}?width=${W}&height=${H}&nologo=true&seed=${seed}`);
