}

function fallbackEmoji(r) {
  if (r && r.emoji) return r.emoji;
  const t = (r && r.tags) || [];
  if (t.includes('breakfast')) return '🥞';
  if (t.includes('dessert')) return '🍪';
  if (t.includes('soup')) return '🍲';
  if (t.includes('salad')) return '🥗';
  if (t.includes('pasta')) return '🍝';
  if (t.includes('seafood')) return '🍤';
  if (t.includes('fish')) return '🐟';
  if (t.includes('beef')) return '🥩';
  if (t.includes('chicken')) return '🍗';
  if (t.includes('pork')) return '🥓';
  if (t.includes('vegetarian') || t.includes('vegan')) return '🥗';
  return '🍽️';
}
function RecipeThumb({ recipe, size }) {
  const s = size || 52;
  const [idx, setIdx] = useState(0);
  const sources = recipePhotoSources(recipe, s * 2, s * 2);
  const emoji = fallbackEmoji(recipe);
  const fontSize = Math.max(18, Math.round(s * 0.48));
  return (
    <div className="recipe-thumb" style={{ width: s, height: s, fontSize }}>
      {idx < sources.length
        ? <img src={sources[idx]} alt="" onError={() => setIdx(idx + 1)} />
        : <span>{emoji}</span>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   LLM HELPERS — Claude API + page fetch
═══════════════════════════════════════════ */
const RECIPE_SCHEMA_PROMPT = `You ingest recipes for a meal-planning app. Return ONLY valid JSON (no prose, no markdown fences) matching this exact shape:

{
  "name": string,
  "url": string,
  "servings": number,
  "ingredients": string[],
  "ingredientsWithQty": string[],
  "steps": string[],
  "activeMinutes": number,
  "passiveMinutes": number,
  "complexity": "Light" | "Medium" | "Heavy",
  "dishCount": number,
  "tags": string[],
  "emoji": string
}

Rules — apply consistently:

INGREDIENTS: short noun phrases, no quantities/units/parens. Strip prep verbs (minced, chopped, sliced, grated, shredded, fresh, diced, halved, thinly, finely, softened, drained, rinsed, "boneless skinless", large, "for serving", "for garnish", "to taste"). Keep "ground", "dried", "frozen", "whole", "low-fat", "extra-virgin" only if material to what to buy.

INGREDIENTS_WITH_QTY: parallel array, SAME LENGTH and ORDER as ingredients. Each entry includes the original quantity + unit + ingredient as stated in the recipe (e.g. "2 lbs chicken breasts", "1 cup soy sauce", "3 cloves garlic"). If the recipe says "to taste" or no quantity, use just the ingredient phrase. Do NOT strip prep verbs here — keep the full original phrasing.

STEPS: numbered cooking steps, concise (one sentence each).

ACTIVE MINUTES (hands-on): chopping, measuring, mixing, searing, sautéing constant-stir, assembling, stuffing, breading, rolling, layering, finishing.
PASSIVE MINUTES (unattended): oven baking after putting in, simmering on low after established, slow cooker/braise, marinate, chill, rise, covered rice cooking.

COMPLEXITY (most demanding criterion wins):
- Light: ≤8 ingredients AND ≤2 dishes AND single technique (mix-and-bake, marinade-and-roast, simple sauté, dump-and-go slow cooker).
- Medium: 9-14 ingredients OR 3 dishes OR sear-then-simmer / breading / layering.
- Heavy: 15+ ingredients OR multi-component build OR fiddly technique (stuffing, rolling, risotto-style stir, fry-then-bake, multiple from-scratch components).

SERVINGS: integer (lower bound if range). Meatloaf=6, casseroles=8, loaf=6.
DISH COUNT: pots/pans/bowls/sheet pans/blender, each = 1.

TAGS — only from this list: breakfast, lunch, dinner, snack, dessert, soup, salad, sides, chicken, beef, pork, fish, seafood, vegetarian, vegan, pasta, sheet-pan, one-pot, slow-cooker, instant-pot, kid-friendly, fast.
- breakfast for muffins, oatmeal, pancakes, overnight oats, granola bars; otherwise default dinner.
- sides for accompaniments meant to go ALONGSIDE a main: fries, roasted/glazed vegetables, slaws, simple grain or potato sides, dips, dinner salads, garlic bread. If you tag sides, do NOT also tag dinner — sides are excluded from dinner auto-planning.
- One protein tag from title first, ingredients second. Turkey → chicken. Shrimp/scallops/crab/lobster → seafood. Finned fish → fish.
- vegetarian only if zero animal protein; vegan also requires no dairy or egg.
- pasta if pasta type in title or ingredients.
- sheet-pan / one-pot / slow-cooker / instant-pot only if title or method centrally features it.
- fast if activeMinutes ≤ 30 AND dishCount ≤ 2.
- kid-friendly for muffins, pancakes, granola bars, mac and cheese, meatballs, sloppy joe, baked ziti, baked spaghetti, chicken parm, tacos, sweet potato fries, chocolate chip / banana / carrot cake.

EMOJI: one cooking-related emoji that best represents the dish (e.g. 🍝 🍕 🥘 🍲 🥗 🍣 🌮 🍔 🍳 🥞 🧇 🥯 🥖 🍪 🥧 🌯 🍱 🍤 🍜 🥟 🍛 🥪 🌭 🥙 🍖 🍗 🥩 🐟 🦐).

Output JSON only.`;

async function callClaude({ apiKey, system, user, model }) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: model || 'claude-sonnet-4-6',
      max_tokens: 4096,
      system,
      messages: [{ role: 'user', content: user }],
    }),
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Claude API ${resp.status}: ${text.slice(0, 400)}`);
  }
  const data = await resp.json();
  const block = (data.content || []).find(c => c.type === 'text');
  return block ? block.text : '';
}

// LLM grocery classification. Returns BOTH the display category AND whether
// the item is a "staple" — something users typically already have in their
// kitchen and don't need to add to a grocery list (spices, oils, vinegars,
// seasoning blends, salt, pepper, baking soda, etc). Rules are only a fallback
// while the LLM hasn't responded yet. Cached forever.
const CAT_LABELS = ['🥬 Produce','🥩 Meat & Fish','🥛 Dairy & Eggs','🍞 Bakery','🧊 Frozen','🥫 Pantry','🥤 Beverages','🛒 Other'];
async function classifyGroceriesWithLLM({ apiKey, names }) {
  if (!apiKey || !names || !names.length) return {};
  const system = `You classify grocery items. For each item return:
- category: one of these exact labels — ${CAT_LABELS.join(' / ')}
- isStaple: true if it's something most home kitchens already have on hand and
  the user probably should NOT add to a grocery list. Examples of staples:
  spices and dried herbs (italian seasoning, oregano, paprika, cumin, cinnamon,
  red pepper flakes, taco seasoning, italian herb seasoning blend, salt, black
  pepper), oils (olive oil, sesame oil, vegetable oil, canola oil), vinegars
  (apple cider vinegar, rice vinegar, balsamic), basic baking (flour, sugar,
  brown sugar, baking soda, baking powder, vanilla extract, cornstarch, cocoa
  powder), basic condiments (soy sauce, hot sauce, ketchup, mustard, mayo,
  honey, maple syrup, worcestershire), aromatics (garlic, onion). NOT staples:
  fresh produce, meat/fish, dairy, fresh herbs, pasta, rice, beans, specialty
  ingredients (boursin, panko, coconut milk, tomato sauce, fresh ginger if
  qty-specific). When in doubt, isStaple=false.

Return ONLY JSON, no prose, no markdown. Shape:
{ "<item name as given>": { "category": "<exact label>", "isStaple": <true|false> } }`;
  const user = `Classify each of these grocery items:\n${JSON.stringify(names)}\n\nReturn the JSON mapping.`;
  const text = await callClaude({ apiKey, system, user });
  const parsed = extractJson(text);
  // Normalize: keep only entries with a valid category. Tolerate the older
  // string-only shape ({ "<name>": "<label>" }) for backward compatibility.
  const out = {};
  Object.entries(parsed).forEach(([k, v]) => {
    if (typeof v === 'string' && CAT_LABELS.includes(v)) {
      out[k] = { category: v, isStaple: false };
    } else if (v && typeof v === 'object' && CAT_LABELS.includes(v.category)) {
      out[k] = { category: v.category, isStaple: !!v.isStaple };
    }
  });
  return out;
}

function extractJson(text) {
  if (!text) throw new Error('Empty response from Claude');
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  let raw = (fence ? fence[1] : text).trim();
  if (!raw.startsWith('{')) {
    const first = raw.indexOf('{');
    const last = raw.lastIndexOf('}');
    if (first >= 0 && last > first) raw = raw.slice(first, last + 1);
  }
  return JSON.parse(raw);
}

// Recipe sites (delish, NYT, Bon Appetit) commonly 403 the most popular CORS proxies
// because the proxies share an IP that the sites have block-listed. We try a chain.
const CORS_PROXIES = [
  (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  // r.jina.ai returns clean extracted text (loses og:image but recipe still parses)
  (u) => `https://r.jina.ai/${u}`,
];
async function fetchPageHtml(url) {
  const errors = [];
  for (const build of CORS_PROXIES) {
    try {
      const resp = await fetch(build(url));
      if (resp.ok) {
        const text = await resp.text();
        if (text && text.length > 200) return text;
        errors.push(`empty body from ${build(url).split('/')[2]}`);
      } else {
        errors.push(`${resp.status} from ${build(url).split('/')[2]}`);
      }
    } catch (e) {
      errors.push(`${e.message || 'fetch error'} from ${build(url).split('/')[2]}`);
    }
  }
  throw new Error(`All proxies failed: ${errors.join('; ')}`);
}

function extractOgImage(html) {
  const patterns = [
    /<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i,
    /<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i,
    /<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i,
  ];
  for (const p of patterns) {
    const m = html.match(p);
    if (m) return m[1];
  }
  return null;
}

function trimHtmlForLlm(html, max) {
  const limit = max || 80000;
  let body = html.match(/<body[\s\S]*?<\/body>/i);
  let text = body ? body[0] : html;
  text = text.replace(/<script[\s\S]*?<\/script>/gi, '')
             .replace(/<style[\s\S]*?<\/style>/gi, '')
             .replace(/<svg[\s\S]*?<\/svg>/gi, '')
             .replace(/<!--[\s\S]*?-->/g, '');
  if (text.length > limit) text = text.slice(0, limit);
  return text;
}

function normalizeRecipeFromLlm(parsed, fallback) {
  const ingredients = Array.isArray(parsed.ingredients) ? parsed.ingredients.filter(Boolean) : [];
  let ingredientsWithQty = Array.isArray(parsed.ingredientsWithQty) ? parsed.ingredientsWithQty : [];
  // Pad/truncate so the parallel array always lines up with `ingredients`
  if (ingredientsWithQty.length < ingredients.length) {
    ingredientsWithQty = [
      ...ingredientsWithQty,
      ...ingredients.slice(ingredientsWithQty.length),
    ];
  } else if (ingredientsWithQty.length > ingredients.length) {
    ingredientsWithQty = ingredientsWithQty.slice(0, ingredients.length);
  }
  const out = {
    name: parsed.name || (fallback && fallback.name) || 'Untitled Recipe',
    url: parsed.url || (fallback && fallback.url) || '',
    servings: typeof parsed.servings === 'number' ? parsed.servings : 4,
    ingredients,
    ingredientsWithQty,
    steps: Array.isArray(parsed.steps) ? parsed.steps.filter(Boolean) : [],
    activeMinutes: typeof parsed.activeMinutes === 'number' ? parsed.activeMinutes : 30,
    passiveMinutes: typeof parsed.passiveMinutes === 'number' ? parsed.passiveMinutes : 0,
    complexity: ['Light','Medium','Heavy'].includes(parsed.complexity) ? parsed.complexity : 'Medium',
    dishCount: typeof parsed.dishCount === 'number' ? parsed.dishCount : 2,
    tags: Array.isArray(parsed.tags) ? parsed.tags : ['dinner'],
    emoji: parsed.emoji || '🍽️',
  };
  out.estMinutes = Math.max(out.activeMinutes, out.passiveMinutes) + 5;
  // ensure 'fast' tag matches rule
  const isFast = out.activeMinutes <= 30 && out.dishCount <= 2;
  if (isFast && !out.tags.includes('fast')) out.tags.push('fast');
  if (!isFast) out.tags = out.tags.filter(t => t !== 'fast');
  if (fallback && fallback.image) out.image = fallback.image;
  return out;
}

// Map any common spelling/abbreviation of a weekday to the 3-letter code we use.
const DAY_NAME_TO_ABBR = {
  mon:'Mon', monday:'Mon',
  tue:'Tue', tues:'Tue', tuesday:'Tue',
  wed:'Wed', weds:'Wed', wednesday:'Wed',
  thu:'Thu', thur:'Thu', thurs:'Thu', thursday:'Thu',
  fri:'Fri', friday:'Fri',
  sat:'Sat', saturday:'Sat',
  sun:'Sun', sunday:'Sun',
};

// Look for "<task word> ... <weekday>" or "<weekday> ... <task word>" within ~30
// chars. Returns { taskName: 'Tue', ... } for tasks the user explicitly placed.
// Words shorter than 4 chars are ignored to avoid noise like "do", "out".
function parseTaskDayAssignments(instructions, taskNames) {
  if (!instructions) return {};
  const lo = instructions.toLowerCase();
  const out = {};
  for (const taskName of taskNames) {
    // Split on any non-word run so parens/punctuation in names like
    // "Healthy Chocolate Muffins (with Veggies!)" don't bleed into the regex
    // we build below. Without this, words like "(with" caused
    // "Unterminated group" runtime errors when injected into new RegExp.
    const words = taskName.toLowerCase().split(/[^a-z0-9]+/).filter(w => w.length > 3);
    // Across all keyword occurrences, rank candidate weekdays by absolute char
    // distance from the keyword. Closest wins. Without this, "laundry thursday,
    // pancakes saturday" parses as Pancakes→Thu because thursday comes earlier
    // in iteration order than saturday — even though saturday is much closer.
    let best = null; // { abbr, dist }
    for (const w of words) {
      const re = new RegExp(`\\b${w}\\b`, 'g');
      let m;
      while ((m = re.exec(lo)) !== null) {
        const taskPos = m.index;
        const winStart = Math.max(0, taskPos - 30);
        const winEnd = taskPos + w.length + 30;
        const window = lo.slice(winStart, winEnd);
        const taskInWin = taskPos - winStart;
        for (const [name, abbr] of Object.entries(DAY_NAME_TO_ABBR)) {
          const dayRe = new RegExp(`\\b${name}\\b`, 'g');
          let dm;
          while ((dm = dayRe.exec(window)) !== null) {
            const dist = Math.abs(dm.index - taskInWin);
            if (!best || dist < best.dist) best = { abbr, dist };
          }
        }
      }
    }
    if (best) out[taskName] = best.abbr;
  }
  return out;
}

/* Detect groups of names the user wants on the same day. Strict — requires an
   explicit cue ("same day", "together", or "on the same") that sits BETWEEN
   the two keywords or within ~15 chars after the second one. The narrow trailing
   window prevents "pancakes and muffins same day; granola and yogurt together"
   from spuriously pairing pancakes+granola via cues that belong to the next
   phrase.
   Returns Array<string[]> — each inner array is a group of names. */
function parseSameDayGroups(instructions, names) {
  if (!instructions || !names || names.length < 2) return [];
  const lo = instructions.toLowerCase();
  // For each name, collect EVERY word > 3 chars as a candidate keyword.
  // Picking one per name (e.g. always-longest) breaks when the user types a
  // shorthand: "Buttermilk Pancakes" → user writes "pancakes", but if we only
  // tried the longest word "buttermilk", the regex wouldn't match.
  const nameToWords = {};
  for (const name of names) {
    const ws = name.toLowerCase().split(/[^a-z0-9]+/).filter(w => w.length > 3);
    if (ws.length) nameToWords[name] = ws;
  }
  const namesWithWords = Object.keys(nameToWords);
  if (namesWithWords.length < 2) return [];
  const CUE_RE = /\b(same day|together|on the same)\b/;
  const groupMap = {}; // sorted-pair key → Set(names)
  for (let i = 0; i < namesWithWords.length; i++) {
    for (let j = i + 1; j < namesWithWords.length; j++) {
      const a = namesWithWords[i], b = namesWithWords[j];
      // Try every cross-product word pair. If ANY pair matches with a cue
      // in scope, treat the dish names as same-day.
      let matched = false;
      outer: for (const w1 of nameToWords[a]) {
        for (const w2 of nameToWords[b]) {
          if (w1 === w2) continue;
          // Capture text BETWEEN the two keywords (cap1) and immediately after
          // the second keyword (cap2 — only ~15 chars to avoid bleeding into
          // the next clause). Cue must appear in cap1 OR cap2.
          const reA = new RegExp(`\\b${w1}\\b([\\s\\S]{0,40})\\b${w2}\\b([\\s\\S]{0,15})`, 'g');
          const reB = new RegExp(`\\b${w2}\\b([\\s\\S]{0,40})\\b${w1}\\b([\\s\\S]{0,15})`, 'g');
          const ms = [...lo.matchAll(reA), ...lo.matchAll(reB)];
          for (const m of ms) {
            const between = m[1] || '';
            const after = m[2] || '';
            if (CUE_RE.test(between) || CUE_RE.test(after)) {
              matched = true;
              break outer;
            }
          }
        }
      }
      if (matched) {
        const key = [a, b].sort().join('||');
        if (!groupMap[key]) groupMap[key] = new Set();
        groupMap[key].add(a);
        groupMap[key].add(b);
      }
    }
  }
  // Merge overlapping groups (e.g. {A,B} and {B,C} → {A,B,C})
  let groups = Object.values(groupMap).map(s => [...s]);
  let merged = true;
  while (merged) {
    merged = false;
    outer: for (let i = 0; i < groups.length; i++) {
      for (let j = i + 1; j < groups.length; j++) {
        if (groups[i].some(n => groups[j].includes(n))) {
          groups[i] = [...new Set([...groups[i], ...groups[j]])];
          groups.splice(j, 1);
          merged = true;
          break outer;
        }
      }
    }
  }
  return groups;
}

// Map from protein/style words the user might type → the canonical recipe tag.
// Multiple words can collapse to one tag (turkey is grouped under chicken in
// the schema; salmon/tuna/etc. is fish).
const PROTEIN_WORDS = {
  chicken: ['chicken', 'turkey', 'poultry'],
  beef: ['beef', 'steak'],
  pork: ['pork', 'ham', 'bacon'],
  fish: ['fish', 'salmon', 'tuna', 'cod', 'tilapia', 'halibut'],
  seafood: ['seafood', 'shrimp', 'shellfish', 'scallop', 'crab', 'lobster'],
  pasta: ['pasta', 'noodle', 'noodles'],
  vegetarian: ['vegetarian', 'veggie', 'meatless'],
};
// Words → counts. "no/skip/avoid" map to 0 (zero-cap).
const COUNT_WORDS = {
  no: 0, never: 0, none: 0, zero: 0, skip: 0, avoid: 0,
  one: 1, once: 1, single: 1, a: 1, an: 1,
  two: 2, twice: 2,
  three: 3, thrice: 3,
  four: 4,
  five: 5,
};
function wordToCount(s) {
  if (s === undefined || s === null) return null;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  return COUNT_WORDS[s] !== undefined ? COUNT_WORDS[s] : null;
}

// Pick the recipe's primary protein tag (used for protein-count enforcement).
// Returns null for vegetarian/vegan/non-protein recipes — those don't count
// against any protein cap. Tag order matters: `chicken` first so a recipe
// tagged ['chicken','pasta'] counts as chicken (the dominant protein), not
// pasta (which is a style).
function proteinTagOf(recipe) {
  if (!recipe || !Array.isArray(recipe.tags)) return null;
  for (const p of ['chicken', 'beef', 'pork', 'fish', 'seafood']) {
    if (recipe.tags.includes(p)) return p;
  }
  // Pasta-only (no animal protein) counts as its own bucket so the user can
  // cap "pasta one night". Vegetarian/vegan are also their own buckets.
  if (recipe.tags.includes('pasta')) return 'pasta';
  if (recipe.tags.includes('vegetarian') || recipe.tags.includes('vegan')) return 'vegetarian';
  return null;
}

// Parse "chicken one night only" / "no fish" / "two beef nights" / "1 pasta
// night" out of the user's instructions. Returns { tag: maxCount, ... } —
// each entry is a HARD ceiling (the plan should never have MORE of that
// protein than the value, though it can have less). Conservative: only
// matches when both a protein word AND a count/limit word appear close
// together with a "night/day/time/meal" anchor (or a "no/skip" prefix).
function parseProteinConstraints(instructions) {
  if (!instructions) return {};
  const txt = instructions.toLowerCase();
  const out = {};
  const setMin = (tag, n) => {
    if (n === null || n === undefined) return;
    if (out[tag] === undefined || n < out[tag]) out[tag] = n;
  };
  for (const [tag, words] of Object.entries(PROTEIN_WORDS)) {
    for (const w of words) {
      // Pattern: "no/skip/avoid <protein>"
      if (new RegExp(`\\b(?:no|skip|avoid|never)\\s+${w}\\b`).test(txt)) {
        setMin(tag, 0);
      }
      // Pattern A: "<protein> ... <count> ... night/day/time/meal[s]"
      const reA = new RegExp(`\\b${w}\\b[^.,!?]{0,40}?\\b(\\d+|one|two|three|four|five|once|twice|thrice|single|no|never)\\b[^.,!?]{0,20}?\\b(?:night|day|time|meal)s?\\b`, 'g');
      let m;
      while ((m = reA.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
      // Pattern B: "<count> ... <protein> ... night/day"
      const reB = new RegExp(`\\b(\\d+|one|two|three|four|five|once|twice|thrice|single)\\b[^.,!?]{0,30}?\\b${w}\\b[^.,!?]{0,30}?\\b(?:night|day|time|meal)s?\\b`, 'g');
      while ((m = reB.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
      // Pattern C: "<count> night[s] of <protein>"
      const reC = new RegExp(`\\b(\\d+|one|two|three|four|five|once|twice|thrice|single)\\b\\s+(?:night|day|time|meal)s?\\s+(?:of\\s+)?${w}\\b`, 'g');
      while ((m = reC.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
      // Pattern D: "only/just/at most <count> ... <protein>"
      const reD = new RegExp(`\\b(?:only|just|at\\s+most)\\s+(\\d+|one|two|three|four|five|once|twice|thrice|single)\\b[^.,!?]{0,20}?\\b${w}\\b`, 'g');
      while ((m = reD.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
      // Pattern E: bare frequency adverbs adjacent to the protein word ("fish
      // twice", "chicken once") — count even without a night/day anchor.
      const reE1 = new RegExp(`\\b${w}\\b\\s+(once|twice|thrice)\\b`, 'g');
      while ((m = reE1.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
      const reE2 = new RegExp(`\\b(once|twice|thrice)\\b\\s+(?:a\\s+week\\s+)?${w}\\b`, 'g');
      while ((m = reE2.exec(txt)) !== null) setMin(tag, wordToCount(m[1]));
    }
  }
  return out;
}

// Tasks claim their preferred day FIRST (laundry → Tue/Wed). Breakfast prep is
// then placed around them. A day can hold both — both push the dinner toward fast.
function assignTasks(dinnerDays, _ignored, activeTasks) {
  const tasksByDt = {};
  const taken = new Set();
  const isLaundry = (n) => /laundry/i.test(n || '');
  for (const taskName of activeTasks) {
    const eligible = dinnerDays.filter(d => !taken.has(d.dt));
    if (!eligible.length) continue;
    let pick;
    if (isLaundry(taskName)) {
      pick = eligible.find(d => d.d === 'Tue')
          || eligible.find(d => d.d === 'Wed')
          || eligible[0];
    } else {
      pick = eligible[0];
    }
    (tasksByDt[pick.dt] = tasksByDt[pick.dt] || []).push(taskName);
    taken.add(pick.dt);
  }
  return tasksByDt;
}

// Pair active breakfast picks with dinner days, preferring days that DON'T already
// have a task (so we don't triple up). Overflow falls back onto task days.
// Returns { dt: [names...] } — multiple breakfasts can land on the same day if
// the user explicitly asks (handled by assignBreakfastsWithInstructions).
function assignBreakfasts(dinnerDays, tasksByDt, activeBreakfasts) {
  const breakfastByDt = {};
  const noTask = dinnerDays.filter(d => !(tasksByDt[d.dt] && tasksByDt[d.dt].length));
  const withTask = dinnerDays.filter(d => (tasksByDt[d.dt] && tasksByDt[d.dt].length));
  const order = [...noTask, ...withTask];
  activeBreakfasts.slice(0, order.length).forEach((name, i) => {
    (breakfastByDt[order[i].dt] = breakfastByDt[order[i].dt] || []).push(name);
  });
  return breakfastByDt;
}

/* Place tasks honoring explicit user weekday assignments first, then rule-based
   defaults (laundry → Tue/Wed) for whatever's left. Returns { dt: [taskName] }. */
function assignTasksWithInstructions(dinnerDays, activeTasks, instructions) {
  const explicit = instructions ? parseTaskDayAssignments(instructions, activeTasks) : {};
  const tasksByDt = {};
  const taken = new Set();
  // 1. Place explicit-weekday tasks first
  const placedExplicit = new Set();
  for (const [taskName, weekday] of Object.entries(explicit)) {
    const day = dinnerDays.find(d => d.d === weekday);
    if (!day) continue;
    (tasksByDt[day.dt] = tasksByDt[day.dt] || []).push(taskName);
    taken.add(day.dt);
    placedExplicit.add(taskName);
  }
  // 2. Place remaining tasks via rule-based defaults
  const remaining = activeTasks.filter(t => !placedExplicit.has(t));
  const fallback = assignTasks(dinnerDays.filter(d => !taken.has(d.dt)), null, remaining);
  Object.entries(fallback).forEach(([dt, ts]) => {
    tasksByDt[dt] = [...(tasksByDt[dt] || []), ...ts];
  });
  return tasksByDt;
}

/* Place breakfasts honoring explicit user weekday assignments, then spreading
   the rest across days that don't already have a task. Falls back to task days
   only if there aren't enough non-task days. Multiple breakfasts can land on
   the same day if the user explicitly groups them ("pancakes and muffins
   saturday") — the data model is { dt: [names...] }. */
function assignBreakfastsWithInstructions(dinnerDays, tasksByDt, activeBreakfasts, instructions) {
  const explicit = instructions ? parseTaskDayAssignments(instructions, activeBreakfasts) : {};
  const sameDayGroups = instructions ? parseSameDayGroups(instructions, activeBreakfasts) : [];
  const breakfastByDt = {};
  const placed = new Set();
  // 1. Place explicit-weekday breakfasts first. Multiple breakfasts landing on
  //    the same weekday all stack onto that day's array.
  for (const [bName, weekday] of Object.entries(explicit)) {
    const day = dinnerDays.find(d => d.d === weekday);
    if (!day) continue;
    (breakfastByDt[day.dt] = breakfastByDt[day.dt] || []).push(bName);
    placed.add(bName);
  }
  // 1b. For each "same day" group: if any member was placed by step 1, pull the
  //     others onto that same day. Otherwise pick a clean day for the whole group.
  const taskDays = new Set(
    Object.keys(tasksByDt).filter(dt => tasksByDt[dt] && tasksByDt[dt].length)
  );
  for (const group of sameDayGroups) {
    const validGroup = group.filter(b => activeBreakfasts.includes(b));
    if (validGroup.length < 2) continue;
    let targetDt = null;
    for (const b of validGroup) {
      if (placed.has(b)) {
        // Find which dt holds it
        for (const [dt, arr] of Object.entries(breakfastByDt)) {
          if (arr.includes(b)) { targetDt = dt; break; }
        }
        if (targetDt) break;
      }
    }
    if (!targetDt) {
      // Pick a clean (no task, no breakfast yet) day for the group
      const breakfastedDts = new Set(Object.keys(breakfastByDt));
      const candidate = dinnerDays.find(d => !taskDays.has(d.dt) && !breakfastedDts.has(d.dt))
                     || dinnerDays.find(d => !breakfastedDts.has(d.dt))
                     || dinnerDays[0];
      if (!candidate) continue;
      targetDt = candidate.dt;
    }
    for (const b of validGroup) {
      if (placed.has(b)) continue;
      (breakfastByDt[targetDt] = breakfastByDt[targetDt] || []).push(b);
      placed.add(b);
    }
  }
  // 2. Spread remaining across non-task, non-breakfast days first; then
  //    days that have a task; then days that already have a breakfast (last resort).
  // ORDERING DEPENDENCY: this Set must be rebuilt AFTER step 1b finishes mutating
  // breakfastByDt. If you ever reorder these blocks, days that received a grouped
  // breakfast in step 1b would be classified as "open" here and get a second
  // breakfast piled on top — silently double-stacking grouped days.
  const remaining = activeBreakfasts.filter(b => !placed.has(b));
  const breakfastedDts = new Set(Object.keys(breakfastByDt));
  const cleanOpen    = dinnerDays.filter(d => !taskDays.has(d.dt) && !breakfastedDts.has(d.dt));
  const taskOnlyOpen = dinnerDays.filter(d => taskDays.has(d.dt) && !breakfastedDts.has(d.dt));
  const order = [...cleanOpen, ...taskOnlyOpen];
  remaining.slice(0, order.length).forEach((name, i) => {
    (breakfastByDt[order[i].dt] = breakfastByDt[order[i].dt] || []).push(name);
  });
  return breakfastByDt;
}

/* Build the per-day descriptors that both the rule-based picker and the LLM picker need.
   Returns { dinnerDays, breakfastByDt, tasksByDt, byName, dinnerCandidates, recent }.
   When `instructions` is provided, explicit user weekday assignments ("laundry
   thursday", "pancakes saturday") take priority over rule-based defaults. */
function buildPlanContext({ recipeDB, days, breakfastPicks, tasks, avoidWeeks, cookingHistory, instructions }) {
  const dinnerDays = days.filter(d => d.on);
  const activeBreakfasts = breakfastPicks.filter(p => p && p !== BREAKFAST_NONE);
  const activeTasks = tasks.filter(t => t.on).map(t => t.name);
  // Tasks claim days first (explicit weekdays > laundry → Tue/Wed default).
  // Breakfasts then fill in, also honoring explicit weekdays, biased to non-task days.
  const tasksByDt = assignTasksWithInstructions(dinnerDays, activeTasks, instructions);
  const breakfastByDt = assignBreakfastsWithInstructions(dinnerDays, tasksByDt, activeBreakfasts, instructions);
  const byName = {};
  recipeDB.forEach(r => { byName[r.name] = r; });
  const minOffset = dinnerDays.length ? Math.min(...dinnerDays.map(d => d.weekOffset)) : 0;
  const recent = new Set(
    cookingHistory
      .filter(h => minOffset - h.weekOffset < avoidWeeks)
      .map(h => h.name)
  );
  const dinnerCandidates = recipeDB.filter(isAutoplanEligible);
  return { dinnerDays, breakfastByDt, tasksByDt, byName, dinnerCandidates, recent };
}

// ── Seeded RNG + shuffle for re-roll variety ──
// mulberry32 — small fast PRNG, good enough for shuffle seeding.
// Same seed → same sequence; different seeds → different but still
// deterministic order. Used by the pickers so that hitting Generate twice
// with identical constraints yields a different but reproducible plan.
function mulberry32(seed) {
  let s = (seed | 0) >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed) {
  const rng = mulberry32(seed || 1);
  const out = [...arr];
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

async function pickPlanWithLLM({ apiKey, recipeDB, days, breakfastPicks, tasks, avoidWeeks, cookingHistory, instructions, seed, excludeDinners }) {
  const ctx = buildPlanContext({ recipeDB, days, breakfastPicks, tasks, avoidWeeks, cookingHistory, instructions });
  const { dinnerDays, breakfastByDt, tasksByDt, byName, dinnerCandidates, recent } = ctx;
  if (dinnerDays.length === 0 || dinnerCandidates.length === 0) {
    throw new Error('No dinner days or no recipes');
  }

  const rerollSeed = Math.max(1, seed | 0);
  // Re-roll exclusion: dinners the user has already seen in earlier reroll
  // attempts of the same constraint session. Filter them out of the candidate
  // pool entirely so the LLM literally cannot pick them. Soft fallback: if
  // exclusion would leave fewer candidates than days to plan, fall back to the
  // full pool — better a repeat than an empty plate.
  const excludeSet = new Set(excludeDinners || []);
  const excludedCandidates = excludeSet.size
    ? dinnerCandidates.filter(r => !excludeSet.has(r.name))
    : dinnerCandidates;
  const usingExclusion = excludeSet.size > 0 && excludedCandidates.length >= dinnerDays.length;
  const effectiveCandidates = usingExclusion ? excludedCandidates : dinnerCandidates;

  // Parse protein-count caps out of the user's instructions ("chicken one
  // night only", "no fish", "two beef nights"). These are HARD caps — the
  // post-validation loop below swaps any over-budget picks for non-conflicting
  // alternatives. The constraints are also passed to the LLM so it tries to
  // honor them in the first place; the post-fix is a safety net for the cases
  // where it doesn't.
  const proteinCaps = parseProteinConstraints(instructions);

  // Shuffle the candidate list before sending to the LLM. Same seed → same
  // order, different seed → different order, which nudges the LLM toward
  // different picks even with identical constraints.
  const shuffledCandidates = seededShuffle(effectiveCandidates, rerollSeed * 9973 + 1);
  const slim = shuffledCandidates.map(r => ({
    name: r.name,
    tags: (r.tags || []).filter(t => t !== 'dinner'),
    activeMinutes: r.activeMinutes ?? recipeMinutes(r),
    complexity: r.complexity || 'Medium',
    isFast: isFastRecipe(r),
    used: r.used || 0,
  }));

  const activeTaskNames = tasks.filter(t => t.on).map(t => t.name);

  const dayInfo = dinnerDays.map(d => {
    const dayBreakfasts = breakfastByDt[d.dt] || [];
    const defaultTasks = tasksByDt[d.dt] || [];
    // Count effort sources on this day. EACH breakfast counts as 1 (so two
    // breakfasts on the same day = 2 effort), each task counts as 1. Used to
    // gate dinner complexity:
    //   effortCount === 1  → preferLight (Light or Medium OK, no Heavy)
    //   effortCount >= 2   → requireLight (Light mandatory if any available)
    const effortCount = dayBreakfasts.length + defaultTasks.length;
    const isFastDay = effortCount > 0;
    const preferLight = effortCount >= 1;
    const requireLight = effortCount >= 2;
    return {
      dt: d.dt, weekday: d.d,
      breakfastPrep: dayBreakfasts.length ? dayBreakfasts : null,
      defaultTasks, effortCount, isFastDay, preferLight, requireLight,
    };
  });

  const recentList = [...recent];

  const system = `You assign dinners AND household tasks to days for a household meal planner. Honor the user's custom instructions strictly.

For each day, return ONE dinner (by exact name from the library) and a list of tasks. Constraints:
(1) days marked isFastDay MUST get a recipe with isFast=true if any are available;
(2) avoid recipes in the recentlyCooked list;
(3) do not repeat a dinner within the plan;
(4) prefer recipes with lower 'used' count when other constraints tie;
(5) if the user instructions specify a protein/recipe for a specific weekday, prioritize that above all else (it overrides isFastDay);
(6) defaultTasks and breakfastPrep are PRE-ASSIGNED for each day, already honoring any explicit weekday the user gave (e.g. "laundry thursday", "pancakes saturday", or "pancakes and muffins same day"). breakfastPrep may be null OR an array of breakfast names (multiple if the user asked for two on the same day). Echo defaultTasks back as the day's tasks unless the user's instructions add or move something. Each active task should land on at most one day across the plan.
(7) effortCount on each day = breakfastPrep array length + number of tasks. Use it to gate dinner complexity:
    - effortCount === 0: any complexity is fine.
    - effortCount === 1 (preferLight=true): Light or Medium dinner only — never Heavy.
    - effortCount >= 2 (requireLight=true): Light dinner is MANDATORY if any Light recipe is available in the library. Never Medium or Heavy on these days. These are the user's hardest days (e.g. pancakes prep + laundry, or two tasks together).
(8) spread the load: don't pile multiple effort sources on one day if other days are empty. If a user-requested specific dinner (e.g. "pasta one night") would land on a requireLight day, prefer to put it on a DIFFERENT, lighter day instead.
(9) PROTEIN CAPS are HARD limits. The user prompt includes a PROTEIN_CAPS object listing maximum dinners per protein (e.g. {"chicken": 1} means AT MOST one chicken dinner across the entire plan; {"fish": 0} means zero fish dinners). NEVER exceed these caps. If the user says "chicken one night only" and the cap is 1, exactly zero or one of your picks may have the chicken tag (turkey counts as chicken). When choosing recipes, count the protein tags as you go and stop reaching for that protein once you hit the cap.${rerollSeed > 1 ? `\n(10) THIS IS A RE-ROLL (attempt #${rerollSeed}). The user already saw plan(s) with these same constraints and wants DIFFERENT recipes this time. The DINNER LIBRARY below has already been filtered to remove recipes shown in earlier attempts — pick freely from it without trying to recreate a previous plan. Keep all hard constraints (1-9) intact. Within the candidate list, favor variety: don't gravitate to the same protein/cuisine cluster on every reroll.` : ''}

Return ONLY JSON, no prose, no markdown.`;

  const user = `USER INSTRUCTIONS:\n"""${instructions || ''}"""\n\nPROTEIN_CAPS (hard maximums — number of dinners with each protein tag the plan may contain; missing keys = unlimited):\n${JSON.stringify(proteinCaps)}\n\nDAYS TO PLAN (in order):\n${JSON.stringify(dayInfo, null, 2)}\n\nACTIVE TASKS (must each be placed at most once across the plan):\n${JSON.stringify(activeTaskNames)}\n\nDINNER LIBRARY:\n${JSON.stringify(slim, null, 2)}\n\nRECENTLY COOKED (avoid if possible):\n${JSON.stringify(recentList)}\n\nReturn JSON in this exact shape:\n{\n  "picks": [\n    { "dt": "<dt from DAYS TO PLAN>", "dinnerName": "<exact name from DINNER LIBRARY>", "tasks": ["<task name>", ...], "reason": "<one short sentence>" }\n  ]\n}`;

  const text = await callClaude({ apiKey, system, user });
  const parsed = extractJson(text);
  if (!parsed || !Array.isArray(parsed.picks)) throw new Error('Bad LLM response shape');

  const pickByDt = {};
  const tasksByDtLlm = {};
  parsed.picks.forEach(p => {
    if (!p || !p.dt) return;
    pickByDt[p.dt] = p.dinnerName;
    if (Array.isArray(p.tasks)) tasksByDtLlm[p.dt] = p.tasks.filter(Boolean);
  });

  // Validate LLM tasks: each active task must appear at most once. Drop unknown tasks.
  const taskSet = new Set(activeTaskNames);
  const placed = new Set();
  Object.keys(tasksByDtLlm).forEach(dt => {
    tasksByDtLlm[dt] = tasksByDtLlm[dt].filter(t => {
      if (!taskSet.has(t)) return false;
      if (placed.has(t)) return false;
      placed.add(t);
      return true;
    });
  });

  // Snap-back: any task the user did NOT mention in instructions gets rule-based
  // placement (Tue/Wed bias for laundry, etc.) — overrides whatever the LLM chose.
  // Only tasks the user explicitly named keep the LLM's placement.
  const instLo = (instructions || '').toLowerCase();
  const isMentioned = (taskName) =>
    taskName.toLowerCase().split(/\s+/).filter(w => w.length > 3).some(w => instLo.includes(w));

  const unmentioned = activeTaskNames.filter(t => !isMentioned(t));
  if (unmentioned.length) {
    // Strip unmentioned tasks from any day they currently sit on
    Object.keys(tasksByDtLlm).forEach(dt => {
      tasksByDtLlm[dt] = tasksByDtLlm[dt].filter(t => !unmentioned.includes(t));
    });
    // Re-place them via the rule-based picker (which biases Tue/Wed for laundry)
    const fallback = assignTasks(dinnerDays, breakfastByDt, unmentioned);
    Object.entries(fallback).forEach(([dt, ts]) => {
      tasksByDtLlm[dt] = [...(tasksByDtLlm[dt] || []), ...ts];
    });
  }

  // Any mentioned task the LLM somehow dropped → rule-based fallback
  const stillPlaced = new Set();
  Object.values(tasksByDtLlm).forEach(arr => arr.forEach(t => stillPlaced.add(t)));
  const missing = activeTaskNames.filter(t => !stillPlaced.has(t));
  if (missing.length) {
    const fallback = assignTasks(dinnerDays, breakfastByDt, missing);
    Object.entries(fallback).forEach(([dt, ts]) => {
      tasksByDtLlm[dt] = [...(tasksByDtLlm[dt] || []), ...ts];
    });
  }

  // Force-override: if the user explicitly named a task and a weekday in their
  // instructions ("laundry on friday"), move it there regardless of whatever
  // the LLM chose. tasksByDt (built upfront in buildPlanContext) already honors
  // these, but the LLM may have ignored them, so we re-apply.
  const explicit = parseTaskDayAssignments(instructions, activeTaskNames);
  for (const [taskName, weekday] of Object.entries(explicit)) {
    const day = dinnerDays.find(d => d.d === weekday);
    if (!day) continue;
    Object.keys(tasksByDtLlm).forEach(dt => {
      tasksByDtLlm[dt] = tasksByDtLlm[dt].filter(t => t !== taskName);
    });
    tasksByDtLlm[day.dt] = [...(tasksByDtLlm[day.dt] || []), taskName];
  }

  // Re-spread breakfasts if the LLM's final task placement diverged from what
  // we computed upfront. Explicit breakfast→day always wins (e.g. "pancakes
  // saturday"); the rest spread to non-task days.
  const activeBreakfasts = breakfastPicks.filter(p => p && p !== BREAKFAST_NONE);
  const finalBreakfastByDt = assignBreakfastsWithInstructions(
    dinnerDays, tasksByDtLlm, activeBreakfasts, instructions
  );

  const usedThisRun = new Set();
  const result = dinnerDays.map((day, dayIdx) => {
    const breakfastNames = finalBreakfastByDt[day.dt] || [];
    const breakfasts = breakfastNames.map(n => byName[n] || { name: n });
    const breakfast = breakfasts[0] || null; // back-compat: first breakfast
    const dayTasks = tasksByDtLlm[day.dt] || [];
    const effortCount = breakfasts.length + dayTasks.length;
    const isFast = effortCount > 0;
    const preferLight = effortCount >= 1;
    const requireLight = effortCount >= 2;

    // Validate the LLM's per-day pick against the day's hard constraints.
    // The LLM is told (in the system prompt) about isFast / preferLight /
    // requireLight gating, but it sometimes ignores those rules anyway. If the
    // LLM picked Heavy on a day with a breakfast, or non-fast on an effort
    // day, fall through to the rule-based fallback for that day so the gates
    // are actually enforced. "Acceptable if no alternative exists" rule:
    // we only reject if a constraint-satisfying alternative is available in
    // the effective pool — better a constraint violation than no dinner.
    const validateRequest = (recipe) => {
      if (!recipe) return false;
      if (usedThisRun.has(recipe.name)) return false;
      // Exclusion: if we filtered the candidate pool for the LLM, anything
      // outside it is a violation of the user's reroll request.
      if (usingExclusion && excludeSet.has(recipe.name)) return false;
      // isFast gate
      if (isFast && !isFastRecipe(recipe)) {
        const anyFast = effectiveCandidates.some(r => isFastRecipe(r) && !usedThisRun.has(r.name));
        if (anyFast) return false;
      }
      // requireLight gate (effortCount >= 2): must be Light if any Light available
      if (requireLight && recipe.complexity !== 'Light') {
        const anyLight = effectiveCandidates.some(r =>
          r.complexity === 'Light' && !usedThisRun.has(r.name) && (!isFast || isFastRecipe(r))
        );
        if (anyLight) return false;
      } else if (preferLight && recipe.complexity === 'Heavy') {
        // preferLight gate (effortCount >= 1): no Heavy if any non-Heavy available
        const anyNonHeavy = effectiveCandidates.some(r =>
          r.complexity !== 'Heavy' && !usedThisRun.has(r.name) && (!isFast || isFastRecipe(r))
        );
        if (anyNonHeavy) return false;
      }
      return true;
    };

    let pick = null;
    const requested = pickByDt[day.dt];
    const requestedRecipe = requested ? byName[requested] : null;
    if (requestedRecipe && validateRequest(requestedRecipe)) {
      pick = requestedRecipe;
    } else {
      if (requestedRecipe) {
        // The LLM's pick violated a hard constraint; the fallback will choose
        // a constraint-satisfying alternative. Logged so the rejection has a
        // fingerprint if anyone wonders why a different dinner showed up.
        console.warn(`[pickPlanWithLLM] rejected LLM pick "${requested}" for ${day.dt} (complexity=${requestedRecipe.complexity}, isFast=${isFastRecipe(requestedRecipe)}; day requireLight=${requireLight}, preferLight=${preferLight}, isFast=${isFast})`);
      }
      // Fallback: rule-based pick honoring constraints. requireLight days only
      // accept Light if any Light is available; preferLight days accept Light
      // or Medium; otherwise no complexity preference. Honors the reroll
      // exclusion: prefers excluded-aware pool, falls back to full pool only
      // if that empties.
      const fits = (r) => !usedThisRun.has(r.name) && (!isFast || isFastRecipe(r));
      const tier1 = effectiveCandidates.filter(r => !recent.has(r.name) && fits(r));
      const tier2 = tier1.length ? tier1 : effectiveCandidates.filter(fits);
      const pool = tier2.length
        ? tier2
        : (effectiveCandidates.filter(r => !usedThisRun.has(r.name)).length
            ? effectiveCandidates.filter(r => !usedThisRun.has(r.name))
            : dinnerCandidates.filter(r => !usedThisRun.has(r.name)));
      // requireLight: hard-filter to Light-only when any Light exists in pool
      let workingPool = pool;
      if (requireLight) {
        const lights = pool.filter(r => r.complexity === 'Light');
        if (lights.length) workingPool = lights;
      } else if (preferLight) {
        // Drop Heavy when at least one non-Heavy is available
        const nonHeavy = pool.filter(r => r.complexity !== 'Heavy');
        if (nonHeavy.length) workingPool = nonHeavy;
      }
      // Shuffle first so re-rolls vary tie-breaks; sort is stable so the
      // complexity / used-count preferences still win when they differ.
      const shuffled = seededShuffle(workingPool, rerollSeed * 31 + dayIdx + 1);
      const sorted = shuffled.sort((a, b) => {
        if (preferLight) {
          const rank = (c) => c === 'Light' ? 0 : c === 'Heavy' ? 2 : 1;
          const ra = rank(a.complexity);
          const rb = rank(b.complexity);
          if (ra !== rb) return ra - rb;
        }
        return (a.used || 0) - (b.used || 0);
      });
      pick = sorted[0] || null;
    }
    if (pick) usedThisRun.add(pick.name);
    return { ...day, dinner: pick, breakfast, breakfasts, tasks: dayTasks, isFast };
  });

  // Post-validation: enforce protein caps from the user's instructions.
  // The LLM is told about these caps in the prompt and tries to honor them,
  // but it sometimes ignores them — especially with reroll variety pressure
  // or when one protein dominates the candidate pool. We count dinners by
  // protein tag, and for each over-budget protein swap excess picks with
  // non-conflicting alternatives that still satisfy the day's gates
  // (isFast / preferLight / requireLight / exclusion).
  if (Object.keys(proteinCaps).length) {
    const counts = {};
    const indicesByProtein = {}; // tag → [resultIdx, ...]
    result.forEach((slot, i) => {
      const t = proteinTagOf(slot.dinner);
      if (!t) return;
      counts[t] = (counts[t] || 0) + 1;
      if (!indicesByProtein[t]) indicesByProtein[t] = [];
      indicesByProtein[t].push(i);
    });

    const dayGates = (slot) => {
      const effortCount = (slot.breakfasts || []).length + (slot.tasks || []).length;
      return {
        isFast: effortCount > 0,
        preferLight: effortCount >= 1,
        requireLight: effortCount >= 2,
      };
    };

    for (const [tag, max] of Object.entries(proteinCaps)) {
      while ((counts[tag] || 0) > max) {
        // Pop the most-recent occurrence first — earlier-day picks tend to
        // anchor on user-specific weekday requests ("chicken on Tuesday").
        const dayIdx = (indicesByProtein[tag] || []).pop();
        if (dayIdx === undefined) break;
        const slot = result[dayIdx];
        const gates = dayGates(slot);

        const replacement = effectiveCandidates.find(r => {
          if (!r) return false;
          if (usedThisRun.has(r.name)) return false;
          const rTag = proteinTagOf(r);
          if (rTag === tag) return false;
          // Don't introduce a new violation: if this candidate's protein is
          // ALSO capped and already at-or-over budget, skip it.
          if (rTag && proteinCaps[rTag] !== undefined && (counts[rTag] || 0) >= proteinCaps[rTag]) return false;
          if (gates.isFast && !isFastRecipe(r)) return false;
          if (gates.requireLight && r.complexity !== 'Light') return false;
          if (gates.preferLight && r.complexity === 'Heavy') return false;
          return true;
        });

        if (!replacement) {
          console.warn(`[pickPlanWithLLM] protein cap "${tag}=${max}" violated (${counts[tag]} picked) — no valid swap available for ${slot.dt}`);
          break;
        }

        // Apply swap: bookkeeping for usedThisRun + counts + indicesByProtein.
        if (slot.dinner && slot.dinner.name) usedThisRun.delete(slot.dinner.name);
        usedThisRun.add(replacement.name);
        counts[tag] = (counts[tag] || 0) - 1;
        const newTag = proteinTagOf(replacement);
        if (newTag) {
          counts[newTag] = (counts[newTag] || 0) + 1;
          if (!indicesByProtein[newTag]) indicesByProtein[newTag] = [];
          indicesByProtein[newTag].push(dayIdx);
        }
        result[dayIdx] = { ...slot, dinner: replacement };
      }
    }
  }

  return result;
}

function pickPlan({ recipeDB, days, breakfastPicks, tasks, avoidWeeks, cookingHistory, instructions, seed, excludeDinners }) {
  const dinnerDays = days.filter(d => d.on);
  const activeBreakfasts = breakfastPicks.filter(p => p && p !== BREAKFAST_NONE);
  const activeTasks = tasks.filter(t => t.on).map(t => t.name);

  // Tasks claim days first (laundry → Tue/Wed by default; explicit weekdays
  // and same-day breakfast groups override). Breakfasts fill in around them.
  // Even without an LLM we honor the deterministic parts of `instructions` —
  // weekday assignments ("laundry thursday") and same-day grouping ("pancakes
  // and muffins same day"). LLM-only territory is dinner SELECTION (e.g.
  // "have chicken two nights"); structural placement works in both modes.
  const tasksByDt = instructions
    ? assignTasksWithInstructions(dinnerDays, activeTasks, instructions)
    : assignTasks(dinnerDays, null, activeTasks);
  const breakfastByDt = instructions
    ? assignBreakfastsWithInstructions(dinnerDays, tasksByDt, activeBreakfasts, instructions)
    : assignBreakfasts(dinnerDays, tasksByDt, activeBreakfasts);

  const byName = {};
  recipeDB.forEach(r => { byName[r.name] = r; });

  const minOffset = dinnerDays.length ? Math.min(...dinnerDays.map(d => d.weekOffset)) : 0;
  const recent = new Set(
    cookingHistory
      .filter(h => minOffset - h.weekOffset < avoidWeeks)
      .map(h => h.name)
  );

  const dinnerCandidates = recipeDB.filter(isAutoplanEligible);
  const usedThisRun = new Set();
  const rerollSeed = Math.max(1, seed | 0);

  // Re-roll exclusion: drop dinners shown in earlier reroll attempts of the
  // same constraint session. Soft fallback if exclusion would starve us.
  const excludeSet = new Set(excludeDinners || []);
  const excludedCandidates = excludeSet.size
    ? dinnerCandidates.filter(r => !excludeSet.has(r.name))
    : dinnerCandidates;
  const effectiveCandidates = (excludeSet.size > 0 && excludedCandidates.length >= dinnerDays.length)
    ? excludedCandidates
    : dinnerCandidates;

  return dinnerDays.map((day, dayIdx) => {
    const breakfastNames = breakfastByDt[day.dt] || [];
    const breakfasts = breakfastNames.map(n => byName[n] || { name: n });
    const breakfast = breakfasts[0] || null; // back-compat
    const dayTasks = tasksByDt[day.dt] || [];
    // Effort gate: 1 source = Light or Medium; 2+ sources = Light required.
    const effortCount = breakfasts.length + dayTasks.length;
    const isFast = effortCount > 0;
    const preferLight = effortCount >= 1;
    const requireLight = effortCount >= 2;

    const fits = (r) => !usedThisRun.has(r.name) && (!isFast || isFastRecipe(r));
    const tier1 = effectiveCandidates.filter(r => !recent.has(r.name) && fits(r));
    const tier2 = tier1.length ? tier1 : effectiveCandidates.filter(fits);
    const pool = tier2.length
      ? tier2
      : (effectiveCandidates.filter(r => !usedThisRun.has(r.name)).length
          ? effectiveCandidates.filter(r => !usedThisRun.has(r.name))
          : dinnerCandidates.filter(r => !usedThisRun.has(r.name)));
    let workingPool = pool;
    if (requireLight) {
      const lights = pool.filter(r => r.complexity === 'Light');
      if (lights.length) workingPool = lights;
    } else if (preferLight) {
      const nonHeavy = pool.filter(r => r.complexity !== 'Heavy');
      if (nonHeavy.length) workingPool = nonHeavy;
    }
    // Seeded shuffle gives ties a different order on re-roll. Stable sort
    // preserves complexity / used-count preferences when they differ.
    const shuffled = seededShuffle(workingPool, rerollSeed * 31 + dayIdx + 1);
    const sorted = shuffled.sort((a, b) => {
      if (preferLight) {
        const rank = (c) => c === 'Light' ? 0 : c === 'Heavy' ? 2 : 1;
        const ra = rank(a.complexity);
        const rb = rank(b.complexity);
        if (ra !== rb) return ra - rb;
      }
      return (a.used || 0) - (b.used || 0);
    });
    const pick = sorted[0] || null;
    if (pick) usedThisRun.add(pick.name);

    return { ...day, dinner: pick, breakfast, breakfasts, tasks: dayTasks, isFast };
  });
}

  {"name":"Best Easy Healthy Baked Salmon","url":"https://www.lecremedelacrumb.com/best-easy-healthy-baked-salmon/#wprm-recipe-container-25580","servings":4,"ingredients":[{"name":"salmon fillets","quantity":"4"},{"name":"olive oil","quantity":"2 tablespoons"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"cracked black pepper","quantity":"1/4 teaspoon"},{"name":"garlic","quantity":"2 teaspoons"},{"name":"italian herb seasoning blend","quantity":"1 teaspoon"},{"name":"lemon","quantity":"1 medium"}],"instructions":["Preheat oven to 400 degrees and grease a large baking pan. Arrange salmon fillets on the baking sheet and season generously with salt and pepper.","Stir together olive oil, garlic, herbs, and juice of 1/2 lemon. Spoon over salmon fillets being sure to rub all over the tops and sides of the salmon so it has no dry spots. Thinly slice remaining 1/2 of lemon and top each piece of salmon with a slice of lemon.","Bake for 12-15 minutes until salmon is opaque and flaky when pulled apart with a fork. You can broil the last 1-2 minutes if desired.","Garnish with fresh thyme or parsley if desired and serve."],"activeMinutes":5,"passiveMinutes":15,"complexity":"Light","estMinutes":10,"dishCount":1,"tags":["dinner","fish","fast"],"imageUrl":"https://photos.anylist.com/a8dff47274114786868a9a6d1a99db42.jpg"},
  {"name":"Healthy Chocolate Muffins (with Veggies!)","url":"https://thenaturalnurturer.com/healthy-chocolate-muffins-with-veggies/#recipe","servings":12,"ingredients":[{"name":"eggs","quantity":"2 large"},{"name":"banana","quantity":"1 cup"},{"name":"carrots","quantity":"1 cup"},{"name":"spinach or kale","quantity":"1 cup"},{"name":"oil","quantity":"1/4 cup"},{"name":"maple syrup or honey","quantity":"1/4 cup"},{"name":"vanilla extract","quantity":"1 teaspoon"},{"name":"apple cider vinegar","quantity":"2 teaspoons"},{"name":"white whole wheat flour","quantity":"1 cup"},{"name":"baking soda","quantity":"1 teaspoon"},{"name":"baking powder","quantity":"1 teaspoon"},{"name":"cocoa powder","quantity":"1/4 cup"},{"name":"ground cinnamon","quantity":"1 teaspoon"},{"name":"salt","quantity":"1/4 teaspoon"},{"name":"chocolate chips","quantity":"1/4 cup"}],"instructions":["Preheat your oven to 350 F and line a 12-hole muffin tin with liners. Set aside.","In your blender, combine eggs, banana / applesauce, carrots, spinach/kale, maple syrup/honey, oil, vinegar, and vanilla.","Blend until mixture is smooth.","Add flour, baking powder, baking soda, salt, cocoa powder and cinnamon. Process until just mixed.","Finally, fold in chocolate chips.","Portion batter into prepared muffin tin and top with extra chocolate chips if desired.","Bake for 20-22 minutes in a 350F oven or until a toothpick inserted into the middle comes out clean.","Let cool in pan for 5 minutes before transferring to a cooling rack."],"activeMinutes":15,"passiveMinutes":25,"complexity":"Medium","estMinutes":35,"dishCount":2,"tags":["breakfast","vegetarian","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/552ad647a43e417ba2f79ce8c214c5b3.jpg"},
  {"name":"Turkey and Quinoa Meatloaf","url":"https://www.allrecipes.com/recipe/213211/turkey-and-quinoa-meatloaf/","servings":6,"ingredients":[{"name":"water","quantity":"1/2 cup"},{"name":"quinoa","quantity":"1/4 cup"},{"name":"olive oil","quantity":"1 teaspoon"},{"name":"onion","quantity":"1 small"},{"name":"garlic","quantity":"1 large clove"},{"name":"brown sugar","quantity":"2 tablespoons"},{"name":"worcestershire sauce","quantity":"2 teaspoons"},{"name":"ground turkey","quantity":"1 (20 ounce) package"},{"name":"egg","quantity":"1"},{"name":"tomato paste","quantity":"1 tablespoon"},{"name":"pepper sauce","quantity":"1 tablespoon"},{"name":"salt","quantity":"1 1/2 teaspoons"},{"name":"ground black pepper","quantity":"1 teaspoon"}],"instructions":["Bring 1/2 cup water and quinoa to a boil in a saucepan over high heat. Reduce the heat to medium-low, cover, and simmer until quinoa is tender and the water has been absorbed, 15 to 20 minutes. Set aside to cool.","Preheat the oven to 350 degrees F. Line a baking sheet with foil.","Heat olive oil in a skillet over medium heat. Add onion; cook and stir until soft and translucent, about 5 minutes. Add garlic and cook for 1 more minute. Remove from the heat and cool slightly.","Mix brown sugar, 2 teaspoons Worcestershire sauce, and 1 teaspoon water together in a small bowl until a paste forms.","Mix turkey, cooked quinoa, onion mixture, egg, 2 tablespoons Worcestershire sauce, tomato paste, hot sauce, salt, and pepper together in a large bowl until well combined. Shape into a loaf and place onto the prepared baking sheet. Spread brown sugar paste over the top.","Bake in the preheated oven until no longer pink in the center, about 50 minutes. Let cool for 10 minutes before slicing and serving."],"activeMinutes":20,"passiveMinutes":50,"complexity":"Medium","estMinutes":35,"dishCount":4,"tags":["dinner","chicken","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/2ff53b26e62944adbf7fb8879ff91426.jpg"},
  {"name":"Creamy Chicken Boursin Pasta","url":"https://skinnyspatula.com/chicken-boursin-pasta/#mv-creation-224-jtr","servings":4,"ingredients":[{"name":"pasta","quantity":"300 g (10.5 oz)"},{"name":"olive oil","quantity":"1 tablespoon"},{"name":"butter","quantity":"20 g (1 tablespoon)"},{"name":"chicken fillets","quantity":"400 g (14 oz)"},{"name":"garlic cloves","quantity":"2"},{"name":"white wine","quantity":"75 ml (1/3 cup)"},{"name":"boursin cheese","quantity":"150 g (5.3 oz)"},{"name":"fresh parsley","quantity":"2 tablespoons"},{"name":"parmesan","quantity":"30 g (1/4 cup)"},{"name":"ground black pepper","quantity":""}],"instructions":["Bring a large pot of water to a boil, salt it, and cook the pasta one minute less than recommended on the package. Reserve about 2 cups of pasta water before draining.","Meanwhile, heat the olive oil in a large, deep pan and melt the butter in it. Add the chicken and cook for a couple of minutes on each side until it gets slightly golden.","Add the garlic and continue to cook for another minute until fragrant. Stir in the wine and cook for 1-2 minutes until the alcohol mostly evaporates.","Stir in the Boursin cheese and add some pasta water to help dissolve it. Continue to stir until the cheese has melted and then lower the heat and simmer for a couple of minutes until the sauce thickens a bit.","Add the cooked pasta to the pan and toss to combine. Add an extra dash of pasta water if the sauce looks too thick.","Stir in the grated Parmesan and fresh parsley, season to taste, and serve immediately."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","chicken","pasta","fast"],"imageUrl":"https://photos.anylist.com/f4278d7f88694a71bfcee071a36f8a93.jpg"},
  {"name":"Simple Asian Glazed Chicken Thighs","url":"https://cafedelites.com/roasted-asian-glazed-chicken-thighs/","servings":6,"ingredients":[{"name":"chicken thighs","quantity":"6"},{"name":"rice wine vinegar","quantity":"1/3 cup"},{"name":"soy sauce","quantity":"1/4 cup"},{"name":"honey","quantity":"3 tablespoons"},{"name":"brown sugar","quantity":"2 tablespoons"},{"name":"pure sesame oil","quantity":"2 tablespoons"},{"name":"garlic","quantity":"4 cloves"},{"name":"ginger","quantity":"1 teaspoon"},{"name":"bok choy","quantity":"2 bunches"},{"name":"green onion/shallot","quantity":"1 stem"}],"instructions":["Preheat oven to 220C / 425F.","Wash chicken thighs and pat dry with a paper towel.","Whisk the vinegar, soy sauce, honey, brown sugar, sesame oil, garlic and ginger together in a small saucepan over medium heat. Bring to a rolling boil; reduce heat to low and allow to simmer for about 5 minutes while stirring occasionally until sauce thickens.","Place chicken thighs into an oven proof pan/skillet or baking dish. Pour 2/3 of the sauce mixture over the chicken. Bake skin side down for 30 minutes. Turn thighs and continue to bake until beginning to brown on the skin, about another 15 minutes. Steam bok choy.","Change oven settings to grill/broil on medium heat and grill until the skin changes to deep golden, about 5 minutes.","Allow chicken to rest for 10 minutes. Serve with the steamed bok choy, shallots and remaining sauce mixture."],"activeMinutes":15,"passiveMinutes":35,"complexity":"Medium","estMinutes":50,"dishCount":4,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/304645c75c5b4239b06127308201b1fc.jpg"},
  {"name":"Spinach Stuffed Chicken Breasts","url":"https://thatlowcarblife.com/spinach-stuffed-chicken-2/#wprm-recipe-container-1906","servings":4,"ingredients":[{"name":"chicken breasts","quantity":"4"},{"name":"olive oil or avocado oil","quantity":"1 tablespoon"},{"name":"paprika","quantity":"1 teaspoon"},{"name":"salt","quantity":"1 teaspoon"},{"name":"garlic powder","quantity":"1/4 teaspoon"},{"name":"onion powder","quantity":"1/4 teaspoon"},{"name":"cream cheese","quantity":"4 ounces"},{"name":"parmesan","quantity":"1/4 cup"},{"name":"mayonnaise","quantity":"2 tablespoons"},{"name":"fresh spinach","quantity":"1 1/2 cups"},{"name":"garlic","quantity":"1 teaspoon"},{"name":"red pepper flakes","quantity":"1/2 teaspoon"}],"instructions":["Preheat oven to 375 degrees.","Place the chicken breasts on a cutting board and drizzle with oil.","Add the paprika, 1/2 teaspoon salt, garlic powder, and onion powder to a small bowl and stir to combine. Sprinkle evenly over both sides of the chicken.","Use a sharp knife to cut a pocket into the side of each chicken breast.","Add cream cheese, Parmesan, mayonnaise, spinach, garlic, red pepper and remaining 1/2 teaspoon of salt to a small mixing bowl and stir well to combine.","Spoon the spinach mixture into each chicken breast evenly.","Place the chicken breasts in a 9x13 baking dish. Bake, uncovered, for 25-30 minutes or until chicken is cooked through."],"activeMinutes":20,"passiveMinutes":25,"complexity":"Heavy","estMinutes":35,"dishCount":2,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/2314d54bcc4644bf9ad45d19e9f4076a.jpg"},
  {"name":"Meatball Parm Orzo","url":"https://www.delish.com/cooking/recipe-ideas/a62830811/best-meatball-parm-orzo-recipe/","servings":6,"ingredients":[{"name":"ground beef","quantity":"1 lb"},{"name":"egg","quantity":"1 large"},{"name":"parmesan","quantity":"1 oz"},{"name":"italian breadcrumbs","quantity":"1/4 cup"},{"name":"fresh basil","quantity":"2 tbsp"},{"name":"heavy cream","quantity":"1 tbsp"},{"name":"italian seasoning or oregano","quantity":"1 tsp"},{"name":"red pepper flakes","quantity":"1/4 tsp"},{"name":"kosher salt","quantity":""},{"name":"ground black pepper","quantity":""},{"name":"olive oil","quantity":"2 tbsp"},{"name":"whole tomatoes","quantity":"1 (28-oz) can"},{"name":"italian seasoning","quantity":"1/2 tsp"},{"name":"orzo","quantity":"10 oz"},{"name":"butter","quantity":"1 tbsp"},{"name":"mozzarella","quantity":"1/2 cup"},{"name":"fresh basil leaves","quantity":""}],"instructions":["In a large bowl, combine beef, egg, Parmesan, bread crumbs, basil, cream, Italian seasoning, and red pepper flakes; season with salt and black pepper. Mix until well combined. Portion mixture into 15 meatballs.","In a large ovenproof skillet over medium-high heat, heat oil until shimmering. Cook meatballs, turning occasionally, until browned on all sides, 5 to 7 minutes.","Turn on broiler. In a large bowl, crush tomatoes with your hands.","Add tomatoes and their juices, Italian seasoning, and 3 cups water to meatballs; bring to a simmer. Cook, stirring occasionally, until warmed through, about 5 minutes. Transfer meatballs to a plate. Add orzo to sauce and cook, stirring occasionally, until al dente, 8 to 10 minutes.","Stir in butter and 1/2 cup Parmesan until melted. Return meatballs to skillet and top with mozzarella and remaining 1/4 cup Parmesan.","Broil until cheese is melted, 2 to 3 minutes. Top with basil."],"activeMinutes":25,"passiveMinutes":15,"complexity":"Heavy","estMinutes":35,"dishCount":2,"tags":["dinner","beef","pasta","kid-friendly","freezer-friendly"],"imageUrl":"https://photos.anylist.com/79b73bf4a6c54fc49968d6e37a143c18.jpg"},
  {"name":"Easy Meatball Recipe","url":"https://www.iheartnaptime.net/meatball-recipe/#recipe","servings":5,"ingredients":[{"name":"ground beef","quantity":"1 pound"},{"name":"egg","quantity":"1 large"},{"name":"breadcrumbs","quantity":"1/4 cup"},{"name":"parmesan cheese","quantity":"1/4 cup"},{"name":"onion","quantity":"1/4 cup"},{"name":"garlic","quantity":"2 teaspoons"},{"name":"kosher salt","quantity":"3/4 teaspoon"},{"name":"ground black pepper","quantity":"1/4 teaspoon"},{"name":"fresh italian leaf parsley","quantity":"2 tablespoons"}],"instructions":["Preheat the oven to 400F. Line a baking sheet with foil and spray with non-stick cooking spray.","In a large bowl, combine the meat, egg, breadcrumbs, cheese, onion, garlic, salt, pepper, and parsley.","Use a medium cookie scoop to portion the meat. Form into 1.5-inch balls and place on the baking sheet.","Bake uncovered 17 to 20 minutes, or until no longer pink in the middle. Turn halfway through.","Simmer meatballs with marinara sauce, if desired, for 10 minutes.","Serve meatballs on their own or over spaghetti."],"activeMinutes":15,"passiveMinutes":20,"complexity":"Medium","estMinutes":35,"dishCount":2,"tags":["dinner","beef","kid-friendly","freezer-friendly"],"imageUrl":"https://photos.anylist.com/fb88a29d5cde430c8b7b82311e1665f7.jpg"},
  {"name":"Oven Baked Chicken Breast","url":"https://www.recipetineats.com/oven-baked-chicken-breast/#jump-watch","servings":4,"ingredients":[{"name":"chicken breasts","quantity":"4"},{"name":"olive oil","quantity":"2 tsp"},{"name":"brown sugar","quantity":"1 1/2 tbsp"},{"name":"paprika","quantity":"1 tsp"},{"name":"oregano or thyme","quantity":"1 tsp"},{"name":"garlic powder","quantity":"1/4 tsp"},{"name":"salt and pepper","quantity":"1/2 tsp each"},{"name":"parsley","quantity":""}],"instructions":["Preheat oven to 425F (220C).","Pound chicken to 1.5cm at the thickest part using a rolling pin or meat mallet.","Mix Seasoning.","Line tray with foil and parchment paper. Place chicken upside down on tray. Drizzle with about 1 tsp oil. Rub over with fingers. Sprinkle with Seasoning.","Flip chicken. Drizzle with 1 tsp oil, rub with fingers, sprinkle with Seasoning.","Bake 18 minutes, or until surface is golden or internal temperature is 165F using a meat thermometer.","Remove from oven and immediately transfer chicken to serving plates.","Wait 3-5 minutes before serving, garnished with parsley if desired."],"activeMinutes":10,"passiveMinutes":25,"complexity":"Light","estMinutes":35,"dishCount":1,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/8b6e5b4eda4343249332e44543e651dc.jpg"},
  {"name":"Healthy Carrot Cake Muffins","url":"https://www.yummytoddlerfood.com/healthy-carrot-cake-muffins/","servings":12,"ingredients":[{"name":"whole-wheat flour","quantity":"3/4 cup"},{"name":"rolled oats","quantity":"1/2 cup"},{"name":"brown sugar","quantity":"1/4 cup"},{"name":"cinnamon","quantity":"1 teaspoon"},{"name":"baking powder","quantity":"1 teaspoon"},{"name":"baking soda","quantity":"1/4 teaspoon"},{"name":"salt","quantity":"1/4 teaspoon"},{"name":"applesauce","quantity":"1 cup"},{"name":"carrots","quantity":"1 cup"},{"name":"eggs","quantity":"2 large"},{"name":"canola oil","quantity":"3 tablespoons"},{"name":"vanilla extract","quantity":"1 teaspoon"},{"name":"raisins","quantity":"1/4 cup"}],"instructions":["Preheat the oven to 350F and coat a 24-cup mini muffin tin with nonstick spray.","Add all ingredients to a medium bowl and stir together to combine thoroughly but gently.","Add a heaping 1 tablespoon of the batter to each prepared muffin cup and bake 18-22 minutes or until lightly golden brown around the edges and a cake tester inserted into the middle comes out cleanly.","Remove from oven, cool in the pan for 2 minutes, and use a paring knife to loosen the edges as needed.","Serve warm, at room temp, or chilled."],"activeMinutes":15,"passiveMinutes":22,"complexity":"Medium","estMinutes":35,"dishCount":2,"tags":["breakfast","vegetarian","vegan","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/44da697bf7cd4cde8c51895f61fe5cb1.jpg"},
  {"name":"Korean Ground Beef and Rice Bowls","url":"https://therecipecritic.com/korean-ground-beef-rice-bowls/#wprm-recipe-container-57311","servings":4,"ingredients":[{"name":"ground beef","quantity":"1 pound"},{"name":"garlic cloves","quantity":"3"},{"name":"brown sugar","quantity":"1/4 cup"},{"name":"soy sauce","quantity":"1/4 cup"},{"name":"sesame oil","quantity":"2 teaspoons"},{"name":"ground ginger","quantity":"1/4 teaspoon"},{"name":"red pepper flakes","quantity":"1/4 teaspoon"},{"name":"pepper","quantity":"1/4 teaspoon"},{"name":"white or brown rice","quantity":"2 cups"},{"name":"green onions and sesame seeds","quantity":""}],"instructions":["In a large skillet cook the ground beef and garlic, breaking it into crumbles over medium heat until no longer pink. Drain the grease.","In a small bowl whisk brown sugar, soy sauce, sesame oil, ginger, red pepper flakes and pepper. Pour over the ground beef and let simmer for another minute or two.","Serve over hot rice and garnish with green onions and sesame seeds."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","beef","fast"],"imageUrl":"https://photos.anylist.com/0bd9f3da7f0e4df9b9b47b12283b2a87.jpg"},
  {"name":"Skillet Sausage \u0026 Potatoes","url":"https://www.smalltownwoman.com/skillet-and-sausage-potatoes/#recipe","servings":4,"ingredients":[{"name":"red potatoes","quantity":"1 1/2 lbs"},{"name":"olive oil","quantity":"2 tablespoons"},{"name":"links chicken sausage","quantity":"4"},{"name":"onion","quantity":"1 medium"},{"name":"red pepper","quantity":"1"},{"name":"green pepper","quantity":"1"},{"name":"garlic","quantity":"2 cloves"},{"name":"salt \u0026 pepper","quantity":""},{"name":"cajun seasoning","quantity":""}],"instructions":["Boil potatoes in large pot of water for 15 minutes. Run under cold water or chill. Dice potatoes after chilled.","In large skillet over medium heat add olive oil. Add potatoes and cook until lightly browned on edges, approximately 15 minutes. Add sausage, onion, red pepper and green pepper. Cook until sausages are browned and vegetables are tender. Add garlic and cook for additional 90 seconds.","Season to taste with salt, pepper and Cajun seasoning."],"activeMinutes":15,"passiveMinutes":25,"complexity":"Medium","estMinutes":40,"dishCount":2,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/786c4c747e5842179f0cd18a80b276d6.jpg"},
  {"name":"Classic Stuffed Peppers Recipe","url":"https://www.chilipeppermadness.com/recipes/stuffed-peppers/","servings":4,"ingredients":[{"name":"bell peppers","quantity":"4-6"},{"name":"olive oil","quantity":"1 tablespoon"},{"name":"ground beef","quantity":"1 lb"},{"name":"onion","quantity":"1 medium"},{"name":"jalapeno pepper","quantity":"1"},{"name":"garlic","quantity":"5 cloves"},{"name":"fire roasted tomatoes","quantity":"14.5 ounces"},{"name":"cheese","quantity":"1 cup"},{"name":"paprika","quantity":"1 tablespoon"},{"name":"oregano","quantity":"1 teaspoon"},{"name":"basil","quantity":"1 teaspoon"},{"name":"salt and pepper","quantity":""},{"name":"rice","quantity":"1 cup"},{"name":"fresh parsley","quantity":""}],"instructions":["Preheat your oven to 425F and bring a pot of water to a boil.","Wash the bell peppers, cut off the tops, and scoop out the insides. Slice a small part off the bottom so they stand upright.","Blanch the bell peppers for 5 minutes to slightly soften.","Set the softened peppers into a lightly oiled baking dish.","Heat the oil in a large pan to medium heat and add the onions, chopped pepper tops, and jalapeno. Cook for 5 minutes to soften.","Add the garlic and cook 1 minute, or until fragrant.","Add the ground beef and cook 5-6 minutes, breaking apart, until cooked through.","Add the fire roasted tomatoes, seasonings, and cooked rice. Stir together and remove from heat.","Stir in half of the shredded cheese.","Stuff each pepper with the meat filling mixture, then top each with the remaining shredded cheese.","Roast the stuffed peppers for 15-20 minutes, or until the peppers are tender and the cheese is bubbly.","Cool slightly, garnish, and serve."],"activeMinutes":25,"passiveMinutes":35,"complexity":"Heavy","estMinutes":35,"dishCount":2,"tags":["dinner","beef","kid-friendly","freezer-friendly"],"imageUrl":"https://photos.anylist.com/945180190fff40efb946524fb97449e8.jpg"},
  {"name":"Easy Homemade Granola Bars","url":"https://www.yummytoddlerfood.com/best-soft-granola-bars/#wprm-recipe-container-3298","servings":16,"ingredients":[{"name":"rolled oats","quantity":"1 1/2 cups"},{"name":"unsweetened coconut","quantity":"1/2 cup"},{"name":"honey","quantity":"1/4 cup"},{"name":"whole-wheat flour","quantity":"1/4 cup"},{"name":"peanut butter","quantity":"3 tablespoons"},{"name":"vanilla extract","quantity":"1 teaspoon"},{"name":"cinnamon","quantity":"1/2 teaspoon"},{"name":"baking powder","quantity":"1/8 teaspoon"},{"name":"salt","quantity":"1/8 teaspoon"},{"name":"chia seeds","quantity":"2 tablespoons"},{"name":"water","quantity":"1/4 cup"}],"instructions":["Preheat the oven to 325F and line a baking sheet with parchment paper.","Place the oats and coconut into the bowl of a food processor and blitz to grind into a coarse texture.","Add the remaining ingredients, including the peanut butter and honey, and blend well.","Add 1/4 cup water and blend until batter comes together like thick cookie dough.","Place batter onto the center of the prepared baking sheet and use your hands to press thin, about 1/4-1/2 inch thick and about 8x8 inches big.","Bake for 18-20 minutes, remove from oven, and let cool completely on the pan.","Break into squares and serve.","Store in an airtight container for up to 2 weeks in the fridge."],"activeMinutes":15,"passiveMinutes":25,"complexity":"Medium","estMinutes":35,"dishCount":3,"tags":["breakfast","snack","vegetarian","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/ed7c7d26c89b4280be5e1dd5fa5729c4.jpg"},
  {"name":"One Pot Garlic Butter Shrimp and Orzo","url":"https://www.howsweeteats.com/2021/04/one-pot-shrimp-and-orzo/","servings":2,"ingredients":[{"name":"shrimp","quantity":"1 pound"},{"name":"olive oil","quantity":"3 tablespoons"},{"name":"lemon","quantity":"1"},{"name":"garlic cloves","quantity":"4"},{"name":"red pepper flakes","quantity":"1/2 teaspoon"},{"name":"kosher salt and pepper","quantity":""},{"name":"orzo","quantity":"1 cup"},{"name":"butter","quantity":"2 tablespoons"},{"name":"chicken stock","quantity":"2 1/4 cups"},{"name":"fresh parsley","quantity":"3 tablespoons"},{"name":"lemon wedges","quantity":""}],"instructions":["In a large bowl, combine the shrimp with the olive oil, lemon juice, zest, garlic, red pepper flakes and a big pinch of salt and pepper. Stir and let sit for 10 minutes.","Heat the butter in a large skillet over medium heat. Once melted, stir in the orzo. Cook, stirring often, until the orzo is slightly golden and toasty. Stir in the garlic and cook for 30 seconds.","Pour in the chicken stock and bring it to a boil. Reduce it to a simmer and cover the pot. Cook until the orzo absorbs the water and is fluffed up, about 12 to 15 minutes.","Add in the shrimp to the orzo and stir. Cover the pot again and cook for another 5 to 8 minutes, or until the shrimp is pink and cooked through.","Sprinkle with fresh parsley and a spritz of lemon. Serve immediately."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Light","estMinutes":30,"dishCount":2,"tags":["dinner","seafood","pasta","one-pot","fast"],"imageUrl":"https://photos.anylist.com/ecdb1dad92174282a978d43e6f534062.jpg"},
  {"name":"Chocolate Chip Granola Bars","url":"https://www.yummytoddlerfood.com/chocolate-chip-granola-bars/#wprm-recipe-container-60766","servings":16,"ingredients":[{"name":"rolled oats","quantity":"3 1/2 cups"},{"name":"whole wheat flour","quantity":"1/4 cup"},{"name":"brown sugar","quantity":"1/4 cup"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"chia seeds","quantity":"2 tablespoons"},{"name":"banana","quantity":"1/2 cup"},{"name":"neutral oil","quantity":"1/2 cup"},{"name":"honey","quantity":"1/2 cup"},{"name":"vanilla extract","quantity":"2 teaspoons"},{"name":"chocolate chips","quantity":"1/3 cup"}],"instructions":["Preheat the oven to 350F. Line an 8x8-inch pan with parchment paper.","Add the oats, flour, brown sugar, salt, and chia seeds to a medium bowl. Stir to mix.","Add the mashed banana, oil, honey, vanilla, and chocolate chips. Stir very well to evenly combine.","Press the mixture into the prepared pan very firmly with your hands. Bake for 20 minutes.","Cover pan with foil and bake for an additional 10 minutes.","Remove pan from the oven and place on a wire rack to cool completely.","Once cooled, lift the bars out of the pan onto a cutting board. Slice into rectangles or squares."],"activeMinutes":15,"passiveMinutes":25,"complexity":"Light","estMinutes":35,"dishCount":1,"tags":["breakfast","snack","vegetarian","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/7422c078c121481dbb776b3f22128ac8.jpg"},
