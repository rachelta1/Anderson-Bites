  {"name":"Protein Muffins (5 Ingredients!)","url":"https://thebigmansworld.com/5-ingredient-chocolate-chip-protein-muffins-low-carb-vegan-paleo/#wprm-recipe-container-15794","servings":8,"ingredients":[{"name":"vanilla protein powder","quantity":"2 scoops"},{"name":"baking powder","quantity":"1 teaspoon"},{"name":"almond flour","quantity":"1/2 cup"},{"name":"peanut butter","quantity":"1/2 cup"},{"name":"unsweetened applesauce","quantity":"1 cup"},{"name":"chocolate chips","quantity":"1/2 cup"}],"instructions":["Preheat the oven to 180C/350F. Line a muffin tin with 8 muffin liners and set aside.","In a large mixing bowl, add your protein powder, almond flour, and baking powder, and mix well. Add your peanut butter and unsweetened applesauce and mix until fully combined. Fold through your chocolate chips.","Divide the batter amongst the muffin liners and bake for 10-12 minutes, or until a skewer comes out mostly clean.","Remove the muffins from the oven and allow them to cool for 5 minutes, before transferring to a wire rack to cool completely."],"activeMinutes":10,"passiveMinutes":18,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["breakfast","vegetarian","kid-friendly","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/43913971e18444bca6e0c35e501e6d59.jpg"},
  {"name":"Baked Sweet Potato Fries Recipe","url":"https://www.iheartnaptime.net/baked-sweet-potato-fries/#recipe","servings":4,"ingredients":[{"name":"sweet potatoes","quantity":"4 medium"},{"name":"kosher salt","quantity":"1/2 teaspoon"},{"name":"ground black pepper","quantity":"1/4 teaspoon"},{"name":"garlic powder","quantity":"1/4 teaspoon"},{"name":"paprika or chili powder","quantity":"1/4 teaspoon"},{"name":"oil","quantity":"2 tablespoons"}],"instructions":["Preheat the oven to 415F. Line a baking sheet with parchment paper.","In a small bowl, mix together salt, pepper, garlic powder, and paprika.","Place sweet potatoes in a single layer on the baking sheet. Toss with oil and sprinkle salt mixture evenly over the top. Bake 15 minutes. Flip and bake an additional 10 to 15 minutes, or until crisp.","Serve fries while hot with your favorite dipping sauce."],"activeMinutes":10,"passiveMinutes":30,"complexity":"Light","estMinutes":35,"dishCount":2,"tags":["sides","vegetarian","vegan","kid-friendly"],"imageUrl":"https://photos.anylist.com/18b1db7039bb4b6ab8e0c6e0bc0ee2ca.jpg"},
  {"name":"ABC Baby Muffins (Apple, Banana and Carrot!)","url":"https://www.yummytoddlerfood.com/baby-muffins/#wprm-recipe-container-13524","servings":12,"ingredients":[{"name":"banana","quantity":"1 cup"},{"name":"apple","quantity":"1/2 cup"},{"name":"carrot","quantity":"1/4 cup"},{"name":"milk","quantity":"3/4 cup"},{"name":"butter","quantity":"1/4 cup"},{"name":"egg","quantity":"1 large"},{"name":"pure vanilla extract","quantity":"1 teaspoon"},{"name":"whole wheat flour","quantity":"1 cup"},{"name":"rolled oats","quantity":"1/2 cup"},{"name":"cinnamon","quantity":"1 teaspoon"},{"name":"baking powder","quantity":"1 teaspoon"},{"name":"baking soda","quantity":"1/2 teaspoon"},{"name":"salt","quantity":"1/8 teaspoon"}],"instructions":["Preheat oven to 375F and grease a 24 cup mini muffin pan with nonstick spray.","Place the banana, apple, carrot, milk, butter, egg, and vanilla into a medium bowl. Stir together.","Gently but thoroughly stir in the flour, oats, cinnamon, baking powder, baking soda, and salt.","Divide batter among the prepared muffin pan, filling each cup to the edge.","Bake for 16-20 minutes or until a cake tester inserted into the center comes out cleanly.","Let cool for a few minutes in the pan, then transfer to a wire rack to cool fully."],"activeMinutes":15,"passiveMinutes":22,"complexity":"Medium","estMinutes":30,"dishCount":2,"tags":["breakfast","vegetarian","kid-friendly","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/7f873deb32f44e928e8a81e291920352.jpg"},
  {"name":"Taco Skillet","url":"https://www.tasteofhome.com/recipes/easy-beef-taco-skillet/#RecipeCard","servings":6,"ingredients":[{"name":"ground beef","quantity":"1 pound"},{"name":"red onion","quantity":"1 small"},{"name":"whole kernel corn","quantity":"1 can (15-1/4 ounces)"},{"name":"corn tortillas","quantity":"10"},{"name":"taco sauce","quantity":"1 bottle (8 ounces)"},{"name":"cheddar cheese","quantity":"1-1/4 cups"},{"name":"pepper sauce","quantity":""}],"instructions":["In a large skillet over medium heat, cook the beef and onions until the meat is no longer pink. Drain to remove excess fat.","To the beef mixture, add the corn, tortilla pieces, taco sauce and 1 cup cheese. Continue to cook until bubbly and heated through.","To serve, sprinkle with the remaining cheese, a drizzle of hot sauce if desired, and any other toppings."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Light","estMinutes":25,"dishCount":1,"tags":["dinner","beef","fast"],"imageUrl":"https://photos.anylist.com/53931fa66c6e48d5996c53a87021d7f4.jpg"},
  {"name":"One-Pan Chicken and Spinach Orzo","url":"https://www.the-girl-who-ate-everything.com/one-pan-chicken-and-spinach-orzo/#recipe","servings":4,"ingredients":[{"name":"olive oil","quantity":"1 tablespoon"},{"name":"white onion","quantity":"1/2"},{"name":"garlic","quantity":"3 cloves"},{"name":"chicken broth","quantity":"1 cup"},{"name":"orzo pasta","quantity":"3/4 cup"},{"name":"tomatoes","quantity":"1 (14.5 ounce) can"},{"name":"italian seasonings","quantity":"1 teaspoon"},{"name":"kosher salt","quantity":"1/2 teaspoon"},{"name":"red pepper flakes","quantity":"1/4 teaspoon"},{"name":"rotisserie chicken","quantity":"2 cups"},{"name":"spinach leaves","quantity":"3 cups"},{"name":"parmesan cheese","quantity":"1/4 cup"}],"instructions":["In a large skillet, bring the olive oil over medium-high heat. Saute the onion until soft, adding the garlic for the last minute of cooking.","Add the chicken broth, orzo, diced tomatoes, Italian seasonings, salt, and red pepper flakes. Bring to a boil, reduce to a simmer and cover. Cook for 12-15 minutes or until liquid is absorbed. Add the chicken and the spinach leaves for the last 3 minutes of cooking. Sprinkle with Parmesan and serve."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Light","estMinutes":25,"dishCount":1,"tags":["dinner","chicken","pasta","one-pot","fast"],"imageUrl":"https://photos.anylist.com/f039420716fa487c8a3429580de6cb7c.jpg"},
  {"name":"Classic Bran Muffins","url":"https://www.allrecipes.com/recipe/25224/classic-bran-muffins/","servings":12,"ingredients":[{"name":"wheat bran","quantity":"1 1/2 cups"},{"name":"buttermilk","quantity":"1 cup"},{"name":"brown sugar","quantity":"2/3 cup"},{"name":"vegetable oil","quantity":"1/3 cup"},{"name":"egg","quantity":"1"},{"name":"vanilla extract","quantity":"1/2 teaspoon"},{"name":"all-purpose flour","quantity":"1 cup"},{"name":"baking soda","quantity":"1 teaspoon"},{"name":"baking powder","quantity":"1 teaspoon"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"raisins","quantity":"1/2 cup"}],"instructions":["Preheat the oven to 375F. Grease 12 muffin cups or line with paper liners.","Mix wheat bran and buttermilk together in a large bowl; let stand for 10 minutes.","Meanwhile, beat brown sugar, oil, egg, and vanilla together in a separate bowl until light and fluffy; stir into buttermilk mixture.","Sift flour, baking soda, baking powder, and salt together; stir into buttermilk mixture until just blended. Fold in raisins; spoon batter into the prepared muffin cups, filling each 2/3 full.","Bake until tops spring back when lightly pressed, about 15 to 20 minutes. Cool in the tin briefly, then transfer to a wire rack to cool completely."],"activeMinutes":15,"passiveMinutes":22,"complexity":"Light","estMinutes":30,"dishCount":1,"tags":["breakfast","vegetarian","kid-friendly","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/0165786ec5024d70ad5c9c230a96aea6.jpg"},
  {"name":"Jamie\u0027s Minestrone Soup","url":"https://www.allrecipes.com/recipe/13333/jamies-minestrone/","servings":8,"ingredients":[{"name":"olive oil","quantity":"3 tablespoons"},{"name":"garlic","quantity":"3 cloves"},{"name":"onions","quantity":"2"},{"name":"celery","quantity":"2 cups"},{"name":"carrots","quantity":"5"},{"name":"tomato sauce","quantity":"4 cups"},{"name":"chicken broth","quantity":"2 cups"},{"name":"water","quantity":"2 cups"},{"name":"red wine","quantity":"1/2 cup"},{"name":"zucchinis","quantity":"3"},{"name":"spinach","quantity":"2 cups"},{"name":"fresh or frozen green beans","quantity":"2 cups"},{"name":"canned kidney beans","quantity":"1 cup"},{"name":"fresh basil","quantity":"2 tablespoons"},{"name":"fresh oregano","quantity":"1 tablespoon"},{"name":"salt and pepper","quantity":""},{"name":"shell pasta","quantity":"1/2 cup"},{"name":"parmesan cheese","quantity":"2 tablespoons"}],"instructions":["Heat olive oil in a large stockpot over medium-low heat. Saute garlic in hot oil until fragrant, 2 to 3 minutes. Add onion; cook and stir until translucent, 4 to 5 minutes.","Add celery and carrots; saute for 1 to 2 minutes.","Pour in tomato sauce, broth, and water; bring to a boil. Add red wine; reduce heat to low.","Stir in zucchini, spinach, green beans, kidney beans, basil, oregano, salt, and pepper. Simmer until soup is heated through, 30 to 40 minutes.","Meanwhile, fill a medium saucepan with water and bring to a boil. Cook seashell pasta until tender yet firm to the bite, 7 to 8 minutes. Drain and set aside.","Place 2 tablespoons cooked pasta into individual serving bowls. Ladle soup over pasta and sprinkle with Parmesan cheese.","Drizzle with olive oil to serve."],"activeMinutes":20,"passiveMinutes":30,"complexity":"Medium","estMinutes":30,"dishCount":2,"tags":["dinner","soup","chicken","freezer-friendly","fast"],"imageUrl":"https://photos.anylist.com/58ef82fc5a96428b93e540ba596c55de.jpg"},
  {"name":"Caprese Salad Recipe","url":"https://www.iheartnaptime.net/caprese-salad/","servings":6,"ingredients":[{"name":"cherry tomatoes","quantity":"1 pint"},{"name":"olive oil","quantity":"2 tablespoons"},{"name":"balsamic vinegar","quantity":"2 tablespoons"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"pepper","quantity":"1/4 teaspoon"},{"name":"oregano or thyme","quantity":"1/4 teaspoon"},{"name":"basil","quantity":"1/4 cup"},{"name":"mozzarella balls","quantity":"1 cup"}],"instructions":["Place the tomatoes, mozzarella balls and freshly chopped basil in a large bowl.","In a small bowl, whisk together the olive oil, balsamic vinegar, salt, pepper and dried oregano.","Pour the dressing over the tomato mixture and toss to combine. Refrigerate until ready to serve.","Add more basil or salt and pepper to taste. Drizzle with balsamic glaze if desired."],"activeMinutes":15,"passiveMinutes":0,"complexity":"Light","estMinutes":15,"dishCount":1,"tags":["sides","salad","vegetarian","vegan","fast"],"imageUrl":"https://photos.anylist.com/0e12456ae02247ce8896b587c0ec2a00.jpg"},
  {"name":"Banana Pancakes","url":"https://www.allrecipes.com/recipe/20334/banana-pancakes-i/","servings":12,"ingredients":[{"name":"all-purpose flour","quantity":"1 cup"},{"name":"white sugar","quantity":"1 tablespoon"},{"name":"baking powder","quantity":"2 teaspoons"},{"name":"salt","quantity":"1/4 teaspoon"},{"name":"egg","quantity":"1"},{"name":"milk","quantity":"1 cup"},{"name":"vegetable oil","quantity":"2 tablespoons"},{"name":"bananas","quantity":"2"}],"instructions":["Combine flour, white sugar, baking powder, and salt in a bowl. Mix together egg, milk, vegetable oil, and bananas in a second bowl. Stir flour mixture into banana mixture; batter will be slightly lumpy.","Heat a lightly oiled griddle or frying pan over medium high heat. Pour or scoop the batter onto the griddle, using approximately 1/4 cup for each pancake.","Cook until pancakes are golden brown, 3 to 5 minutes per side. Serve hot."],"activeMinutes":15,"passiveMinutes":10,"complexity":"Light","estMinutes":25,"dishCount":1,"tags":["breakfast","vegetarian","kid-friendly","fast"],"imageUrl":"https://photos.anylist.com/90321f8d5e494653865141b25515b590.jpg"},
  {"name":"Mini Banana Blueberry Muffins","url":"https://mykidslickthebowl.com/muffins-for-baby-banana-blueberry/","servings":30,"ingredients":[{"name":"banana","quantity":"250 g"},{"name":"eggs","quantity":"2"},{"name":"vanilla","quantity":"1 teaspoon"},{"name":"oil or butter","quantity":"100 g"},{"name":"flour","quantity":"160 g"},{"name":"baking powder","quantity":"1.5 teaspoon"},{"name":"blueberries","quantity":"30"}],"instructions":["In a large bowl, mash the bananas with a fork.","Add eggs, vanilla, and butter/oil.","Beat these wet ingredients together with a hand-held beater. The batter should become smooth, yellow and a little frothy.","Add the flour and baking powder.","Beat for a further 30-60 seconds to make a well-mixed batter.","Portion into an oiled muffin tin.","Top the muffins with a blueberry or two.","Bake at 180C (360F) for 15 mins for mini muffins, or 25-30 mins for standard muffins.","Cool and serve."],"activeMinutes":15,"passiveMinutes":18,"complexity":"Light","estMinutes":30,"dishCount":2,"tags":["breakfast","vegetarian","kid-friendly","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/7382d6faa3b9418b885dea24346c2b71.jpg"},
  {"name":"Mediterranean Sautéed Scallops","url":"https://www.themediterraneandish.com/easy-scallops-recipe/#wprm-recipe-container-30359","servings":4,"ingredients":[{"name":"olive oil","quantity":"2 to 3 tablespoons"},{"name":"shallot","quantity":"1"},{"name":"red bell pepper","quantity":"1/2"},{"name":"green bell pepper","quantity":"1/2"},{"name":"garlic cloves","quantity":"4 to 5"},{"name":"grape tomatoes","quantity":"10 ounces"},{"name":"capers","quantity":"2 tablespoons"},{"name":"black pepper","quantity":""},{"name":"oregano","quantity":"1/2 teaspoon"},{"name":"ground cumin","quantity":"1/2 teaspoon"},{"name":"paprika","quantity":"1/2 teaspoon"},{"name":"sea scallops","quantity":"1 pound"},{"name":"fresh lemon","quantity":""},{"name":"parsley","quantity":""}],"instructions":["Saute the shallot and peppers. In a large skillet, heat 2 to 3 tablespoons extra virgin olive oil over medium heat. Add shallot and bell peppers. Raise the heat to medium-high, and cook for about 3 minutes.","Add minced garlic, tomatoes, and capers. Season with kosher salt and black pepper. Add oregano, cumin and paprika. Toss to combine. Cook until softened, another 5 to 7 minutes. Drop heat to lowest setting to keep warm.","In a second heavy skillet, heat another 2 tablespoons olive oil over medium-high heat. Add scallops and cook for 2 minutes on one side, turn over and cook until browned, another 1 to 2 minutes.","Transfer the scallops immediately into the pan with the vegetables, nestling them into the tomatoes and peppers.","Squeeze a little lemon juice over everything, garnish with parsley, and serve immediately."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Medium","estMinutes":25,"dishCount":1,"tags":["dinner","seafood","fast"],"imageUrl":"https://photos.anylist.com/3938cc5f856c499c87b9562aa4ef803c.jpg"},
  {"name":"Creamy Bay Scallop Spaghetti","url":"https://www.allrecipes.com/recipe/255021/creamy-bay-scallop-spaghetti/","servings":4,"ingredients":[{"name":"thick spaghetti","quantity":"8 ounces"},{"name":"vegetable oil","quantity":"1 tablespoon"},{"name":"bay scallops","quantity":"1 pound"},{"name":"butter","quantity":"2 tablespoons"},{"name":"garlic","quantity":"3 cloves"},{"name":"lemon zest","quantity":"2 teaspoons"},{"name":"red pepper flakes","quantity":"1 pinch"},{"name":"sherry","quantity":"1/3 cup"},{"name":"heavy cream","quantity":"1 cup"},{"name":"salt and pepper","quantity":""},{"name":"lemon","quantity":"1"},{"name":"italian parsley","quantity":"2 tablespoons"},{"name":"parmigiano-reggiano cheese","quantity":""}],"instructions":["Bring a large pot of salted water to a boil; add spaghetti and cook until tender yet firm, about 10 minutes.","Meanwhile, heat oil in a large skillet over high heat. When oil just starts to smoke, add scallops in a single layer. Let sear on high for about 1 minute. Toss to turn.","Add butter and stir scallops until butter melts. Stir in garlic.","Add lemon zest and red pepper flakes. Stir in sherry and cook until alcohol cooks off, about 1 minute.","Pour in cream. When mixture begins to simmer, reduce heat to medium-low. Add salt, pepper, and lemon juice.","Drain pasta. Transfer to skillet with scallops; bring to a simmer. Add half of the chopped parsley. Cook until pasta is heated through, about 1 minute.","Remove from heat. Garnish with grated cheese and remaining parsley. Serve in warm bowls."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":25,"dishCount":2,"tags":["dinner","seafood","pasta","kid-friendly","fast"],"imageUrl":"https://photos.anylist.com/6db0892cdd13492485c74280e4b3a82d.jpg"},
  {"name":"Chicken Fried Rice","url":"https://www.recipetineats.com/chicken-fried-rice/#recipe","servings":4,"ingredients":[{"name":"oil","quantity":"2 tbsp"},{"name":"eggs","quantity":"2"},{"name":"chicken breast","quantity":"150g (5oz)"},{"name":"garlic cloves","quantity":"2"},{"name":"onion","quantity":"1/2"},{"name":"bacon","quantity":"120g (4oz)"},{"name":"carrot","quantity":"1 small"},{"name":"frozen corn","quantity":"1/2 cup"},{"name":"frozen peas","quantity":"1/2 cup"},{"name":"white rice","quantity":"2 cups"},{"name":"green onions","quantity":"3/4 cup"},{"name":"chinese cooking wine or mirin","quantity":"2.5 tbsp"},{"name":"oyster sauce","quantity":"1 tbsp"},{"name":"light soy sauce","quantity":"3 tbsp"},{"name":"sesame oil","quantity":"1/2 tsp"},{"name":"white pepper","quantity":"1/4 tsp"}],"instructions":["Mix Sauce in a bowl. Pour 2 tsp over chicken, toss to coat, set aside for 10 minutes.","Heat 1 tbsp oil in a wok or skillet over medium heat. Add egg and scramble until just cooked, then remove.","Turn heat up to high, add remaining 1/2 tbsp oil and bacon into same skillet. Cook for 1 minute until fat starts to melt, then add onion and garlic.","Cook until bacon is light golden, about 1.5 minutes.","Add vegetables (frozen is fine). Cook for 1 minute.","Add chicken and cook until it changes from pink to white, about 1.5 minutes.","Add rice and Sauce ingredients. Cook for 1.5 minutes, stirring constantly.","Add egg and green onion, toss through to disperse then remove from heat.","Serve immediately."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":3,"tags":["dinner","chicken","kid-friendly"],"imageUrl":"https://photos.anylist.com/ecdfa321b4d54ee0af5c479a60da6dce.jpg"},
  {"name":"Slow Cooker Chicken and Dumplings","url":"https://www.allrecipes.com/recipe/8941/slow-cooker-chicken-and-dumplings/","servings":8,"ingredients":[{"name":"chicken breast halves","quantity":"4"},{"name":"butter","quantity":"2 tablespoons"},{"name":"condensed cream of chicken soup","quantity":"2 (10.5 ounce) cans"},{"name":"onion","quantity":"1 medium"},{"name":"refrigerated biscuit dough","quantity":"1 (10 ounce) package"},{"name":"water","quantity":"2 cups"}],"instructions":["Place chicken, condensed soup, onion, and butter in a slow cooker. Add enough water to cover; stir well. Cover and cook on High for 5 to 6 hours.","About 30 minutes before serving, tear biscuit dough into pieces. Place dough in the slow cooker. Cook until dough is no longer raw in the center.","Serve hot."],"activeMinutes":15,"passiveMinutes":360,"complexity":"Light","estMinutes":15,"dishCount":1,"tags":["dinner","chicken","slow-cooker","fast"],"imageUrl":"https://photos.anylist.com/85d73965fce84ce9a7846d34d894523d.jpg"},
  {"name":"Slow Cooker Honey Garlic Chicken","url":"https://www.wellplated.com/slow-cooker-honey-garlic-chicken/#wprm-recipe-container-37253","servings":4,"ingredients":[{"name":"chicken thighs","quantity":"1 1/2 pounds"},{"name":"soy sauce","quantity":"1/3 cup"},{"name":"honey","quantity":"1/3 cup"},{"name":"tomato paste","quantity":"2 tablespoons"},{"name":"chili paste","quantity":"2 teaspoons"},{"name":"garlic","quantity":"4 cloves"},{"name":"rice vinegar","quantity":"1 tablespoon"},{"name":"cornstarch","quantity":"2 tablespoons"},{"name":"brown rice, quinoa, or cauliflower rice","quantity":""},{"name":"sesame seeds","quantity":""},{"name":"green onion","quantity":""}],"instructions":["Place the chicken in the bottom of a 6-quart slow cooker. In a medium bowl, whisk together the soy sauce, honey, tomato paste, chili paste, garlic, and rice vinegar. Pour over the chicken. Cover and cook on LOW for 4 to 5 hours or HIGH for 2 to 3 hours, until chicken reaches 165F.","Remove chicken to a plate. Whisk cornstarch into the slow cooker liquid. Cover and cook on HIGH for 15 minutes until sauce thickens.","Shred the chicken with two forks and place back in the slow cooker. Stir to coat. Serve over rice, sprinkled with green onions and sesame seeds."],"activeMinutes":15,"passiveMinutes":360,"complexity":"Light","estMinutes":15,"dishCount":3,"tags":["dinner","chicken","slow-cooker"],"imageUrl":"https://photos.anylist.com/68c9a90f10c04b18983f8f7ac1d0c6f0.jpg"},
  {"name":"Shrimp Stir Fry","url":"https://www.allrecipes.com/recipe/231681/shrimp-stir-fry/","servings":4,"ingredients":[{"name":"chicken stock","quantity":"1 cup"},{"name":"soy sauce","quantity":"1 tablespoon"},{"name":"cornstarch","quantity":"1 tablespoon"},{"name":"garlic","quantity":"1 tablespoon"},{"name":"salt and ground black pepper","quantity":""},{"name":"sesame oil","quantity":"3 tablespoons"},{"name":"frozen stir-fry vegetables","quantity":"1 (16 ounce) package"},{"name":"shrimp","quantity":"20"}],"instructions":["Mix chicken stock, soy sauce, cornstarch, and garlic in a bowl; season with salt and pepper.","Heat sesame oil in a large skillet over medium-high heat; cook and stir vegetables in hot oil until softened, about 4 minutes.","Add shrimp; cook and stir until shrimp begin to turn pink, about 3 minutes.","Stir chicken stock mixture into vegetable-shrimp mixture. Continue to cook and stir until vegetables and shrimp are coated and sauce is thickened, about 5 minutes more."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","seafood","fast"],"imageUrl":"https://photos.anylist.com/3f2ab797308d4a9185dcd7d971d9558a.jpg"},
  {"name":"Shrimp Tacos","url":"https://natashaskitchen.com/shrimp-tacos/","servings":8,"ingredients":[{"name":"sour cream","quantity":"1/3 cup"},{"name":"mayonnaise","quantity":"1/3 cup"},{"name":"lime juice","quantity":"1 1/2 tbsp"},{"name":"garlic powder","quantity":"3/4 tsp"},{"name":"sriracha sauce","quantity":"3/4 tsp"},{"name":"white corn tortillas","quantity":"8"},{"name":"purple cabbage","quantity":"1/2 small"},{"name":"avocado","quantity":"1 large"},{"name":"red onion","quantity":"1/2"},{"name":"cotija cheese","quantity":"4 oz"},{"name":"cilantro","quantity":"1/4 bunch"},{"name":"lime","quantity":"1"},{"name":"shrimp","quantity":"1 lb"},{"name":"garlic clove","quantity":"1"},{"name":"sea salt","quantity":"1/2 tsp"},{"name":"black pepper","quantity":"1/4 tsp"},{"name":"ground cumin","quantity":"1/4 tsp"},{"name":"cayenne pepper","quantity":"1/4 tsp"},{"name":"olive oil","quantity":"1 tbsp"}],"instructions":["In a small bowl, whisk together the sauce ingredients and set aside for the flavors to meld.","Thinly slice cabbage, dice the avocado, finely dice the red onion, and coarsely chop the cilantro. Arrange toppings in small bowls.","Thaw and pat dry the shrimp. Place in a medium bowl, add seasonings and garlic and stir to combine.","Place a large non-stick pan over medium-high heat. Add 1 Tbsp olive oil and add shrimp in a single layer. Saute 1-2 minutes per side until cooked through.","Toast the tortillas over a gas flame or in a skillet.","Build tacos by arranging toppings and shrimp over each toasted tortilla. Serve drizzled with the taco sauce."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":2,"tags":["dinner","seafood","kid-friendly","fast"],"imageUrl":"https://photos.anylist.com/4dd4fb593c1f4cafa26f0562c7ba4e08.jpg"},
  {"name":"Old Bay Shrimp Boil","url":"https://www.julieseatsandtreats.com/shrimp-boil/#wprm-recipe-container-80197","servings":6,"ingredients":[{"name":"shrimp","quantity":"2 pounds large"},{"name":"sausage kielbasa or andouille","quantity":"1 pound"},{"name":"corn","quantity":"4 ears"},{"name":"red potatoes","quantity":"1 pound small"},{"name":"onion","quantity":"1 medium"},{"name":"lemons","quantity":"4"},{"name":"butter","quantity":"1/2 cup"},{"name":"garlic","quantity":"4 cloves"},{"name":"seafood seasoning like old bay","quantity":"1/3 cup"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"black pepper","quantity":"1/2 teaspoon"},{"name":"fresh parsley","quantity":"2 tablespoons"}],"instructions":["Fill large pot with water. Quarter two lemons and add to the water. Add onion, garlic and seafood seasoning. Bring water to boil.","Clean and cut potatoes in half. Add the potatoes to the boiling water, cook for 10-12 minutes or until just barely fork tender.","Clean and cut corn, add to boiling water along with the sliced smoked sausage. Cook for 5-6 minutes.","Add shrimp to boiling water and cook an additional 2-3 minutes or until pink.","Drain water and place the shrimp mixture on a large baking sheet.","In a microwave safe bowl melt the butter. Add salt, pepper and 2 tablespoons chopped parsley to butter and whisk to combine.","Pour half of butter mixture over shrimp mixture and stir to coat. Reserve remaining butter mixture for serving.","Garnish with additional chopped parsley and lemons.","Sprinkle additional seafood seasoning to taste, if desired.","Serve immediately with reserved butter mixture."],"activeMinutes":15,"passiveMinutes":25,"complexity":"Light","estMinutes":40,"dishCount":2,"tags":["dinner","seafood"],"imageUrl":"https://photos.anylist.com/48818965bd8a4f90bbee272d6f8b56a5.jpg"},
  {"name":"Simple Garlic Shrimp","url":"https://www.allrecipes.com/recipe/220597/simple-garlic-shrimp/","servings":4,"ingredients":[{"name":"olive oil","quantity":"1 1/2 tablespoons"},{"name":"shrimp","quantity":"1 pound"},{"name":"salt","quantity":""},{"name":"garlic","quantity":"6 cloves"},{"name":"red pepper flakes","quantity":"1/4 teaspoon"},{"name":"lemon juice","quantity":"3 tablespoons"},{"name":"caper brine","quantity":"1 tablespoon"},{"name":"butter","quantity":"2 tablespoons"},{"name":"flat-leaf parsley","quantity":"1/3 cup"},{"name":"water","quantity":"1 teaspoon"}],"instructions":["Heat olive oil in a heavy skillet over high heat until it just begins to smoke. Place shrimp in an even layer on the bottom of the pan and cook for 1 minute without stirring.","Season shrimp with salt; cook and stir until shrimp begin to turn pink, about 1 minute.","Add garlic and red pepper flakes; cook and stir for 1 minute.","Stir in lemon juice, caper brine, 1 piece of butter, and half of the parsley; cook until butter has melted, about 1 minute.","Reduce heat to low and stir in remaining 3 pieces butter. Cook and stir until butter has melted, sauce is thick, and shrimp are pink and opaque, 2 to 3 minutes.","Remove shrimp with a slotted spoon and transfer to a bowl; continue to cook butter sauce, adding water if too thick, about 2 minutes.","Season with salt to taste; serve shrimp topped with the pan sauce and remaining parsley."],"activeMinutes":15,"passiveMinutes":0,"complexity":"Light","estMinutes":20,"dishCount":1,"tags":["dinner","seafood","fast"],"imageUrl":"https://photos.anylist.com/ef9dc4392b56457f8fdbfb0d0c12dc14.jpg"},
  {"name":"Honey-Garlic Shrimp","url":"https://www.allrecipes.com/recipe/282905/honey-garlic-shrimp/","servings":2,"ingredients":[{"name":"shrimp","quantity":"1 pound large"},{"name":"fresh garlic","quantity":"1 tablespoon"},{"name":"honey","quantity":"2 tablespoons"},{"name":"ginger","quantity":"1/2 teaspoon"},{"name":"soy sauce","quantity":"1 tablespoon"},{"name":"asian fish sauce","quantity":"1 teaspoon"},{"name":"vegetable oil","quantity":"2 teaspoons"},{"name":"green onion","quantity":"1 cup"}],"instructions":["Make sure shrimp are fully thawed and well drained.","Whisk garlic, honey, ginger, soy sauce, and fish sauce together in a bowl.","Add shrimp and toss thoroughly for 2 minutes until completely coated. Cover and marinate in the refrigerator for 30 to 60 minutes; toss occasionally.","Brush a large nonstick skillet with oil and heat over high heat. Use tongs to transfer shrimp into the hot skillet in a single layer. Set excess marinade aside.","Sear shrimp for 2 minutes, then flip over. Dump in marinade and cook for 1 minute. Turn off heat and flip shrimp once more; let sit for about 1 minute. Garnish with green onion."],"activeMinutes":15,"passiveMinutes":0,"complexity":"Light","estMinutes":20,"dishCount":2,"tags":["dinner","seafood","fast"],"imageUrl":"https://photos.anylist.com/e125a0a761a342ea879ea3a25a1a9aa5.jpg"},
  {"name":"Mediterranean Turkey Skillet","url":"https://www.tasteofhome.com/recipes/mediterranean-turkey-skillet/#RecipeCard","servings":6,"ingredients":[{"name":"olive oil","quantity":"1 tablespoon"},{"name":"ground turkey","quantity":"1 package (20 ounces)"},{"name":"zucchini","quantity":"2 medium"},{"name":"onion","quantity":"1 medium"},{"name":"banana peppers","quantity":"2"},{"name":"garlic cloves","quantity":"3"},{"name":"oregano","quantity":"1/2 teaspoon"},{"name":"black beans","quantity":"1 can (15 ounces)"},{"name":"tomatoes","quantity":"1 can (14-1/2 ounces)"},{"name":"balsamic vinegar","quantity":"1 tablespoon"},{"name":"salt","quantity":"1/2 teaspoon"}],"instructions":["In a large skillet, heat the oil over medium-high heat. Add the turkey, zucchini, onions, peppers, garlic and oregano. Cook for 10 to 12 minutes, stirring to break the meat into crumbles, until the turkey is no longer pink and the vegetables are tender. Drain any grease.","Stir in the black beans, tomatoes, balsamic vinegar and salt. Cook until heated through, stirring occasionally."],"activeMinutes":20,"passiveMinutes":10,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/a30e509b243b4e8f81ce1a26a611ffd9.jpg"},
  {"name":"Stuffed Chicken Breast","url":"https://thecozycook.com/stuffed-chicken-breast/#wprm-recipe-container-52079","servings":4,"ingredients":[{"name":"chicken breasts","quantity":"4"},{"name":"salt and pepper","quantity":""},{"name":"paprika","quantity":"1/2 teaspoon"},{"name":"olive oil","quantity":"1 tablespoon"},{"name":"spinach","quantity":"3 cups"},{"name":"garlic","quantity":"4 cloves"},{"name":"sun-dried tomatoes","quantity":"1/3 cup"},{"name":"cream cheese","quantity":"4 oz"},{"name":"mozzarella","quantity":"1 cup"},{"name":"parmesan","quantity":"1/3 cup"},{"name":"basil, oregano","quantity":"1/2 teaspoon"},{"name":"onion powder","quantity":"1/4 teaspoon"},{"name":"red pepper flakes","quantity":"1 pinch"}],"instructions":["Preheat oven to 375F.","Add 1-2 teaspoons oil in a large skillet over medium heat. Add the spinach and garlic and cook until wilted, 3-4 minutes. Let cool.","Set the spinach/garlic and sundried tomatoes aside. Combine remaining filling ingredients, then gently stir in the spinach/garlic and tomatoes.","Pat the chicken dry. Use a sharp paring knife to create a pocket for the stuffing. Be careful not to cut all the way through.","Stuff each chicken breast with the filling. Sprinkle the top with salt, pepper, and paprika.","Heat oil in a large skillet over medium-high heat. Add 2 chicken breasts at a time and sear each side until golden, 2-3 minutes.","If your skillet is not oven safe, transfer the chicken to a baking dish.","Bake at 375F for 17-20 minutes, or until the thickest part of the chicken reaches 165F. Rest for 5 minutes before serving."],"activeMinutes":25,"passiveMinutes":25,"complexity":"Heavy","estMinutes":30,"dishCount":3,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/7203287af769411b92ec1e859bfe22f3.jpg"},
  {"name":"Protein Mac and Cheese","url":"https://lemonsandzest.com/protein-packed-baked-mac-cheese/#wprm-recipe-container-7702","servings":6,"ingredients":[{"name":"protein pasta","quantity":"8 oz"},{"name":"greek yogurt","quantity":"3/4 cup"},{"name":"whole milk","quantity":"1 - 1 1/2 cups"},{"name":"butter","quantity":"2 T"},{"name":"cheddar cheese","quantity":"2 1/2 cups"},{"name":"panko/breadcrumbs","quantity":"1/2 cup"},{"name":"garlic powder","quantity":"1/2 tsp"},{"name":"paprika","quantity":"1/2 tsp"},{"name":"cracked pepper","quantity":"1/2 tsp"},{"name":"sea salt","quantity":"1/2 tsp"},{"name":"red pepper","quantity":"dash"}],"instructions":["Preheat oven to 375F.","Boil and cook pasta as directed by box instructions until al dente. Drain and set aside.","In a separate sauce pan, whisk together the Greek yogurt, butter and milk over low heat until smooth. Add in one cup of shredded cheese and stir, allowing to melt.","Add another cup and melt. Stir in seasonings, salt and pepper. Add the cheese sauce to the pasta and stir to combine.","If baking, pour cheesy pasta into a small (8x8 or 9x9) baking pan greased with spray oil.","Sprinkle with remaining shredded cheese and panko or breadcrumbs.","Bake for 15-20 minutes or until cheese on top is melted and browned and pasta is lightly bubbling."],"activeMinutes":20,"passiveMinutes":20,"complexity":"Medium","estMinutes":35,"dishCount":3,"tags":["dinner","vegetarian","kid-friendly"],"imageUrl":"https://photos.anylist.com/13497c6aa5dd4367878a10a0dc5594af.jpg"},
  {"name":"Ham \u0026 Veggie Casserole","url":"https://www.tasteofhome.com/recipes/ham-veggie-casserole/","servings":4,"ingredients":[{"name":"frozen broccoli florets","quantity":"1 package (16 ounces)"},{"name":"frozen cauliflower","quantity":"1 package (16 ounces)"},{"name":"butter","quantity":"2 teaspoons + 2 tablespoons"},{"name":"bread crumbs","quantity":"1/4 cup"},{"name":"all-purpose flour","quantity":"2 tablespoons"},{"name":"2% milk","quantity":"1-1/2 cups"},{"name":"sharp cheddar cheese","quantity":"3/4 cup"},{"name":"parmesan cheese","quantity":"1/2 cup"},{"name":"ham","quantity":"1-1/2 cups"},{"name":"pepper","quantity":"1/4 teaspoon"}],"instructions":["Preheat oven to 425F. Cook broccoli and cauliflower according to package directions; drain.","Meanwhile, in a small skillet, melt 2 teaspoons butter. Add bread crumbs; cook and stir over medium heat until lightly toasted, 2-3 minutes. Remove from heat.","In a large saucepan, melt remaining butter over medium heat. Stir in flour until smooth; gradually whisk in milk. Bring to a boil, stirring constantly; cook and stir until thickened, 1-2 minutes. Remove from heat; stir in cheeses until blended. Stir in ham, pepper and vegetables.","Transfer to a greased 8-inch square baking dish. Sprinkle with toasted crumbs. Bake, uncovered, until heated through, 10-15 minutes."],"activeMinutes":25,"passiveMinutes":25,"complexity":"Medium","estMinutes":30,"dishCount":3,"tags":["dinner","pork","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/73d5605b41674e5ca59bb5c7dae19052.jpg"},
  {"name":"Chicken with Spinach and Mushrooms","url":"https://www.tasteofhome.com/recipes/spinach-and-mushroom-smothered-chicken/","servings":4,"ingredients":[{"name":"olive oil","quantity":"1-1/2 teaspoons"},{"name":"fresh mushrooms","quantity":"1-3/4 cups"},{"name":"green onions","quantity":"3"},{"name":"fresh spinach","quantity":"3 cups"},{"name":"pecans","quantity":"2 tablespoons"},{"name":"chicken breast halves","quantity":"4"},{"name":"rotisserie chicken seasoning","quantity":"1/2 teaspoon"},{"name":"provolone cheese","quantity":"2 slices"}],"instructions":["Preheat the grill or broiler. In a large skillet, heat the oil over medium-high heat, and saute the mushrooms and green onions until tender. Stir in the spinach and chopped pecans until the spinach is wilted. Remove from the heat; keep warm.","Sprinkle the chicken with the seasoning. Grill the chicken, covered, on an oiled grill rack over medium-high heat until a thermometer reads 165F, four to five minutes per side. Top with the cheese, then grill until the cheese is melted. To serve, top with the mushroom mixture."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":2,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/72d463854a1546b6a2cdbc01e8ff1462.jpg"},
  {"name":"Turkey Gyros","url":"https://www.tasteofhome.com/recipes/turkey-gyros/","servings":4,"ingredients":[{"name":"cucumber","quantity":"1 medium"},{"name":"sour cream","quantity":"2/3 cup"},{"name":"onion","quantity":"1/4 cup"},{"name":"dill weed","quantity":"2 teaspoons"},{"name":"lemon juice","quantity":"2 teaspoons"},{"name":"olive oil","quantity":"1 teaspoon"},{"name":"turkey breast tenderloin","quantity":"1/2 pound"},{"name":"greek seasoning","quantity":"1-1/2 teaspoons"},{"name":"lettuce","quantity":"1-1/2 cups"},{"name":"thin tomato slices","quantity":"8"},{"name":"whole pita breads","quantity":"4"},{"name":"crumbled feta cheese","quantity":"2 tablespoons"}],"instructions":["Finely chop a third of the cucumber. For sauce, mix sour cream, onion, dill, lemon juice and chopped cucumber. Thinly slice remaining cucumber.","In a nonstick skillet, heat oil over medium-high heat; saute turkey until no longer pink, 4-6 minutes. Stir in Greek seasoning. Serve turkey, lettuce, tomato and sliced cucumber on pitas; top with sauce and cheese."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Light","estMinutes":25,"dishCount":1,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/6d1bb9949c1b44eab6c899d1929ec9b3.jpg"},
  {"name":"Chicken Bacon Swiss Sandwich","url":"https://www.tasteofhome.com/recipes/bacon-swiss-chicken-sandwiches/#RecipeCard","servings":4,"ingredients":[{"name":"mayonnaise","quantity":"1/4 cup"},{"name":"dijon mustard","quantity":"1 tablespoon"},{"name":"honey","quantity":"1 tablespoon"},{"name":"chicken breast halves","quantity":"4"},{"name":"montreal steak seasoning","quantity":"1/2 teaspoon"},{"name":"swiss cheese","quantity":"4 slices"},{"name":"whole wheat hamburger buns","quantity":"4"},{"name":"bacon","quantity":"2 strips"},{"name":"lettuce leaves and tomato slices","quantity":""}],"instructions":["In a small bowl, mix the mayonnaise, Dijon mustard and honey.","Pound the chicken to 1/2-inch thickness, and sprinkle it with steak seasoning. Grill the chicken, covered, over medium heat or broil 4 inches from the heat until a thermometer reads 165F, four to six minutes per side. Top with cheese during the last minute of cooking.","Grill the buns over medium heat, cut side down, until toasted, 30 to 60 seconds. Serve the chicken on the buns with bacon, the mayonnaise mixture and, if desired, lettuce and tomato."],"activeMinutes":20,"passiveMinutes":5,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/4e9fc5486de942fe9a1012073606ee74.jpg"},
  {"name":"PF Chang\u0027s Chicken Lettuce Wraps","url":"https://damndelicious.net/2014/05/30/pf-changs-chicken-lettuce-wraps/","servings":4,"ingredients":[{"name":"olive oil","quantity":"1 tablespoon"},{"name":"ground chicken","quantity":"1 pound"},{"name":"garlic","quantity":"2 cloves"},{"name":"onion","quantity":"1"},{"name":"hoisin sauce","quantity":"1/4 cup"},{"name":"soy sauce","quantity":"2 tablespoons"},{"name":"rice wine vinegar","quantity":"1 tablespoon"},{"name":"ginger","quantity":"1 tablespoon"},{"name":"sriracha","quantity":"1 tablespoon"},{"name":"whole water chestnuts","quantity":"1 (8-ounce) can"},{"name":"green onions","quantity":"2"},{"name":"kosher salt and ground black pepper","quantity":""},{"name":"butter lettuce","quantity":"1 head"}],"instructions":["Heat olive oil in a large cast iron skillet over medium high heat. Add ground chicken and cook until browned, about 3-5 minutes, crumbling the chicken as it cooks; drain excess fat.","Stir in garlic, onion, hoisin sauce, soy sauce, rice wine vinegar, ginger and Sriracha until onions have become translucent, about 1-2 minutes.","Stir in chestnuts and green onions until tender, about 1-2 minutes; season with salt and pepper.","To serve, spoon several tablespoons of the chicken mixture into the center of a lettuce leaf, taco-style."],"activeMinutes":20,"passiveMinutes":0,"complexity":"Medium","estMinutes":25,"dishCount":2,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/0c08d4e679604e8d8291597718ddc784.jpg"},
  {"name":"Mediterranean Chicken Sheet Pan Dinner","url":"https://www.allrecipes.com/recipe/268999/mediterranean-chicken-sheet-pan-dinner/","servings":4,"ingredients":[{"name":"olive oil","quantity":"1/4 cup"},{"name":"lemon","quantity":""},{"name":"balsamic vinegar","quantity":"2 tablespoons"},{"name":"tarragon","quantity":"1 teaspoon"},{"name":"oregano","quantity":"1 teaspoon"},{"name":"paprika","quantity":"1 teaspoon"},{"name":"salt","quantity":"1 teaspoon"},{"name":"black pepper","quantity":"1/2 teaspoon"},{"name":"chicken thighs with skin","quantity":"4"},{"name":"red onion","quantity":"1 small"},{"name":"bell peppers","quantity":"8"},{"name":"potatoes","quantity":"1 pound"},{"name":"crumbled feta cheese","quantity":"1/4 cup"},{"name":"fresh parsley","quantity":"1/4 cup"},{"name":"kalamata olives","quantity":"8"}],"instructions":["Preheat the oven to 425F. Line a large rimmed baking sheet with aluminum foil.","Whisk olive oil, juice of 1 lemon, vinegar, tarragon, oregano, paprika, salt, and pepper together in a large bowl.","Add chicken thighs, onion, baby bell peppers, and potatoes. Stir until everything is evenly coated.","Transfer vegetable-chicken mixture to the prepared baking sheet and spread in an even layer. Scatter lemon slices over the vegetables, leaving the chicken uncovered so the skin will brown.","Bake in preheated oven for about 40 minutes. Remove from oven and top with feta, parsley, and olives."],"activeMinutes":15,"passiveMinutes":35,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","chicken","sheet-pan","fast"],"imageUrl":"https://photos.anylist.com/767cbe74ba5341c8a32abbcbd5f10aec.jpg"},
  {"name":"Chicken Marsala","url":"https://www.allrecipes.com/recipe/8887/chicken-marsala/","servings":4,"ingredients":[{"name":"all-purpose flour","quantity":"1/4 cup"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"ground black pepper","quantity":"1/4 teaspoon"},{"name":"oregano","quantity":"1/2 teaspoon"},{"name":"chicken breast halves","quantity":"4 medium"},{"name":"butter","quantity":"4 tablespoons"},{"name":"olive oil","quantity":"4 tablespoons"},{"name":"mushrooms","quantity":"1 cup"},{"name":"marsala wine","quantity":"1/2 cup"},{"name":"cooking sherry","quantity":"1/4 cup"}],"instructions":["In a shallow dish, mix together the flour, salt, pepper and oregano.","Coat chicken pieces in flour mixture.","In a large skillet, melt butter in olive oil over medium heat. Place chicken in the pan, and lightly brown.","Turn over chicken pieces, and add mushrooms. Pour in wine and sherry.","Cover skillet; simmer chicken 10 minutes, turning once, until no longer pink and juices run clear.","Serve hot."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/30c41d6de46c474ca9caef587764fafa.jpg"},
  {"name":"Chicken Parmesan Casserole","url":"https://www.allrecipes.com/recipe/62696/chicken-parmesan-casserole/","servings":6,"ingredients":[{"name":"rotini pasta","quantity":"2 cups"},{"name":"chicken","quantity":"12 ounces"},{"name":"mozzarella cheese","quantity":"1 cup"},{"name":"marinara sauce","quantity":"2 cups"},{"name":"bread crumbs","quantity":"1/2 cup"}],"instructions":["Preheat the oven to 350F.","Fill a large pot with lightly salted water and bring to a rolling boil. Cook rotini until tender yet firm, about 8 minutes. Drain.","Stir together cooked rotini, chicken, and mozzarella cheese in a large casserole dish.","Pour marinara sauce over pasta mixture; sprinkle with bread crumbs. Cover the dish with aluminum foil.","Bake in the preheated oven until cheese is melted, about 35 minutes."],"activeMinutes":15,"passiveMinutes":30,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","chicken","pasta","kid-friendly","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/d8a6bba35c854d548a56e96d74552f31.jpg"},
  {"name":"One Pan Orecchiette Pasta","url":"https://www.allrecipes.com/recipe/239047/one-pan-orecchiette-pasta/","servings":2,"ingredients":[{"name":"olive oil","quantity":"2 tablespoons"},{"name":"onion","quantity":"1/2"},{"name":"salt","quantity":""},{"name":"spicy italian sausages","quantity":"8 ounces"},{"name":"chicken broth","quantity":"3 1/2 cups"},{"name":"orecchiette pasta","quantity":"1 1/4 cups"},{"name":"arugula","quantity":"1/2 cup"},{"name":"parmigiano-reggiano cheese","quantity":"1/4 cup"}],"instructions":["Heat olive oil in a large, deep skillet over medium heat. Add onion with a pinch of salt; cook and stir until translucent, about 5 minutes. Stir in sausage and cook until browned, 5 to 7 minutes.","Pour 1.5 cups chicken broth into sausage mixture and bring to a boil while scraping the browned bits off the bottom of the pan.","Add orecchiette pasta; cook and stir, adding remaining broth when liquid is absorbed, until pasta is cooked through and most of the broth is absorbed, about 15 minutes.","Stir arugula into sausage-pasta mixture until arugula wilts.","Ladle pasta into bowls and sprinkle with Parmigiano-Reggiano cheese."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","chicken","pasta","one-pot","fast"],"imageUrl":"https://photos.anylist.com/b178e71180b442eaba5632e07384beb7.jpg"},
  {"name":"Easy Meatloaf","url":"https://www.allrecipes.com/recipe/16354/easy-meatloaf/","servings":6,"ingredients":[{"name":"ground beef","quantity":"1 1/2 pounds"},{"name":"egg","quantity":"1 large"},{"name":"onion","quantity":"1"},{"name":"milk","quantity":"1 cup"},{"name":"bread crumbs","quantity":"1 cup"},{"name":"salt and pepper","quantity":""},{"name":"ketchup","quantity":"1/3 cup"},{"name":"brown sugar","quantity":"2 tablespoons"},{"name":"mustard","quantity":"2 tablespoons"}],"instructions":["Preheat the oven to 350F. Lightly grease a 9x5-inch loaf pan.","Combine ground beef, onion, milk, bread crumbs, and egg in a large bowl; season with salt and pepper. Transfer into prepared loaf pan.","Mix ketchup, brown sugar, and mustard together in a small bowl until well combined; pour over meatloaf and spread evenly over the top.","Bake in the preheated oven until no longer pink in the center, about 1 hour."],"activeMinutes":15,"passiveMinutes":60,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","beef","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/28782684f5c94a2ba321e1fdf95dcb7c.jpg"},
  {"name":"Beef \u0026 Bacon Gnocchi Skillet","url":"https://www.tasteofhome.com/recipes/beef-bacon-gnocchi-skillet/#RecipeCard","servings":6,"ingredients":[{"name":"potato gnocchi","quantity":"1 package (16 ounces)"},{"name":"ground beef","quantity":"1-1/4 pounds"},{"name":"onion","quantity":"1 medium"},{"name":"bacon","quantity":"8 strips"},{"name":"water","quantity":"1 cup"},{"name":"heavy whipping cream","quantity":"1/2 cup"},{"name":"ketchup","quantity":"1 tablespoon"},{"name":"salt","quantity":"1/4 teaspoon"},{"name":"pepper","quantity":"1/4 teaspoon"},{"name":"cheddar cheese","quantity":"1-1/2 cups"},{"name":"tomatoes","quantity":"1/2 cup"},{"name":"green onions","quantity":"2"}],"instructions":["Preheat broiler. Cook gnocchi according to package directions; drain.","Meanwhile, in a large cast-iron or other ovenproof skillet, cook beef and onion over medium heat until beef is no longer pink, 4-6 minutes, breaking meat into crumbles. Drain.","Stir in half the bacon; add gnocchi, water, cream and ketchup. Bring to a boil. Cook and stir over medium heat until sauce has thickened, 3-4 minutes. Add salt and pepper. Sprinkle with cheese.","Broil 3-4 inches from heat until cheese has melted, 1-2 minutes. Top with tomatoes, green onions and remaining bacon."],"activeMinutes":20,"passiveMinutes":10,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","beef","pasta","fast"],"imageUrl":"https://photos.anylist.com/50d60b3983f5486ebdb59bb596d265db.jpg"},
  {"name":"Pepper Steak Stirfry","url":"https://www.tasteofhome.com/recipes/easy-pepper-steak/#RecipeCard","servings":4,"ingredients":[{"name":"beef top round steak","quantity":"1 pound"},{"name":"paprika","quantity":"1 tablespoon"},{"name":"butter","quantity":"2 tablespoons"},{"name":"beef broth","quantity":"1 can (10-1/2 ounces)"},{"name":"garlic cloves","quantity":"2"},{"name":"green peppers","quantity":"2 medium"},{"name":"onion","quantity":"1 cup"},{"name":"cornstarch","quantity":"2 tablespoons"},{"name":"soy sauce","quantity":"2 tablespoons"},{"name":"water","quantity":"1/3 cup"},{"name":"fresh tomatoes","quantity":"2"},{"name":"rice","quantity":""}],"instructions":["Season the sliced beef with paprika. Melt the butter in a large skillet over medium-high heat. Saute the meat until browned. Then, stir in the broth and garlic. Cover the skillet and simmer for 30 minutes.","Add the green pepper and onion to the skillet. Cover and simmer for another five minutes.","In a small bowl, whisk the cornstarch, soy sauce and water, then add the mixture to the skillet. Continue cooking, uncovered, until thickened. Add the tomatoes and cook until heated through. Serve with hot cooked rice."],"activeMinutes":25,"passiveMinutes":5,"complexity":"Medium","estMinutes":35,"dishCount":2,"tags":["dinner","beef"],"imageUrl":"https://photos.anylist.com/30dc6ce85c074525ae2df0a1760189e9.jpg"},
  {"name":"Beef Stroganoff","url":"https://www.allrecipes.com/recipe/25202/beef-stroganoff-iii/","servings":8,"ingredients":[{"name":"beef chuck roast","quantity":"2 pounds"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"ground black pepper","quantity":"1/2 teaspoon"},{"name":"butter","quantity":"4 ounces"},{"name":"green onions","quantity":"4"},{"name":"all-purpose flour","quantity":"4 tablespoons"},{"name":"condensed beef broth","quantity":"1 (10.5 ounce) can"},{"name":"mustard","quantity":"1 teaspoon"},{"name":"mushrooms","quantity":"1 (6 ounce) can"},{"name":"sour cream","quantity":"1/3 cup"},{"name":"white wine","quantity":"1/3 cup"}],"instructions":["Remove any fat and gristle from chuck roast; cut into strips 1/2-inch thick by 2-inches long. Season with 1/2 teaspoon salt and 1/2 teaspoon pepper.","Melt butter in a large skillet over medium heat. Add beef and brown quickly.","Push beef to one side of the skillet. Add onions; cook and stir for 3 to 5 minutes, then push to the side with beef.","Stir flour into juices on the empty side of the pan. Pour in beef broth and bring to a boil, stirring constantly. Lower the heat and stir in mustard. Cover and simmer for 1 hour or until the beef is tender.","Five minutes before serving, stir in mushrooms, sour cream, and white wine. Cook until heated through; season with salt and pepper.","Serve over hot cooked noodles."],"activeMinutes":35,"passiveMinutes":60,"complexity":"Medium","estMinutes":45,"dishCount":1,"tags":["dinner","beef","make-ahead"],"imageUrl":"https://photos.anylist.com/f056c55dad1a4279a5d5c1a29ab79cf5.jpg"},
  {"name":"Sausage, Peppers, Onions, and Potato Bake","url":"https://www.allrecipes.com/recipe/214500/sausage-peppers-onions-and-potato-bake/","servings":8,"ingredients":[{"name":"olive oil","quantity":"2 teaspoons"},{"name":"italian sausage links","quantity":"2 pounds"},{"name":"potatoes","quantity":"4 large"},{"name":"green bell peppers","quantity":"2 large"},{"name":"red bell peppers","quantity":"2 large"},{"name":"onions","quantity":"3 large"},{"name":"white wine","quantity":"1/2 cup"},{"name":"chicken stock","quantity":"1/2 cup"},{"name":"italian seasoning","quantity":"1 teaspoon"},{"name":"salt and ground black pepper","quantity":""}],"instructions":["Preheat oven to 400F.","Heat 2 teaspoons olive oil in a large skillet over medium heat, and cook and stir the sausage until browned, 5 to 10 minutes. Transfer cooked sausage to a large baking dish.","Pour 1/4 cup of olive oil into the skillet, and cook potatoes, stirring occasionally, until browned, about 10 minutes.","Place the potatoes into the baking dish, leaving some oil in the skillet.","Cook and stir green and red peppers and onions in the hot skillet until they are beginning to soften, about 5 minutes.","Add the vegetables to the baking dish. Pour wine and chicken stock over the vegetables and sausage, and sprinkle with Italian seasoning, salt, and pepper.","Gently stir sausage, potatoes, and vegetables together.","Bake in the preheated oven until hot and bubbling, 20 to 25 minutes."],"activeMinutes":15,"passiveMinutes":50,"complexity":"Light","estMinutes":20,"dishCount":2,"tags":["dinner","pork","fast"],"imageUrl":"https://photos.anylist.com/48296043c63142738c74240eef0b37a9.jpg"},
  {"name":"Creamy Chicken and Orzo Bake","url":"https://fortheloveofgourmet.com/creamy-chicken-and-orzo-bake/","servings":6,"ingredients":[{"name":"chicken thighs","quantity":"6-8"},{"name":"salt","quantity":"1 tsp"},{"name":"ground black pepper","quantity":"1/2 tsp"},{"name":"garlic powder","quantity":"1 tsp"},{"name":"onion powder","quantity":"1 tsp"},{"name":"olive oil","quantity":"2 tbsp"},{"name":"orzo pasta","quantity":"1 1/2 cups"},{"name":"lemon","quantity":"1"},{"name":"heavy cream","quantity":"3/4 cup"},{"name":"chicken broth","quantity":"1 1/2 cups"},{"name":"grape tomatoes","quantity":"16 oz"},{"name":"parmesan cheese","quantity":"1 cup"},{"name":"fresh parsley","quantity":""}],"instructions":["Preheat oven to 375F.","Pat the chicken thighs dry with a paper towel and season with salt, pepper, garlic powder, and onion powder.","Heat the olive oil in a large skillet. Brown the chicken thighs for 5-7 minutes per side, until the skin is golden brown and crispy. Transfer to a plate.","In a baking dish, mix together pasta, lemon juice and zest, cream, chicken broth, tomatoes, and cheese.","Place the chicken thighs on top of the pasta. Bake for 45-55 minutes until the internal temperature of the chicken reaches 165F.","Serve topped with additional fresh parmesan and fresh parsley."],"activeMinutes":20,"passiveMinutes":30,"complexity":"Medium","estMinutes":30,"dishCount":2,"tags":["dinner","chicken","pasta","fast"],"imageUrl":"https://photos.anylist.com/1c8959ab0088477c981e7af73887cee2.jpg"},
  {"name":"Garlic Chicken Stir Fry","url":"https://www.allrecipes.com/recipe/8934/garlic-chicken-stir-fry/","servings":4,"ingredients":[{"name":"peanut oil","quantity":"2 tablespoons"},{"name":"garlic","quantity":"6 cloves"},{"name":"fresh ginger","quantity":"1 teaspoon"},{"name":"green onions","quantity":"1 bunch"},{"name":"salt","quantity":"1 teaspoon"},{"name":"chicken breasts","quantity":"1 pound"},{"name":"onions","quantity":"2"},{"name":"cabbage","quantity":"1 cup"},{"name":"red bell pepper","quantity":"1"},{"name":"sugar snap peas","quantity":"2 cups"},{"name":"chicken broth","quantity":"1 cup"},{"name":"soy sauce","quantity":"2 tablespoons"},{"name":"white sugar","quantity":"2 tablespoons"},{"name":"cornstarch","quantity":"2 tablespoons"}],"instructions":["Heat peanut oil in a wok or large skillet. When oil begins to smoke, quickly stir in 2 cloves minced garlic, ginger root, green onions and salt. Stir fry until onion becomes translucent, about 2 minutes. Add chicken and stir until opaque, about 3 minutes. Add remaining 4 cloves minced garlic and stir. Add sweet onions, cabbage, bell pepper, peas and 1/2 cup of the broth/water and cover.","In a small bowl, mix the remaining 1/2 cup broth/water, soy sauce, sugar and cornstarch. Add sauce mixture to wok/skillet and stir until chicken and vegetables are coated with the thickened sauce. Serve immediately, over hot rice if desired."],"activeMinutes":25,"passiveMinutes":0,"complexity":"Medium","estMinutes":25,"dishCount":3,"tags":["dinner","chicken"],"imageUrl":"https://photos.anylist.com/f19a868a9de24dde9410dad9e1c73fdc.jpg"},
  {"name":"Ham Tetrazzini","url":"https://www.allrecipes.com/recipe/11894/ham-tetrazzini/","servings":4,"ingredients":[{"name":"spaghetti","quantity":"6 ounces"},{"name":"water","quantity":"3 quarts"},{"name":"salt","quantity":"1 teaspoon"},{"name":"butter","quantity":"1 tablespoon"},{"name":"onion","quantity":"2 tablespoons"},{"name":"condensed cream of mushroom soup","quantity":"1 (10.75 ounce) can"},{"name":"cheddar cheese","quantity":"1/2 cup"},{"name":"ham","quantity":"1 cup"},{"name":"fresh parsley","quantity":"2 tablespoons"},{"name":"pimento peppers","quantity":"2 tablespoons"}],"instructions":["Bring a large pot of lightly salted water to a boil. Add spaghetti and cook for 8 to 10 minutes or until al dente; drain.","While pasta is cooking, melt butter in a saucepan over medium heat. Stir in onion; cook and stir until translucent, about 5 minutes.","Stir in cream of mushroom soup, 1/2 cup water, and shredded cheese. Heat mixture until cheese melts, stirring often.","Mix in the ham, cooked and drained pasta, chopped pimento, and chopped parsley to saucepan; stir to combine. Cook until mixture is heated through, then serve."],"activeMinutes":25,"passiveMinutes":25,"complexity":"Medium","estMinutes":50,"dishCount":2,"tags":["dinner","pork","pasta","freezer-friendly"],"imageUrl":"https://photos.anylist.com/caae490b9d374c96be2081c272cbd3ba.jpg"},
  {"name":"Beef Enchiladas with Flour Tortillas","url":"https://www.allrecipes.com/recipe/26589/beef-enchiladas-ii/","servings":10,"ingredients":[{"name":"ground beef","quantity":"1 pound"},{"name":"onion","quantity":"1 small"},{"name":"enchilada sauce mix","quantity":"1 (1.5 ounce) package"},{"name":"flour tortillas","quantity":"10 (10 inch)"},{"name":"cheddar cheese","quantity":"2 cups"},{"name":"black olives","quantity":"1 (2.25 ounce) can"}],"instructions":["Preheat the oven to 350F.","Cook ground beef and onion in a medium skillet over medium-high heat until beef is evenly browned and onion is tender.","Prepare enchilada sauce according to package directions. Pour 1/4 cup of the sauce into the bottom of a 9x13-inch baking dish.","Place an equal portion of the ground beef mixture and about 1 ounce of Cheddar cheese on each flour tortilla, reserving at least 1/2 cup of cheese. Then tightly roll the tortillas.","Place rolled tortillas seam side down in the baking dish.","Pour remaining sauce over the top of the enchiladas and sprinkle with remaining cheese and olives.","Bake in the preheated oven until the sauce is bubbly and cheese is thoroughly melted, about 20 minutes."],"activeMinutes":30,"passiveMinutes":25,"complexity":"Heavy","estMinutes":35,"dishCount":2,"tags":["dinner","beef","freezer-friendly"],"imageUrl":"https://photos.anylist.com/8b276bb44cc147a392b24dbfc71485bd.jpg"},
  {"name":"Sloppy Joe Pasta Casserole","url":"https://www.allrecipes.com/recipe/236925/sloppy-joe-casserole/","servings":8,"ingredients":[{"name":"penne pasta","quantity":"1 (16 ounce) package"},{"name":"olive oil","quantity":"1 tablespoon"},{"name":"ground beef","quantity":"1 1/2 pounds"},{"name":"yellow onion","quantity":"1 medium"},{"name":"red bell pepper","quantity":"1 small"},{"name":"green bell pepper","quantity":"1 small"},{"name":"paprika","quantity":"1 tablespoon"},{"name":"garlic powder","quantity":"2 teaspoons"},{"name":"kosher salt","quantity":"2 teaspoons"},{"name":"tomato sauce","quantity":"2 (15-ounce) cans"},{"name":"ketchup","quantity":"1/2 cup"},{"name":"yellow mustard","quantity":"2 tablespoons"},{"name":"worcestershire sauce","quantity":"2 tablespoons"},{"name":"light brown sugar","quantity":"2 tablespoons"},{"name":"frozen yellow corn kernels","quantity":"2 cups"},{"name":"colby-jack cheese","quantity":"1 1/2 cups"},{"name":"cooking spray","quantity":""}],"instructions":["Preheat the oven to 350F.","Bring a large pot of salted water to a boil. Add pasta and cook according to package directions for al dente. Drain.","While pasta cooks, heat oil in a large Dutch oven over medium-high. Add beef and cook, stirring often to crumble, until no longer pink, about 5 minutes.","Stir in onion, bell peppers, paprika, garlic powder, and salt; cook until softened, about 4 minutes.","Stir in tomato sauce, ketchup, mustard, Worcestershire, and brown sugar; bring to a boil. Reduce heat to medium and cook until slightly thickened, about 5 minutes.","Remove from heat, stir in cooked pasta, corn, and 3/4 cup of the cheese.","Coat a 9x13-inch baking dish with cooking spray; transfer beef and pasta mixture into the dish. Sprinkle evenly with remaining 3/4 cup cheese.","Bake until heated through and cheese is melted, about 20 minutes."],"activeMinutes":30,"passiveMinutes":30,"complexity":"Heavy","estMinutes":35,"dishCount":3,"tags":["dinner","beef","pasta","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/eb275d59497848c7855d5c6f396839d7.jpg"},
  {"name":"Sesame Grilled Salmon","url":"https://www.allrecipes.com/recipe/237900/sesame-grilled-salmon/","servings":2,"ingredients":[{"name":"light soy sauce","quantity":"1/4 cup"},{"name":"honey","quantity":"1 1/2 tablespoons"},{"name":"fresh ginger","quantity":"1 tablespoon"},{"name":"garlic","quantity":"1 clove"},{"name":"salmon fillets","quantity":"1 pound"},{"name":"sesame oil","quantity":"1 teaspoon"},{"name":"sesame seeds","quantity":"2 teaspoons"}],"instructions":["Whisk soy sauce, honey, ginger, and garlic together in a bowl until marinade is evenly mixed. Set aside 1/4 of the marinade.","Place salmon fillets in a shallow dish; pour the remaining marinade over the salmon. Cover and refrigerate for 5 minutes.","Heat sesame oil in a large skillet over medium-high heat.","Remove salmon from marinade and place skin-side up into the hot oil; cook for 4 minutes. Flip salmon and drizzle the reserved marinade over salmon; sprinkle with sesame seeds.","Cook until fish flakes easily with a fork, 5 to 7 minutes. Flip salmon, remove skin, and cook 1 minute more."],"activeMinutes":8,"passiveMinutes":10,"complexity":"Light","estMinutes":10,"dishCount":2,"tags":["dinner","fish","fast"],"imageUrl":"https://photos.anylist.com/7f81c6ef2cd9428bbf53a01ddc067e53.jpg"},
  {"name":"Creamy White Chili","url":"https://www.allrecipes.com/recipe/229949/creamy-white-chili/","servings":8,"ingredients":[{"name":"olive oil","quantity":"1 tablespoon"},{"name":"chicken breast halves","quantity":"1 pound"},{"name":"onion","quantity":"1"},{"name":"garlic","quantity":"2 cloves"},{"name":"great northern beans","quantity":"2 (15.5 ounce) cans"},{"name":"chicken broth","quantity":"1 (14.5 ounce) can"},{"name":"green chiles","quantity":"2 (4 ounce) cans"},{"name":"salt","quantity":"1 teaspoon"},{"name":"ground cumin","quantity":"1 teaspoon"},{"name":"oregano","quantity":"1 teaspoon"},{"name":"ground black pepper","quantity":"1/2 teaspoon"},{"name":"cayenne pepper","quantity":"1/4 teaspoon"},{"name":"sour cream","quantity":"1 cup"},{"name":"heavy whipping cream","quantity":"1/2 cup"}],"instructions":["Heat olive oil in a large saucepan over medium heat. Add chicken, onion, and garlic; cook and stir until chicken is no longer pink and juices run clear, 10 to 15 minutes.","Stir in beans, chicken broth, green chiles, salt, cumin, oregano, black pepper, and cayenne pepper; bring to a boil. Reduce heat and simmer until flavors have blended, about 30 minutes.","Remove chili from heat; stir in sour cream and whipping cream until incorporated.","Serve hot."],"activeMinutes":20,"passiveMinutes":30,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","soup","chicken","freezer-friendly","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/d5e1772f5abd4856bc5dca3ace4b366f.jpg"},
  {"name":"Arroz Con Pollo (Chicken and Rice)","url":"https://www.allrecipes.com/recipe/8541/carols-arroz-con-pollo/","servings":4,"ingredients":[{"name":"chicken breast halves","quantity":"4"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"ground black pepper","quantity":"1/2 teaspoon"},{"name":"paprika","quantity":"1/2 teaspoon"},{"name":"vegetable oil","quantity":"3 tablespoons"},{"name":"green bell pepper","quantity":"1"},{"name":"onion","quantity":"3/4 cup"},{"name":"garlic","quantity":"1 1/2 teaspoons"},{"name":"long-grain white rice","quantity":"1 cup"},{"name":"chicken broth","quantity":"1 (14.5 ounce) can"},{"name":"stewed tomatoes","quantity":"1 (14.5 ounce) can"},{"name":"white wine","quantity":"1/2 cup"},{"name":"saffron","quantity":"1/8 teaspoon"},{"name":"fresh parsley","quantity":"1 tablespoon"}],"instructions":["Season chicken with 1/4 teaspoon salt, 1/4 teaspoon pepper, and 1/4 teaspoon paprika.","Heat oil in a large skillet over medium heat. Add seasoned chicken; cook and stir until no longer pink and golden brown on all sides, about 10 minutes. Transfer chicken onto a plate; set aside.","Add green pepper, onions, and garlic to the same skillet; cook and stir for 5 minutes. Add rice; cook and stir until rice is opaque, 1 to 2 minutes. Stir in broth, tomatoes, white wine, and saffron. Stir in remaining 1/4 teaspoon salt, 1/4 teaspoon pepper, and 1/4 teaspoon paprika; bring to a boil, cover, and simmer for 20 minutes.","Add chicken and stir until heated through. Stir in parsley and serve."],"activeMinutes":25,"passiveMinutes":25,"complexity":"Medium","estMinutes":30,"dishCount":1,"tags":["dinner","chicken","fast"],"imageUrl":"https://photos.anylist.com/76ab5ea7330a469abe5d64294cf2619b.jpg"},
  {"name":"Broiled Tilapia Parmesan","url":"https://www.allrecipes.com/recipe/50644/broiled-tilapia-parmesan/","servings":8,"ingredients":[{"name":"parmesan cheese","quantity":"1/2 cup"},{"name":"butter","quantity":"1/4 cup"},{"name":"mayonnaise","quantity":"3 tablespoons"},{"name":"fresh lemon juice","quantity":"2 tablespoons"},{"name":"basil","quantity":"1/4 teaspoon"},{"name":"ground black pepper","quantity":"1/4 teaspoon"},{"name":"onion powder","quantity":"1/8 teaspoon"},{"name":"celery salt","quantity":"1/8 teaspoon"},{"name":"tilapia fillets","quantity":"2 pounds"}],"instructions":["Set an oven rack about 4 inches from the heat source and preheat the oven\u0027s broiler. Line a broiler pan with aluminum foil.","Mix Parmesan cheese, butter, mayonnaise, lemon juice, basil, pepper, onion powder, and celery salt together in a bowl until well combined.","Arrange tilapia fillets in a single layer on the prepared pan.","Broil in the preheated oven for 4 minutes, flipping halfway through. Remove from the oven and spread Parmesan mixture over fillets. Return to the oven and broil until topping is browned and fish flakes easily, about 2 more minutes."],"activeMinutes":10,"passiveMinutes":8,"complexity":"Light","estMinutes":15,"dishCount":1,"tags":["dinner","fish","fast"],"imageUrl":"https://photos.anylist.com/e4dccbd86bba4b1a87a8678f9991a622.jpg"},
  {"name":"Braised Corned Beef Brisket","url":"https://www.allrecipes.com/recipe/231030/braised-corned-beef-brisket/","servings":6,"ingredients":[{"name":"corned beef brisket","quantity":"1 (5 pound)"},{"name":"browning sauce","quantity":"1 tablespoon"},{"name":"vegetable oil","quantity":"1 tablespoon"},{"name":"onion","quantity":"1"},{"name":"garlic","quantity":"6 cloves"},{"name":"water","quantity":"2 tablespoons"}],"instructions":["Preheat the oven to 275F.","Discard any flavoring packet from corned beef. Brush brisket with browning sauce on both sides.","Heat vegetable oil in a large skillet over medium-high heat and brown brisket on both sides in the hot oil, 5 to 8 minutes per side.","Place brisket on a rack set in a roasting pan. Scatter onion and garlic slices over brisket and add water to roasting pan. Cover pan tightly with aluminum foil.","Roast in the preheated oven until meat is tender, about 6 hours."],"activeMinutes":20,"passiveMinutes":180,"complexity":"Light","estMinutes":25,"dishCount":2,"tags":["dinner","beef","make-ahead","fast"],"imageUrl":"https://photos.anylist.com/2cc1b6a3be924b51818dad3396d2c1b7.jpg"},
  {"name":"Cindy\u0027s Jambalaya","url":"https://www.allrecipes.com/recipe/214381/cindys-jambalaya/","servings":8,"ingredients":[{"name":"olive oil","quantity":"1 tablespoon"},{"name":"sausage","quantity":"1/2 pound"},{"name":"onion","quantity":"1 large"},{"name":"green bell pepper","quantity":"1 cup"},{"name":"celery","quantity":"1 cup"},{"name":"salt","quantity":""},{"name":"cajun seasoning","quantity":"1/2 teaspoon"},{"name":"white rice","quantity":"1 cup"},{"name":"tomatoes with juice","quantity":"1 (14.5 ounce) can"},{"name":"garlic","quantity":"1 tablespoon"},{"name":"chicken broth","quantity":"2 cups"},{"name":"bay leaves","quantity":"3"},{"name":"thyme leaves","quantity":"1/4 teaspoon"},{"name":"deveined shrimp","quantity":"1 pound"}],"instructions":["Heat olive oil in a Dutch oven or large pot over medium heat. Stir in sausage and cook for 2 minutes. Add onion, bell pepper, and celery; season with salt and Cajun seasoning. Cook and stir until vegetables are soft, 6 to 8 minutes. Stir in rice, then add tomatoes with juice, garlic, chicken broth, bay leaves, and thyme leaves. Bring to a simmer over medium-high heat, then reduce heat to medium-low, cover, and simmer for 20 minutes.","Stir in shrimp and cook uncovered until shrimp turn pink and are no longer translucent, about 10 minutes. Remove the pot from heat and let stand for 5 minutes. Discard bay leaves before serving."],"activeMinutes":30,"passiveMinutes":30,"complexity":"Heavy","estMinutes":35,"dishCount":2,"tags":["dinner","soup","seafood","freezer-friendly"],"imageUrl":"https://photos.anylist.com/516d0af9ca1f497990f97148c4e3a5ae.jpg"},
  {"name":"Baked Spaghetti","url":"https://www.allrecipes.com/recipe/222582/baked-spaghetti/","servings":8,"ingredients":[{"name":"spaghetti","quantity":"1 (16 ounce) package"},{"name":"ground beef","quantity":"1 pound"},{"name":"onion","quantity":"1"},{"name":"meatless spaghetti sauce","quantity":"1 (32 ounce) jar"},{"name":"salt","quantity":"1/2 teaspoon"},{"name":"eggs","quantity":"2 large"},{"name":"parmesan cheese","quantity":"1/3 cup"},{"name":"butter","quantity":"5 tablespoons"},{"name":"cottage cheese","quantity":"2 cups"},{"name":"mozzarella cheese","quantity":"5 cups"}],"instructions":["Preheat the oven to 350F. Lightly grease a 9x13-inch baking dish.","Bring a large pot of lightly salted water to a boil. Cook spaghetti, stirring occasionally, until tender but firm to the bite, about 12 minutes. Drain.","Meanwhile, heat a large skillet over medium heat. Cook and stir beef and onion until meat is browned and onion is soft, about 5 to 7 minutes.","Drain excess oil from the pan; stir in spaghetti sauce and seasoned salt.","Whisk eggs, Parmesan, and butter in a large bowl. Add spaghetti and toss to coat.","Place half of the spaghetti mixture in the prepared baking dish. Top with half of the cottage cheese, 2 cups mozzarella, and half of the meat sauce. Repeat layers. Cover with aluminum foil.","Bake in the preheated oven for 40 minutes. Remove the foil and sprinkle with remaining 1 cup mozzarella.","Continue to bake until cheese is melted and lightly browned, 20 to 25 minutes."],"activeMinutes":40,"passiveMinutes":35,"complexity":"Heavy","estMinutes":50,"dishCount":4,"tags":["dinner","beef","pasta","kid-friendly","freezer-friendly"],"imageUrl":"https://photos.anylist.com/d65307a438d840f68fe131a74d25a467.jpg"},
  {"name":"Baked Ziti","url":"https://www.allrecipes.com/recipe/11758/baked-ziti-i/","servings":8,"ingredients":[{"name":"ziti pasta","quantity":"1 pound"},{"name":"onion","quantity":"1"},{"name":"ground beef","quantity":"1 pound"},{"name":"spaghetti sauce","quantity":"2 (26 ounce) jars"},{"name":"provolone cheese","quantity":"6 ounces"},{"name":"sour cream","quantity":"1 1/2 cups"},{"name":"mozzarella cheese","quantity":"6 ounces"},{"name":"parmesan cheese","quantity":"2 tablespoons"}],"instructions":["Bring a large pot of lightly salted water to a boil. Add ziti pasta, and cook until al dente, about 8 minutes; drain.","Meanwhile, brown ground beef and onion in a large skillet over medium heat; stir in spaghetti sauce and simmer for 15 minutes. Preheat the oven to 350F. Butter a 9x13-inch baking dish.","Spread half of the ziti in the bottom of the prepared dish.","Top with Provolone cheese.","Top with sour cream.","Add half of the meat sauce, remaining ziti, mozzarella cheese, and remaining meat sauce. Top with grated Parmesan cheese.","Bake in the preheated oven until heated through and cheeses have melted, about 30 minutes."],"activeMinutes":30,"passiveMinutes":30,"complexity":"Medium","estMinutes":40,"dishCount":3,"tags":["dinner","beef","pasta","kid-friendly","freezer-friendly","make-ahead"],"imageUrl":"https://photos.anylist.com/ba3ad24ac5fc415184c521b9595c2e43.jpg"},
  {"name":"Chicken Parmesan","url":"https://www.allrecipes.com/recipe/223042/chicken-parmesan/","servings":4,"ingredients":[{"name":"chicken breast halves","quantity":"4"},{"name":"salt and ground black pepper","quantity":""},{"name":"eggs","quantity":"2 large"},{"name":"panko bread crumbs","quantity":"1 cup"},{"name":"parmesan cheese","quantity":"3/4 cup"},{"name":"all-purpose flour","quantity":"2 tablespoons"},{"name":"olive oil","quantity":"1/2 cup"},{"name":"tomato sauce","quantity":"1/2 cup"},{"name":"fresh mozzarella","quantity":"1/4 cup"},{"name":"fresh basil","quantity":"1/4 cup"},{"name":"provolone cheese","quantity":"1/2 cup"}],"instructions":["Preheat an oven to 450F.","Place chicken breasts between two sheets of heavy plastic on a solid, level surface. Firmly pound chicken with the smooth side of a meat mallet to a thickness of 1/2-inch.","Season chicken thoroughly with salt and pepper. Sprinkle flour over chicken breasts, evenly coating both sides.","Beat eggs in a shallow bowl. Mix bread crumbs and 1/2 cup Parmesan cheese in a separate bowl. Dip a flour-coated chicken breast in beaten eggs. Transfer to the bread crumb mixture, pressing crumbs into both sides. Repeat for each breast. Let chicken rest for 10 to 15 minutes.","Heat 1/2 inch olive oil in a large skillet on medium-high heat until it begins to shimmer. Cook chicken until golden, about 2 minutes per side. The chicken will finish cooking in the oven.","Transfer chicken to a baking dish. Top each breast with 2 tablespoons tomato sauce. Layer with mozzarella, fresh basil, and provolone. Sprinkle remaining Parmesan over top and drizzle with olive oil.","Bake in the preheated oven until cheese is browned and chicken breasts are no longer pink in the center, 15 to 20 minutes."],"activeMinutes":35,"passiveMinutes":20,"complexity":"Heavy","estMinutes":40,"dishCount":2,"tags":["dinner","chicken","kid-friendly"],"imageUrl":"https://photos.anylist.com/eed4894e7dad472a923442e684294d7e.jpg"},

function ScrollNudges() {
  const [state, setState] = useState({ canUp: false, canDown: false });

  const findPane = () => {
    // Prefer the topmost open modal sheet's scrollable inner div
    const sheets = document.querySelectorAll('.modal-sheet');
    if (sheets.length) {
      const top = sheets[sheets.length - 1];
      const all = top.querySelectorAll('div');
      for (const el of all) {
        if (el.scrollHeight > el.clientHeight + 2) return el;
      }
      return top; // fallback to the sheet itself
    }
    return document.querySelector('.phone .pane');
  };

  useEffect(() => {
    let raf = 0;
    const update = () => {
      const pane = findPane();
      if (!pane) { setState({ canUp: false, canDown: false }); return; }
      const canUp = pane.scrollTop > 4;
      const canDown = pane.scrollTop + pane.clientHeight < pane.scrollHeight - 4;
      setState(prev => prev.canUp === canUp && prev.canDown === canDown ? prev : { canUp, canDown });
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    update();
    document.addEventListener('scroll', onScroll, true);
    const id = setInterval(update, 250); // catch DOM swaps (screen changes, modals)
    return () => { document.removeEventListener('scroll', onScroll, true); clearInterval(id); cancelAnimationFrame(raf); };
  }, []);

  const nudge = (dir) => {
    const pane = findPane();
    if (!pane) return;
    const step = Math.max(120, Math.round(pane.clientHeight * 0.6));
    pane.scrollBy({ top: dir * step, behavior: 'smooth' });
  };

  return (
    <>
      <span className={`scroll-nudge up${state.canUp ? '' : ' disabled'}`} onClick={() => nudge(-1)}>▲</span>
      <span className={`scroll-nudge down${state.canDown ? '' : ' disabled'}`} onClick={() => nudge(1)}>▼</span>
    </>
  );
}

function Phone({ children }) {
  return (
    <div className="phone">
      <div className="notch" />
      <div className="status-bar"></div>
      {children}
      <ScrollNudges />
    </div>
  );
}

/* Horizontal scroll row with side arrows that fade in/out by scroll position.
   Used for the Recipes-tab filter rows so the user can nudge the pills sideways
   on a touch screen without a fiddly drag. */
function HScroll({ children, style }) {
  const ref = React.useRef(null);
  const [state, setState] = useState({ canL: false, canR: false });
  const update = useCallback(() => {
    const el = ref.current;
    if (!el) return;
    const canL = el.scrollLeft > 4;
    const canR = el.scrollLeft + el.clientWidth < el.scrollWidth - 4;
    setState(prev => prev.canL === canL && prev.canR === canR ? prev : { canL, canR });
  }, []);
  useEffect(() => {
    update();
    const el = ref.current;
    if (!el) return;
    el.addEventListener('scroll', update, { passive: true });
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => { el.removeEventListener('scroll', update); ro.disconnect(); };
  }, [update]);
  // Re-check after children change (e.g. effort row swapping width)
  useEffect(() => { update(); }, [children, update]);
  const nudge = (dir) => {
    const el = ref.current;
    if (!el) return;
    const step = Math.max(80, Math.round(el.clientWidth * 0.6));
    el.scrollBy({ left: dir * step, behavior: 'smooth' });
  };
  return (
    <div className="h-scroll-wrap" style={style}>
      <span className={`h-scroll-arrow left${state.canL ? '' : ' disabled'}`} onClick={() => nudge(-1)}>‹</span>
      <div className="h-scroll-row" ref={ref}>{children}</div>
      <span className={`h-scroll-arrow right${state.canR ? '' : ' disabled'}`} onClick={() => nudge(1)}>›</span>
    </div>
  );
}

function Toggle({ on, onChange }) {
  return (
    <div className={`toggle ${on ? 'on' : 'off'}`} onClick={() => onChange(!on)}>
      <div className="toggle-knob" />
    </div>
  );
}
