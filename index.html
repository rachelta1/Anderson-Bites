          onConfirm={handleDelete}
          onClose={() => setConfirmDel(false)}
        />
      )}

      <TabBar active={2} onTab={onTab} />
    </div>
  );
}

/* ═══════════════════════════════════════════
   SCREEN: AUTO-PLAN
═══════════════════════════════════════════ */
const PLAN_DAYS = [
  { d:'Mon', dt:'Apr 27', on:false },
  { d:'Tue', dt:'Apr 28', on:true  },
  { d:'Wed', dt:'Apr 29', on:true  },
  { d:'Thu', dt:'Apr 30', on:true  },
  { d:'Fri', dt:'May 1',  on:false },
  { d:'Sat', dt:'May 2',  on:false },
  { d:'Sun', dt:'May 3',  on:false },
  { d:'Mon', dt:'May 4',  on:true  },
];

function BreakfastPicker({ picks, setPicks, recipeDB }) {
  const breakfastNames = recipeDB.filter(r => (r.tags || []).includes('breakfast')).map(r => r.name).sort();
  const options = [BREAKFAST_NONE, ...breakfastNames];
  const handleChange = (i, val) => {
    const next = [...picks];
    next[i] = val;
    if (val !== '— none —' && i === picks.length - 1) next.push('');
    if (val === '— none —') {
      next.splice(i, next.length - i);
      if (next.length === 0) next.push('');
    }
    setPicks(next);
  };

  return (
    <div className="card" style={{ marginBottom:10 }}>
      <div className="card-label">☀️ Breakfast rotation</div>
      {picks.map((val, i) => (
        <div key={i} className="select-wrap">
          <select className="fancy-select" value={val} onChange={e => handleChange(i, e.target.value)}>
            {options.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          <span className="select-arrow">▾</span>
        </div>
      ))}
      <div style={{ fontSize:12, color:'#444', marginTop:2 }}>Select recipes · add as many as needed</div>
    </div>
  );
}

const PLAN_DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun','Mon'];

function buildPlanDays(offset) {
  const monday = new Date(BASE_SUNDAY);
  monday.setDate(monday.getDate() + 1 + offset * 7);
  return Array.from({ length: 8 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const daysSinceBase = Math.round((d.getTime() - BASE_SUNDAY.getTime()) / 86400000);
    return {
      d: PLAN_DAY_NAMES[i],
      dt: `${MONTHS[d.getMonth()]} ${d.getDate()}`,
      weekOffset: Math.floor(daysSinceBase / 7),
      slotIdx: ((daysSinceBase % 7) + 7) % 7,
      on: offset === 0 ? PLAN_DAYS[i].on : false,
    };
  });
}

function planRangeLabel(offset) {
  const monday = new Date(BASE_SUNDAY);
  monday.setDate(monday.getDate() + 1 + offset * 7);
  const end = new Date(monday); end.setDate(end.getDate() + 7);
  return `${MONTHS[monday.getMonth()]} ${monday.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}`;
}

function planWeekTitle(offset) {
  if (offset === 0) return 'This week';
  if (offset === 1) return 'Next week';
  if (offset === -1) return 'Last week';
  return offset > 0 ? `In ${offset} weeks` : `${-offset} weeks ago`;
}

const AVOID_OPTS = [1, 2, 3, 4, 6, 8];

// Rolling window of recently-shown dinners that the picker excludes from
// every plan generation. Sized to comfortably cover ~3 weeks of dinner picks
// so a recipe shown once can't reappear for a few weeks of plans, but the
// pool can't shrink below the constraint set's viable candidates either —
// the picker's soft-fallback uses unexcluded candidates if exclusion starves
// the pool.
const RECENT_DINNERS_CAP = 20;

function AutoPlanScreen({
  onTab,
  recipeDB,
  weekMap, setWeekMap,
  cookingHistory, setCookingHistory,
  pantryStaples,
  groceryList, setGroceryList,
  apiKey,
  catCache, setCatCache,
  onSettings,
}) {
  const [planOffset, setPlanOffset] = useState(0);
  const [daysByOffset, setDaysByOffset] = usePersistedState('ab.autoplan.daysByOffset', {});
  // Always rebuild labels/dates from buildPlanDays; only preserve `on` flags from persisted data
  const days = (() => {
    const fresh = buildPlanDays(planOffset);
    const persisted = daysByOffset[planOffset];
    if (!persisted) return fresh;
    return fresh.map((d, i) => ({ ...d, on: persisted[i] && typeof persisted[i].on === 'boolean' ? persisted[i].on : d.on }));
  })();

  const goWeek = (delta) => setPlanOffset(planOffset + delta);

  const toggleDay = (dt) => {
    const updated = days.map(d => d.dt === dt ? { ...d, on: !d.on } : d);
    setDaysByOffset(prev => ({ ...prev, [planOffset]: updated }));
  };

  const [breakfastPicks, setBreakfastPicks] = usePersistedState('ab.autoplan.breakfastPicks', ['']);
  const [tasks, setTasks] = usePersistedState('ab.autoplan.tasks.v2', [{ name:'Laundry', on:true }]);
  const [taskModal, setTaskModal] = useState(null); // { idx } or { idx:null }
  const toggleTask = (i) => setTasks(prev => prev.map((t, j) => j === i ? { ...t, on: !t.on } : t));
  const deleteTask = (i) => setTasks(prev => prev.filter((_, j) => j !== i));
  const saveTask = (text) => {
    const named = withTaskIcon(text);
    if (taskModal && taskModal.idx != null) {
      setTasks(prev => prev.map((t, j) => j === taskModal.idx ? { ...t, name: named } : t));
    } else {
      setTasks(prev => [...prev, { name: named, on: true }]);
    }
    setTaskModal(null);
  };

  const [instructions, setInstructions] = usePersistedState('ab.autoplan.instructions.v2', 'Have chicken two nights');
  const [avoidIdx, setAvoidIdx] = usePersistedState('ab.autoplan.avoidIdx', 2);
  const stepAvoid = (delta) => setAvoidIdx(prev => Math.max(0, Math.min(AVOID_OPTS.length - 1, prev + delta)));

  const [genModal, setGenModal] = useState(null); // { existing, perDay, excludedStaples } or null
  const [previewModal, setPreviewModal] = useState(null); // { perDay, weekTitle } or null
  const [genStatus, setGenStatus] = useState(''); // success message
  const [genLoading, setGenLoading] = useState(false);
  // Re-roll: bump counter each time Generate fires with the SAME inputs.
  // Different inputs reset to count=1. Resets on remount (component unmount on
  // tab switch is fine — coming back later, you want a fresh roll).
  // - rerollSeed   = user-facing attempt counter (drives the "(#N)" label).
  // - pickerSeed   = actual integer fed to the picker's PRNG. Re-randomized
  //   on fresh fires so even the FIRST plan is different across visits;
  //   incremented per reroll so subsequent rerolls vary too.
  // - recentDinners = persistent rolling window (last RECENT_DINNERS_CAP) of
  //   dinners shown to the user — across rerolls AND fresh fires AND page
  //   reloads. Always passed to the picker as the exclusion set, so a recipe
  //   that fits "everything" (e.g. Light + fast + kid-friendly) can't dominate
  //   every fresh plan. Picker has a soft-fallback if exclusion would starve
  //   the candidate pool.
  const [rerollSeed, setRerollSeed] = useState(1);
  const [pickerSeed, setPickerSeed] = useState(() => Math.floor(Math.random() * 1_000_000) + 1);
  const [lastConstraintKey, setLastConstraintKey] = useState('');
  const [recentDinners, setRecentDinners] = usePersistedState('ab.autoplan.recentDinners.v1', []);

  // Constraint key — same shape used in handleGenerate. Computed on every
  // render so the button can preview "Re-roll" mode before the user clicks
  // (i.e. as soon as they've seen one plan and haven't touched a setting).
  const currentConstraintKey = JSON.stringify({
    d: days.map(d => `${d.dt}:${d.on ? 1 : 0}`),
    b: breakfastPicks,
    t: tasks.map(t => `${t.name}:${t.on ? 1 : 0}`),
    a: avoidIdx,
    i: (instructions || '').trim(),
    o: planOffset,
  });
  const isReroll = lastConstraintKey !== '' && currentConstraintKey === lastConstraintKey;
  const nextSeed = isReroll ? rerollSeed + 1 : 1;

  // applyPlan accepts an optional `excludedStaples` Set<string> of lowercased
  // ingredient names. Items in this set are NOT treated as pantry — they get
  // added to the grocery list even if they'd normally be filtered. Set on
  // confirm in PreviewPlanModal when the user unchecks a staple.
  const applyPlan = async (perDay, mode, opts = {}) => {
    const excludedStaples = opts.excludedStaples instanceof Set ? opts.excludedStaples : new Set();
    // 1. Write meals + tasks per day, grouped by weekOffset
    // Track which dinners/breakfasts were actually written so we only
    // aggregate groceries for meals that landed.
    const written = []; // { dt, recipe }
    const updatedWeeks = { ...weekMap };
    perDay.forEach(({ weekOffset, slotIdx, dt, dinner, breakfast, breakfasts, tasks: dayTasks }) => {
      const week = updatedWeeks[weekOffset]
        ? updatedWeeks[weekOffset].map(s => ({ ...s, meals: { ...s.meals }, tasks: [...(s.tasks || [])] }))
        : buildWeek(weekOffset);
      const slot = week[slotIdx];
      // Multi-breakfast support: prefer breakfasts[] array; fall back to single
      // breakfast for older callers. slot.meals.b is string[] — each recipe is
      // its own row in the day view and pushed individually to `written` so
      // grocery aggregation sees them all.
      const bfList = (Array.isArray(breakfasts) && breakfasts.length)
        ? breakfasts
        : (breakfast ? [breakfast] : []);
      const bfNames = bfList.map(b => b.name);
      const existingB = Array.isArray(slot.meals.b) ? slot.meals.b : (slot.meals.b ? [slot.meals.b] : []);
      if (mode === 'overwrite') {
        // "Replace everything" semantics: the picker's output for this day
        // REPLACES the day in full — including absences. If the new plan
        // has no breakfast for this day, the old breakfast (e.g. pancakes
        // the user wants gone) is cleared. Same for dinner. Tasks already
        // worked correctly since they always replaced.
        slot.meals.d = dinner ? dinner.name : null;
        slot.meals.b = bfNames; // string[] — empty array clears the breakfast row
        slot.tasks = [...dayTasks];
        if (dinner) written.push({ dt, recipe: dinner });
        bfList.forEach(b => written.push({ dt, recipe: b }));
      } else { // append
        if (dinner && !slot.meals.d) { slot.meals.d = dinner.name; written.push({ dt, recipe: dinner }); }
        if (bfList.length && !existingB.length) {
          slot.meals.b = bfNames;
          bfList.forEach(b => written.push({ dt, recipe: b }));
        }
        dayTasks.forEach(t => { if (!slot.tasks.includes(t)) slot.tasks.push(t); });
      }
      const finalB = Array.isArray(slot.meals.b) ? slot.meals.b : (slot.meals.b ? [slot.meals.b] : []);
      const hasContent = !!(slot.meals.d || finalB.length || slot.tasks.length);
      // Append never removes content, so it can only flip planned ON.
      // Overwrite is full-replace — reflect emptiness too (rare: only if the
      // picker returned nothing and the user had no breakfasts/tasks set).
      if (mode === 'overwrite') slot.planned = hasContent;
      else if (hasContent) slot.planned = true;
      updatedWeeks[weekOffset] = week;
    });
    setWeekMap(updatedWeeks);

    // 2. Append cooking history for written meals
    if (written.length) {
      const histAdds = written.map(({ dt, recipe }) => ({
        name: recipe.name,
        weekOffset: perDay.find(p => p.dt === dt).weekOffset,
        dt,
      }));
      setCookingHistory([...cookingHistory, ...histAdds]);
    }

    // 3. Aggregate ingredients into grocery list — only for meals actually written
    // classify maps each ingredient string to a single pantry concept (e.g.
    // "salt", "oil") or null if it's not pantry. excludedStaples holds concept
    // keys the user opted back onto the grocery list via the preview modal.
    // Keying by concept (not raw ingredient string) means "kosher salt" and
    // "salt" travel together — unchecking one releases both.
    const classify = classifyPantry(pantryStaples);
    const isPantry = (ing) => {
      const key = classify(ing);
      if (!key) return false;
      if (excludedStaples.has(key)) return false;
      return true;
    };
    const aggregated = {}; // key=lowercased name → { name, qSet:Set, srcs:Set }
    const missingIngredients = []; // diagnostic — recipes the picker chose but we couldn't aggregate
    written.forEach(({ dt, recipe }) => {
      const ings = recipe.ingredients || [];
      const qtys = Array.isArray(recipe.ingredientsWithQty) ? recipe.ingredientsWithQty : [];
      if (!ings.length) {
        // Picker returned a stub (e.g. breakfastName not found in recipeDB) —
        // log so a future overwrite mystery has a fingerprint instead of silently
        // missing groceries.
        missingIngredients.push(`${dt} · ${recipe.name || '(unnamed)'}`);
      }
      ings.forEach((ing, i) => {
        if (!ing || isPantry(ing)) return;
        const key = ing.toLowerCase();
        if (!aggregated[key]) aggregated[key] = { name: ing, qSet: new Set(), srcs: new Set() };
        const raw = qtys[i];
        if (raw) {
          const parsed = parseItem(raw);
          if (parsed.q) aggregated[key].qSet.add(parsed.q);
        }
        aggregated[key].srcs.add(`${dt} · ${recipe.name}`);
      });
    });
    if (missingIngredients.length) {
      console.warn('[applyPlan] recipes had no ingredients — groceries skipped for:', missingIngredients);
    }
    // 3a. In overwrite mode, strip the old day's grocery contributions before
    //     re-aggregating. Otherwise overwriting a day would leave the OLD meal's
    //     groceries lingering on top of the NEW meal's groceries.
    //
    //     Date-matching is tolerant: a src segment like "Apr 28 · Salmon" OR
    //     "Mon Apr 28 · Salmon" both match overwriteDt "Apr 28". Older mock-seeded
    //     items used the weekday-prefixed format; new aggregation does not. The
    //     strip needs to handle both shapes or stale items linger.
    let stripped = 0;
    let nextList;
    if (mode === 'overwrite') {
      // Only strip for days where we actually wrote a new meal. If the picker
      // failed to choose a dinner/breakfast for a day, that day keeps its old
      // meal in the calendar — so its groceries should stay too. Otherwise the
      // user sees the old meal name with no groceries.
      const writtenDts = new Set(written.map(w => w.dt));
      const overwriteDts = [...new Set(perDay.filter(p => writtenDts.has(p.dt)).map(p => p.dt))];
      // Match dt as a whole-token substring of the date portion of each src segment.
      // E.g. dt="Apr 28" matches "Apr 28 · Salmon" AND "Mon Apr 28 · Salmon".
      const matchesOverwriteDt = (segment) => {
        const datePart = segment.split(' · ')[0].trim();
        return overwriteDts.some(dt => {
          if (datePart === dt) return true;
          // whole-word/phrase match anywhere in datePart
          const idx = datePart.indexOf(dt);
          if (idx === -1) return false;
          const before = idx === 0 || /\s/.test(datePart[idx - 1]);
          const afterIdx = idx + dt.length;
          const after = afterIdx === datePart.length || /\s/.test(datePart[afterIdx]);
          return before && after;
        });
      };
      nextList = groceryList
        .map(it => {
          const srcs = (it.src || '').split(' + ').map(s => s.trim()).filter(Boolean);
          const keptSrcs = srcs.filter(s => !matchesOverwriteDt(s));
          if (keptSrcs.length === srcs.length) return it; // nothing stripped
          // Some sources were stripped — clear q (we can't disentangle which qty
          // segment came from which day). New aggregation will repopulate q for
          // the rewritten day.
          return { ...it, src: keptSrcs.join(' + '), q: '' };
        })
        .filter(it => {
          // Drop items whose only source(s) came from the overwritten days,
          // unless the user added it manually (src === 'Added manually').
          if (it.src && it.src.length) return true;
          if (/manual/i.test(it.src || '')) return true;
          stripped++;
          return false;
        });
    } else {
      nextList = [...groceryList];
    }
    // 3b. Stale cleanup — runs in BOTH overwrite and append. Strips any source
    //     segment whose date-part (e.g. "Apr 14") parses to a day before today,
    //     so groceries from previous weeks' auto-plans don't accumulate. Items
    //     with src "Added manually" or src that doesn't contain a parseable
    //     "Mon DD" date (recipe-name sources, legacy items) are left alone.
    //     Items left with an empty src after stripping are dropped.
    const _today = new Date();
    _today.setHours(0, 0, 0, 0);
    const _MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const isStaleSrcSegment = (segment) => {
      const datePart = (segment || '').split(' · ')[0].trim();
      const m = datePart.match(/(?:^|\s)([A-Z][a-z]{2})\s+(\d{1,2})(?:\s|$)/);
      if (!m) return false;
      const monthIdx = _MONTHS_SHORT.indexOf(m[1]);
      if (monthIdx < 0) return false;
      const day = parseInt(m[2], 10);
      // Year inference: assume current year. If that lands more than 180 days
      // in the future, treat as last year (Dec→Jan boundary, etc.).
      let candidate = new Date(_today.getFullYear(), monthIdx, day);
      if (candidate.getTime() - _today.getTime() > 180 * 24 * 3600 * 1000) {
        candidate = new Date(_today.getFullYear() - 1, monthIdx, day);
      }
      return candidate.getTime() < _today.getTime();
    };
    nextList = nextList
      .map(it => {
        const srcs = (it.src || '').split(' + ').map(s => s.trim()).filter(Boolean);
        if (!srcs.length) return it; // no parseable sources to begin with → leave alone
        const keptSrcs = srcs.filter(s => !isStaleSrcSegment(s));
        if (keptSrcs.length === srcs.length) return it; // nothing stale
        if (keptSrcs.length === 0) return null; // every source was stale → orphan, drop
        // Mixed: some sources past, some present/future. Keep but clear q since
        // we can't disentangle which qty came from which source.
        return { ...it, src: keptSrcs.join(' + '), q: '' };
      })
      .filter(it => it !== null);
    const indexByName = {};
    nextList.forEach((it, i) => { indexByName[it.n.toLowerCase()] = i; });
    let added = 0, merged = 0;
    Object.values(aggregated).forEach(({ name, qSet, srcs }) => {
      const key = name.toLowerCase();
      const srcStr = [...srcs].join(' + ');
      const qStr = [...qSet].join(' + ');
      if (indexByName[key] != null) {
        const i = indexByName[key];
        const existingSrcs = (nextList[i].src || '').split(' + ').filter(Boolean);
        const mergedSrcs = new Set([...existingSrcs, ...srcs]);
        const existingQs = (nextList[i].q || '').split(' + ').filter(Boolean);
        const mergedQs = new Set([...existingQs, ...qSet]);
        nextList[i] = {
          ...nextList[i],
          src: [...mergedSrcs].join(' + '),
          q: [...mergedQs].join(' + '),
        };
        merged++;
      } else {
        nextList.push({ q: qStr, n: name, done: false, src: srcStr });
        added++;
      }
    });
    // 4. RULE-BASED SCRUB of the entire grocery list. This is the
    //    authoritative defense against staples like "italian seasoning",
    //    "olive oil", "salt" lingering on the list. Runs unconditionally —
    //    catches both newly-aggregated items AND items already on the list
    //    from prior plans (which the per-aggregation isPantry filter never
    //    re-checks). Also honors LLM cache: if catCache says isStaple, drop.
    //
    //    Why we need this in addition to the per-recipe isPantry filter at
    //    line 4097: that filter only runs while AGGREGATING new ingredients.
    //    Once an item is on the persisted grocery list, nothing scrubs it
    //    again — so a single past mis-classification (e.g. LLM returned
    //    isStaple:false from an older prompt) sticks forever. This pass
    //    re-applies the current rules to every item, every plan apply.
    //
    //    Manually-added items are always preserved.
    let prunedStaples = 0;
    {
      const before = nextList.length;
      nextList = nextList.filter(it => {
        if (/manual/i.test(it.src || '')) return true;
        const name = it.n || '';
        const lo = name.toLowerCase();
        // User explicitly opted this concept back onto the grocery list — skip the scrub.
        const concept = classify(name);
        if (concept && excludedStaples.has(concept)) return true;
        // Rule-based pantry match wins.
        if (concept) return false;
        // LLM cache says staple → drop.
        const cached = catCache[lo];
        if (cached && typeof cached === 'object' && cached.isStaple) return false;
        return true;
      });
      prunedStaples += before - nextList.length;
      // Items that survived may have been newly-added during this apply —
      // recompute added so the status line is honest.
      if (prunedStaples) added = Math.max(0, added - prunedStaples);
    }
    // 5. Pre-classify any uncached items via Claude BEFORE writing the
    //    grocery list. Backstop for items the rules don't catch (e.g.
    //    "panko breadcrumbs" — pantry-ish but not in DEFAULT_PANTRY).
    //    Without this, the GroceryScreen would render the full list, then
    //    a second later prune items Claude marks as staples — producing a
    //    jarring "items appear, then disappear" flash. Doing the
    //    classification here moves the prune one tick earlier.
    if (apiKey) {
      const uncached = [];
      const seen = new Set();
      nextList.forEach(it => {
        const k = (it.n || '').toLowerCase();
        if (!k || seen.has(k) || catCache[k]) return;
        uncached.push(it.n);
        seen.add(k);
      });
      if (uncached.length) {
        try {
          setGenStatus('✓ Plan saved · classifying groceries…');
          const map = await classifyGroceriesWithLLM({ apiKey, names: uncached.slice(0, 50) });
          const updates = {};
          const stapleKeys = new Set();
          Object.entries(map).forEach(([k, v]) => {
            const lo = k.toLowerCase();
            updates[lo] = v;
            if (v && v.isStaple) stapleKeys.add(lo);
          });
          if (Object.keys(updates).length) setCatCache(prev => ({ ...prev, ...updates }));
          if (stapleKeys.size) {
            const before = nextList.length;
            // Drop staples — but keep manually-added items even if Claude says staple.
            nextList = nextList.filter(it => {
              const lo = (it.n || '').toLowerCase();
              if (!stapleKeys.has(lo)) return true;
              if (/manual/i.test(it.src || '')) return true;
              return false;
            });
            const justPruned = before - nextList.length;
            prunedStaples += justPruned;
            // The items that survive may have been newly-added during this
            // apply — recompute the added counter so the status line is honest.
            added = Math.max(0, added - justPruned);
          }
        } catch (e) {
          // Classification is best-effort. If it fails, fall through and
          // let GroceryScreen's effect handle it like before. The user might
          // still see a flash, but the plan still applies.
          console.warn('[applyPlan] grocery classification failed:', e);
        }
      }
    }

    setGroceryList(nextList);

    if (written.length === 0 && !stripped) {
      setGenStatus('✓ All selected days were already planned · nothing to add');
    } else {
      const parts = [];
      if (written.length) parts.push(`${written.length} meal${written.length === 1 ? '' : 's'} written`);
      if (stripped) parts.push(`${stripped} stale grocery item${stripped === 1 ? '' : 's'} cleared`);
      if (added)    parts.push(`${added} new grocery item${added === 1 ? '' : 's'}`);
      if (merged)   parts.push(`${merged} merged`);
      if (prunedStaples) parts.push(`${prunedStaples} staple${prunedStaples === 1 ? '' : 's'} skipped`);
      setGenStatus(`✓ ${parts.join(' · ')}`);
    }
    setTimeout(() => setGenStatus(''), 6000);
  };

  // Run the picker with a given seed. Shared by handleGenerate (initial fire,
  // opens the preview modal) and handleReroll (re-fire from inside the open
  // modal, swaps perDay in place). Side-effects setGenLoading + setGenStatus.
  // excludeDinners: list of dinner names the user has already seen in earlier
  // reroll attempts of the same constraint session — picker filters them out.
  const runPicker = async (seed, excludeDinners = []) => {
    const useLlm = !!(apiKey && instructions && instructions.trim());
    let perDay;
    let llmUsed = false;
    let llmFailureNote = '';
    if (useLlm) {
      setGenLoading(true);
      setGenStatus(seed > 1 ? '✦ Re-rolling…' : '✦ Asking Claude to honor your instructions…');
      try {
        perDay = await pickPlanWithLLM({
          apiKey, recipeDB, days, breakfastPicks, tasks,
          avoidWeeks: AVOID_OPTS[avoidIdx], cookingHistory, instructions, seed,
          excludeDinners,
        });
        llmUsed = true;
      } catch (e) {
        llmFailureNote = `LLM picker failed (${e.message}); using rule-based`;
        perDay = pickPlan({
          recipeDB, days, breakfastPicks, tasks,
          avoidWeeks: AVOID_OPTS[avoidIdx], cookingHistory, instructions, seed,
          excludeDinners,
        });
      } finally {
        setGenLoading(false);
      }
    } else {
      perDay = pickPlan({
        recipeDB, days, breakfastPicks, tasks,
        avoidWeeks: AVOID_OPTS[avoidIdx], cookingHistory, instructions, seed,
        excludeDinners,
      });
      if (!apiKey && instructions && instructions.trim()) {
        llmFailureNote = 'No API key — dinner selection is rule-based, but weekday + same-day instructions still apply.';
      }
    }
    if (llmFailureNote) {
      setGenStatus(llmFailureNote);
      setTimeout(() => setGenStatus(''), 5000);
    } else if (llmUsed) {
      setGenStatus('');
    }
    return perDay;
  };

  // Pull dinner names out of a perDay array (for accumulating into recentDinners).
  const dinnerNamesOf = (perDay) =>
    (perDay || []).filter(p => p && p.dinner && p.dinner.name).map(p => p.dinner.name);

  // FIFO append into the rolling window of recently-shown dinners. New names
  // go to the END of the list; oldest entries drop off the FRONT once the cap
  // is exceeded. De-duplicates: if a name is already in the list, it's moved
  // to the most-recent position rather than appearing twice.
  const appendRecentDinners = (current, fresh) => {
    const freshSet = new Set(fresh);
    const kept = (current || []).filter(n => !freshSet.has(n));
    const merged = [...kept, ...fresh.filter(Boolean)];
    return merged.length > RECENT_DINNERS_CAP
      ? merged.slice(merged.length - RECENT_DINNERS_CAP)
      : merged;
  };

  const handleGenerate = async () => {
    const dinnerDays = days.filter(d => d.on);
    if (dinnerDays.length === 0) {
      setGenStatus('Pick at least one day to plan');
      setTimeout(() => setGenStatus(''), 3000);
      return;
    }
    if (recipeDB.length === 0) {
      setGenStatus('No recipes in library yet');
      setTimeout(() => setGenStatus(''), 3000);
      return;
    }

    // Reroll-aware bookkeeping:
    //   - same constraints as last fire (isReroll) → bump the user-facing
    //     counter, advance pickerSeed by 1.
    //   - different constraints → reset counter to 1, draw a NEW random
    //     pickerSeed (so the very first plan varies across fresh fires —
    //     before this, seed=1 always meant the same starting plan).
    // The reroll button inside the preview modal is the primary reroll
    // affordance; this path also covers the case where the user closed the
    // modal and wants another shot from the main Generate button.
    //
    // recentDinners (persistent, capped rolling window) is ALWAYS used as
    // the exclusion set — including on fresh fires — so a recipe that fits
    // every constraint set can't dominate every plan across page reloads.
    const nextRerollSeed = isReroll ? rerollSeed + 1 : 1;
    const nextPickerSeed = isReroll
      ? pickerSeed + 1
      : Math.floor(Math.random() * 1_000_000) + 1;
    setRerollSeed(nextRerollSeed);
    setPickerSeed(nextPickerSeed);
    setLastConstraintKey(currentConstraintKey);

    const perDay = await runPicker(nextPickerSeed, recentDinners);

    // Accumulate the dinners we just showed into the rolling window.
    setRecentDinners(appendRecentDinners(recentDinners, dinnerNamesOf(perDay)));

    // Preview-then-confirm flow: show the user the plan + pantry assumptions
    // first. The existing-meals overwrite/append decision is deferred to
    // confirmPreview so the user can cancel without seeing a second modal.
    setPreviewModal({ perDay, weekTitle: planWeekTitle(planOffset) });
  };

  // Reroll from inside the preview modal: advance pickerSeed, re-run the
  // picker, swap perDay in place. The user's pantry-pill toggles persist
  // because PreviewPlanModal stays mounted (we update its `perDay` prop,
  // not unmount). Carries forward EVERY dinner shown so far (history +
  // currently-displayed plan) as the exclusion list — the reroll must
  // produce something new.
  const handleReroll = async () => {
    if (genLoading || !previewModal) return;
    const nextRerollSeed = rerollSeed + 1;
    const nextPickerSeed = pickerSeed + 1;
    const currentPlanDinners = dinnerNamesOf(previewModal.perDay);
    // Exclusion for THIS reroll = persistent recent window + the dinners on
    // the plan currently in front of the user. (The current plan's dinners
    // may not be in recentDinners yet if the rolling window already capped
    // them out — explicitly merging them guarantees the reroll produces
    // something different from what's on screen.)
    const carryOver = [...new Set([...recentDinners, ...currentPlanDinners])];
    setRerollSeed(nextRerollSeed);
    setPickerSeed(nextPickerSeed);
    setLastConstraintKey(currentConstraintKey);
    const perDay = await runPicker(nextPickerSeed, carryOver);
    setRecentDinners(appendRecentDinners(recentDinners, [...currentPlanDinners, ...dinnerNamesOf(perDay)]));
    setPreviewModal(prev => (prev ? { ...prev, perDay } : null));
  };

  // Called when the user hits Confirm on the preview modal. Computes
  // existing-day collisions and either opens the overwrite/append modal or
  // applies the plan directly. excludedStaples is the Set of lowercased
  // ingredient names the user opted back onto the grocery list.
  const confirmPreview = (excludedStaples) => {
    if (!previewModal) return;
    const { perDay } = previewModal;
    let existing = 0;
    perDay.forEach(({ weekOffset, slotIdx }) => {
      const slot = weekMap[weekOffset] && weekMap[weekOffset][slotIdx];
      if (slot && (slot.meals.d || (slot.meals.b && slot.meals.b.length) || (slot.tasks && slot.tasks.length))) existing++;
    });
    setPreviewModal(null);
    if (existing > 0) {
      setGenModal({ existing, perDay, totalSelected: perDay.length, weekTitle: previewModal.weekTitle, excludedStaples });
    } else {
      applyPlan(perDay, 'append', { excludedStaples });
    }
  };

  return (
    <div className="screen-body">
      <div style={{ padding:'8px 20px 10px', position:'relative' }}>
        <div style={{ fontSize:13, color:'var(--text-dimmer)' }}>Settings</div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div className="screen-title">Auto-Plan</div>
          {onSettings && (
            <span
              onClick={onSettings}
              title="Settings"
              style={{ fontSize:20, color:'var(--text-dimmer)', cursor:'pointer', padding:'4px 8px' }}
            >⚙</span>
          )}
        </div>
      </div>

      <div className="pane">
        {/* Plan days */}
        <div className="card" style={{ marginBottom:10 }}>
          <div className="card-label">📅 Plan days</div>
          <div className="week-nav">
            <span style={{ fontSize:20, color:'var(--purple)', cursor:'pointer', padding:'0 6px' }} onClick={() => goWeek(-1)}>‹</span>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:17, color:'#ccc' }}>{planWeekTitle(planOffset)}</div>
              <div style={{ fontSize:14, color:'var(--text-dimmer)' }}>{planRangeLabel(planOffset)}</div>
            </div>
            <span style={{ fontSize:20, color:'var(--purple)', cursor:'pointer', padding:'0 6px' }} onClick={() => goWeek(1)}>›</span>
          </div>
          <div style={{ display:'flex', gap:3, flexWrap:'wrap' }}>
            {days.map(({ d, dt, on }) => (
              <div
                key={dt}
                onClick={() => toggleDay(dt)}
                style={{
                  flex:'1 1 calc(25% - 4px)', minWidth:60, height:48, borderRadius:8, marginBottom:4,
                  display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:1,
                  fontFamily:'var(--font)', cursor:'pointer',
                  background: on ? 'var(--purple-mid)' : '#131320',
                  border: `1.5px ${on ? 'solid' : 'dashed'} ${on ? 'var(--purple)' : '#252535'}`,
                  color: on ? 'var(--purple-light)' : '#333',
                }}
              >
                <span style={{ fontSize:15 }}>{d}</span>
                <span style={{ fontSize:13, opacity:0.7 }}>{dt}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize:12, color:'#444', marginTop:6 }}>Tap a day to plan it · use ‹ › to change weeks</div>
        </div>

        {/* Breakfast picker */}
        <BreakfastPicker picks={breakfastPicks} setPicks={setBreakfastPicks} recipeDB={recipeDB} />

        {/* Recurring tasks */}
        <div className="card" style={{ marginBottom:10 }}>
          <div className="card-label">🗂️ Recurring tasks</div>
          {tasks.map((t, i) => (
            <div key={i} className="param-row" style={i === tasks.length - 1 ? { borderBottom:'none' } : null}>
              <span className="param-label" style={{ cursor:'pointer', flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }} onClick={() => setTaskModal({ idx: i })}>{t.name}</span>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <Toggle on={t.on} onChange={() => toggleTask(i)} />
                <span
                  onClick={() => deleteTask(i)}
                  title="Remove task"
                  style={{ fontSize:18, color:'#555', cursor:'pointer', userSelect:'none', padding:'0 2px', lineHeight:1 }}
                >×</span>
              </div>
            </div>
          ))}
          <div
            onClick={() => setTaskModal({ idx: null })}
            style={{ height:34, border:'1.5px dashed #252535', borderRadius:8, display:'flex', alignItems:'center', padding:'0 12px', color:'#666', fontSize:15, marginTop:6, cursor:'pointer' }}
          >
            + add task
          </div>
        </div>

        {/* Custom instructions */}
        <div className="card" style={{ marginBottom:10 }}>
          <div className="card-label">✏️ Custom instructions</div>
          <textarea
            className="task-input"
            value={instructions}
            onChange={e => setInstructions(e.target.value)}
            placeholder='e.g. "shrimp on friday, no repeats from last week"'
            style={{ minHeight:70, lineHeight:1.5, resize:'vertical' }}
          />
          <div style={{ fontSize:11, color: apiKey ? 'var(--text-dimmer)' : '#d99', marginTop:6 }}>
            {apiKey
              ? 'Honored by Claude when you tap Generate.'
              : 'No API key — paste one into EMBEDDED_API_KEY at the top of index.html.'}
          </div>
        </div>

        {/* Avoid repeats */}
        <div className="card" style={{ marginBottom:14 }}>
          <div className="param-row" style={{ borderBottom:'none' }}>
            <span className="param-label">Avoid repeats for</span>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span
                onClick={() => stepAvoid(-1)}
                style={{ fontSize:20, color: avoidIdx === 0 ? '#333' : 'var(--purple)', cursor: avoidIdx === 0 ? 'default' : 'pointer', padding:'0 4px', userSelect:'none' }}
              >‹</span>
              <span className="param-val" style={{ minWidth:64, textAlign:'center' }}>
                {AVOID_OPTS[avoidIdx]} {AVOID_OPTS[avoidIdx] === 1 ? 'week' : 'weeks'}
              </span>
              <span
                onClick={() => stepAvoid(1)}
                style={{ fontSize:20, color: avoidIdx === AVOID_OPTS.length - 1 ? '#333' : 'var(--purple)', cursor: avoidIdx === AVOID_OPTS.length - 1 ? 'default' : 'pointer', padding:'0 4px', userSelect:'none' }}
              >›</span>
            </div>
          </div>
        </div>
      </div>

      <div className="btn-wrap">
        {genStatus && (
          <div style={{
            textAlign:'center', fontSize:13, marginBottom:8,
            color: genStatus.startsWith('✓') ? 'var(--purple-light)' : '#d99',
          }}>{genStatus}</div>
        )}
        <div
          className="gen-btn"
          onClick={genLoading ? undefined : handleGenerate}
          style={genLoading ? { opacity: 0.6, cursor: 'wait' } : null}
          title={isReroll ? `Re-roll #${nextSeed} — same constraints, different recipes` : null}
        >
          {genLoading
            ? '✦ Generating…'
            : isReroll
              ? `🎲 Re-roll plan (#${nextSeed})`
              : `✦ Generate ${planWeekTitle(planOffset)}'s Plan`}
        </div>
      </div>

      {taskModal && (
        <TaskSheet
          initial={taskModal.idx != null ? tasks[taskModal.idx].name : ''}
          onSave={saveTask}
          onClose={() => setTaskModal(null)}
        />
      )}

      {previewModal && (
        <PreviewPlanModal
          perDay={previewModal.perDay}
          weekMap={weekMap}
          weekTitle={previewModal.weekTitle}
          pantryStaples={pantryStaples}
          onConfirm={confirmPreview}
          onCancel={() => setPreviewModal(null)}
          onReroll={handleReroll}
          rerolling={genLoading}
          rerollSeed={rerollSeed}
        />
      )}

      {genModal && (
        <GenerateModal
          existing={genModal.existing}
          totalSelected={genModal.totalSelected}
          weekTitle={genModal.weekTitle}
          onChoose={(mode) => { applyPlan(genModal.perDay, mode, { excludedStaples: genModal.excludedStaples }); setGenModal(null); }}
          onClose={() => setGenModal(null)}
        />
      )}

      <TabBar active={3} onTab={onTab} />
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP — NAVIGATION
═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState(0);
  const [subscreen, setSubscreen] = useState(null); // 'recipe-detail' | 'add-recipe' | 'add-url' | 'add-describe'
  const [selectedRecipe, setSelectedRecipe] = useState(null);

  // Week state — keyed by offset so changes persist when navigating weeks
  const [weekOffset, setWeekOffset] = useState(0);
  const [weekMap, setWeekMap] = usePersistedState('ab.weekPlans', () => ({ 0: seedWeekZero() }));
  const [recipeDB, setRecipeDB] = usePersistedState('ab.recipes.v4', RECIPES);
  const [cookingHistory, setCookingHistory] = usePersistedState('ab.cookingHistory', []);
  const [pantryStaples, setPantryStaples] = usePersistedState('ab.pantryStaples', DEFAULT_PANTRY);
  const [groceryList, setGroceryList] = usePersistedState('ab.groceryList', GROCERY_ITEMS);
  const [groceryLastReset, setGroceryLastReset] = usePersistedState('ab.groceryLastReset', 0);
  // Lifted to App so AutoPlanScreen.applyPlan can pre-classify ingredients
  // BEFORE writing the grocery list — eliminates the "items appear, then
  // staples disappear" flash that happened when GroceryScreen's effect
  // pruned items after they were already on screen.
  const [catCache, setCatCache] = usePersistedState('ab.catCache', {});
  const [persistedKey, setPersistedKey] = usePersistedState('ab.apiKey', '');
  const apiKey = EMBEDDED_API_KEY || persistedKey;
  const [showSettings, setShowSettings] = useState(false);

  // Reset checked-off grocery items every Friday (local 00:00)
  useEffect(() => {
    const now = new Date();
    const daysSinceFri = (now.getDay() - 5 + 7) % 7;
    const fri = new Date(now);
    fri.setDate(fri.getDate() - daysSinceFri);
    fri.setHours(0, 0, 0, 0);
    if (groceryLastReset < fri.getTime()) {
      setGroceryList(prev => prev.filter(it => !it.done));
      setGroceryLastReset(fri.getTime());
    }
  }, []); // run once on mount

  // One-time migration: tag known side dishes with `sides` so they stop being
  // auto-planned as dinners. Runs against localStorage-persisted recipes that
  // pre-date the `sides` tag. Gated by a flag so it only fires once per device.
  useEffect(() => {
    if (localStorage.getItem('ab.migration.sidesV1') === 'done') return;
    const SIDE_NAME_RE = /(sweet potato fries|caprese salad|coleslaw|garlic bread|roasted asparagus|roasted broccoli|mashed potatoes)/i;
    setRecipeDB(prev => prev.map(r => {
      const tags = r.tags || [];
      if (tags.includes('sides')) return r;
      if (!SIDE_NAME_RE.test(r.name || '')) return r;
      // Drop `dinner` if present (sides shouldn't double-tag); keep everything else.
      return { ...r, tags: ['sides', ...tags.filter(t => t !== 'dinner')] };
    }));
    try { localStorage.setItem('ab.migration.sidesV1', 'done'); } catch {}
  }, []); // run once on mount

  const currentWeek = mergeWeek(buildWeek(weekOffset), weekMap[weekOffset]);
  const setCurrentWeek = (next) => setWeekMap({ ...weekMap, [weekOffset]: next });
  const handleWeekOffset = (next) => {
    if (!weekMap[next]) setWeekMap(prev => ({ ...prev, [next]: buildWeek(next) }));
    setWeekOffset(next);
  };

  const handleTab = (i) => {
    setTab(i);
    setSubscreen(null);
  };

  const handleRecipeDetail = (r) => {
    setSelectedRecipe(r);
    setSubscreen('recipe-detail');
  };

  const handleAddRecipe = () => setSubscreen('add-recipe');

  const handleBack = () => {
    if (subscreen === 'add-url' || subscreen === 'add-describe') {
      setSubscreen('add-recipe');
    } else {
      setSubscreen(null);
    }
  };

  const handleSaveNewRecipe = (data) => {
    if (!data) return;
    const nextId = recipeDB.reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;
    const minutes = typeof data.estMinutes === 'number' && data.estMinutes > 0
      ? data.estMinutes
      : (Number(data.activeMinutes) || 0) + (Number(data.passiveMinutes) || 0) || null;
    const newRecipe = {
      ...data,
      id: nextId,
      time: minutes ? `${minutes} min` : '—',
      estMinutes: minutes || data.estMinutes,
      used: 0,
    };
    setRecipeDB([newRecipe, ...recipeDB]);
    setSelectedRecipe(newRecipe);
    setSubscreen('recipe-detail');
  };

  const renderScreen = () => {
    if (subscreen === 'recipe-detail') {
      return <RecipeDetailScreen
        recipe={selectedRecipe}
        onBack={handleBack}
        onTab={handleTab}
        weekMap={weekMap}
        setWeekMap={setWeekMap}
        recipeDB={recipeDB}
        setRecipeDB={setRecipeDB}
        groceryList={groceryList}
        setGroceryList={setGroceryList}
      />;
    }
    if (subscreen === 'add-recipe') {
      return <AddRecipeScreen
        onBack={handleBack}
        onURL={() => setSubscreen('add-url')}
        onDescribe={() => setSubscreen('add-describe')}
        apiKey={apiKey}
        onTab={handleTab}
      />;
    }
    if (subscreen === 'add-url') {
      return <AddRecipeURLScreen onBack={handleBack} apiKey={apiKey} onSave={handleSaveNewRecipe} onTab={handleTab} />;
    }
    if (subscreen === 'add-describe') {
      return <AddRecipeDescribeScreen onBack={handleBack} apiKey={apiKey} onSave={handleSaveNewRecipe} onTab={handleTab} />;
    }

    switch (tab) {
      case 0: return <WeekScreen
        onTab={handleTab}
        weekData={currentWeek}
        setWeekData={setCurrentWeek}
        weekOffset={weekOffset}
        setWeekOffset={handleWeekOffset}
        recipeDB={recipeDB}
        onMealClick={(name) => {
          const r = recipeDB.find(x => x.name === name);
          if (r) handleRecipeDetail(r);
        }}
      />;
      case 1: return <GroceryScreen
        onTab={handleTab}
        items={groceryList}
        setItems={setGroceryList}
        pantryStaples={pantryStaples}
        setPantryStaples={setPantryStaples}
        apiKey={apiKey}
        catCache={catCache}
        setCatCache={setCatCache}
      />;
      case 2: return <RecipesScreen
        onTab={handleTab}
        onRecipeDetail={handleRecipeDetail}
        onAddRecipe={handleAddRecipe}
        recipeDB={recipeDB}
      />;
      case 3: return <AutoPlanScreen
        onTab={handleTab}
        recipeDB={recipeDB}
        weekMap={weekMap}
        setWeekMap={setWeekMap}
        cookingHistory={cookingHistory}
        setCookingHistory={setCookingHistory}
        pantryStaples={pantryStaples}
        groceryList={groceryList}
        setGroceryList={setGroceryList}
        apiKey={apiKey}
        catCache={catCache}
        setCatCache={setCatCache}
        onSettings={() => setShowSettings(true)}
      />;
      default: return <WeekScreen onTab={handleTab} recipeDB={recipeDB} />;
    }
  };

  return (
    <Phone>
      {renderScreen()}
      {showSettings && (
        <SettingsSheet
          apiKey={persistedKey}
          setApiKey={setPersistedKey}
          onClose={() => setShowSettings(false)}
        />
      )}
    </Phone>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
